  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #060d1a;
    --surface: #0b1628;
    --surface2: #111f35;
    --border: #1e3050;
    --border2: #2a4268;
    --text: #cdd9ee;
    --muted: #5a7499;
    --accent: #503294;
    --accent2: #382464;
    --brand: #a8cc3a;
    --font-main: 'IBM Plex Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-main); }
  .reset-shell { min-height: 100vh; background: var(--bg); }
  .reset-top-line { height: 4px; background: linear-gradient(90deg, var(--accent) 0%, var(--accent) 28%, var(--brand) 28%, var(--brand) 100%); border-bottom: 1px solid var(--border); }
  .reset-main-tabs-wrap { background: var(--surface); border-bottom: 1px solid var(--border); }
  .reset-main-tabs { max-width: 1320px; margin: 0 auto; display: flex; gap: 0; padding: 0 0 0 0; }
  .reset-main-tab {
    min-width: 145px; padding: 16px 16px; background: transparent; border: 0; border-bottom: 3px solid transparent;
    color: #5f80b7; font-family: var(--font-mono); font-size: 14px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .16em; cursor: pointer; transition: all .18s ease;
  }
  .reset-main-tab:hover { color: #d8e5fb; background: rgba(80,50,148,.08); }
  .reset-main-tab.active { background: rgba(80,50,148,.16); color: var(--accent); border-bottom-color: var(--accent); }
  .reset-main-tab.actions-tab.active { color: var(--brand); border-bottom-color: var(--brand); background: rgba(168,204,58,.08); }
  .reset-subtabs-wrap { background: var(--surface); border-bottom: 1px solid var(--border); display: none; }
  .reset-subtabs-wrap.active { display: block; }
  .reset-subtabs { max-width: 1320px; margin: 0 auto; display: flex; gap: 6px; padding: 8px 0 0; overflow-x: auto; align-items:flex-end; }
  .reset-pillar-subtabs { max-width:1320px; margin:0 auto; display:none; gap:2px; padding:4px 0 0; overflow-x:auto; border-top:1px solid rgba(30,48,80,.35); }
  .reset-pillar-subtabs.active { display:flex; }
  .reset-subtab { padding: 8px 16px; min-height: 34px; color: #5f80b7; font-family: var(--font-mono); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .07em; border: 1px solid transparent; border-bottom: 2px solid transparent; white-space: nowrap; display: inline-flex; align-items: center; gap: 10px; border-radius: 7px 7px 0 0; }
  .reset-subtab { cursor: pointer; }
  .reset-subtab.active { color: var(--brand); border-bottom-color: var(--brand); }
  .reset-subtab.create-action { color: #ffffff; border-color: rgba(128,0,32,.72); border-bottom-color: #9f1239; background: linear-gradient(180deg, #8a1232 0%, #5f0f2a 100%); box-shadow: inset 0 1px 0 rgba(255,255,255,.12), 0 4px 14px rgba(95,15,42,.20); }
  .reset-subtab.create-action.active { color: #ffffff; border-color: rgba(128,0,32,.86); border-bottom-color: #be123c; background: linear-gradient(180deg, #9f1239 0%, #6f102e 100%); }
  .reset-subtab.saved-action { color: var(--accent); border-color: rgba(168,204,58,.45); border-bottom-color: rgba(168,204,58,.75); background: linear-gradient(180deg, var(--brand) 0%, var(--brand-dk, #87a72e) 100%); font-size: 10.5px; letter-spacing: .045em; box-shadow: inset 0 1px 0 rgba(255,255,255,.12); }
  .reset-subtab.saved-action.active { color: var(--accent); border-color: rgba(168,204,58,.75); border-bottom-color: var(--brand); background: linear-gradient(180deg, var(--brand) 0%, var(--brand-dk, #87a72e) 100%); }
  .reset-pillar-tab { min-height:28px; padding:6px 12px; font-size:10px; letter-spacing:.055em; color:#cdd9ee; border:1px solid var(--border2); background:rgba(17,31,53,.92); }
  .reset-pillar-tab.active { color:var(--brand); border-color:rgba(168,204,58,.55); border-bottom-color:var(--brand); background:rgba(168,204,58,.13); }
  .reset-unit-subtabs { max-width:1320px; margin:0 auto; display:none; gap:2px; padding:2px 0 0; overflow-x:auto; border-top:1px solid rgba(30,48,80,.24); }
  .reset-unit-subtabs.active { display:flex; }
  .reset-unit-tab { min-height:24px; padding:4px 10px; font-size:9.5px; letter-spacing:.045em; color:#cdd9ee; border:1px solid var(--border2); background:rgba(10,20,38,.88); border-radius:6px 6px 0 0; }
  .reset-unit-tab.active { color:#ffffff; border-color:rgba(168,204,58,.55); border-bottom-color:var(--brand); background:rgba(168,204,58,.16); }

  .reset-action-subtabs { max-width:1320px; margin:0 auto; display:none; gap:2px; padding:2px 0 0; overflow-x:auto; border-top:1px solid rgba(30,48,80,.18); }
  .reset-action-subtabs.active { display:flex; }
  .reset-action-tab { min-height:22px; padding:3px 9px; font-size:9px; letter-spacing:.04em; color:#cdd9ee; border:1px solid var(--border2); background:rgba(10,20,38,.78); border-radius:5px 5px 0 0; }
  .reset-action-tab.active { color:#ffffff; border-color:rgba(80,50,148,.85); border-bottom-color:var(--accent); background:rgba(80,50,148,.22); }
  #pane-acoes .reset-frame:not(.active-action-frame) { display: none; }
  #pane-acoes .reset-frame.active-action-frame { display: block; }
  .reset-pane { display: none; }
  .reset-pane.active { display: block; }
  iframe.reset-frame { display: block; width: 100%; height: calc(100vh - 72px); border: 0; background: var(--bg); }
  #pane-acoes iframe.reset-frame { height: calc(100vh - 121px); }
  @media (max-width: 700px) {
    .reset-main-tab { min-width: auto; flex: 1; padding: 16px 12px; font-size: 12px; letter-spacing: .10em; }
    .reset-subtab { font-size: 11px; padding: 12px 10px; }
  }


  /* V26: cabeçalho superior fixo e sem barra dinâmica visual */
  .reset-top-line { display: none !important; }
  .reset-main-tabs-wrap {
    position: sticky !important;
    top: 0 !important;
    z-index: 9000 !important;
    background: var(--surface) !important;
  }
  .reset-subtabs-wrap.active {
    position: sticky !important;
    top: 59px !important;
    z-index: 8990 !important;
    background: var(--surface) !important;
    box-shadow: 0 10px 18px rgba(0,0,0,.22);
  }
  .reset-main-tab { min-width: 118px !important; padding: 14px 14px !important; }

  @media print {
    .reset-top-line, .reset-main-tabs-wrap, .reset-subtabs-wrap { display:none !important; }
    iframe.reset-frame { min-height: 100vh; }
  }

  /* V31: aba principal ativa com texto branco e acesso protegido à aba AÇÕES */
  .reset-subtabs > .reset-subtab.saved-action.active {
    color: #ffffff !important;
    text-shadow: 0 0 8px rgba(255,255,255,.28);
  }
  .acoes-lock-overlay {
    position: fixed; inset: 0; z-index: 20000;
    display: none; align-items: center; justify-content: center;
    background: rgba(3,8,18,.72); backdrop-filter: blur(4px);
  }
  .acoes-lock-overlay.active { display: flex; }
  .acoes-lock-modal {
    width: min(440px, calc(100vw - 34px));
    background: linear-gradient(180deg, #081426 0%, #050c18 100%);
    border: 1px solid rgba(168,204,58,.78);
    box-shadow: 0 0 22px rgba(168,204,58,.22), 0 22px 70px rgba(0,0,0,.55);
    border-radius: 14px; padding: 28px 30px 24px;
    color: var(--text); font-family: var(--font-main);
  }
  .acoes-lock-title {
    font-family: var(--font-mono); font-size: 22px; font-weight: 800;
    color: #ffffff; text-align: center; letter-spacing: .06em;
    margin-bottom: 8px; text-transform: uppercase;
  }
  .acoes-lock-subtitle { text-align: center; color: #cdd9ee; margin-bottom: 20px; }
  .acoes-lock-label {
    display:block; color: var(--brand); font-family: var(--font-mono);
    font-weight: 800; font-size: 12px; text-transform: uppercase;
    letter-spacing: .08em; margin-bottom: 8px;
  }
  .acoes-lock-input {
    width:100%; height:44px; border-radius:8px;
    border:1px solid rgba(168,204,58,.55);
    background:#071225; color:#ffffff; padding:0 14px;
    font-family:var(--font-main); font-size:16px; outline:none;
  }
  .acoes-lock-input:focus {
    border-color: var(--brand); box-shadow: 0 0 0 3px rgba(168,204,58,.16);
  }
  .acoes-lock-error { min-height: 20px; color:#ff5b6b; font-weight:700; margin:8px 0 14px; font-size:13px; }
  .acoes-lock-actions { display:flex; gap:12px; }
  .acoes-lock-btn {
    flex:1; height:42px; border-radius:8px; cursor:pointer;
    font-family:var(--font-mono); font-weight:800; text-transform:uppercase;
    letter-spacing:.05em; border:1px solid var(--border2);
    background:rgba(17,31,53,.92); color:#ffffff;
  }
  .acoes-lock-btn.primary {
    color:#18210a; border-color:rgba(168,204,58,.9);
    background:linear-gradient(180deg, var(--brand) 0%, #91b82f 100%);
    box-shadow:0 0 16px rgba(168,204,58,.24);
  }



  /* v50 — ajustes pontuais no cronograma: centralização de Melhorias e coluna Quem faz? */
  .meta-item.meta-melhorias-auto { text-align: center; }
  .meta-item.meta-melhorias-auto .val { display: block; text-align: center; }
  .melhorias-table .col-quem-faz { width: 118px; min-width: 118px; }
  .melhorias-table .quem-faz-select {
    width: 112px;
    min-width: 112px;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    padding: 5px 24px 5px 10px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border2);
    border-radius: 8px;
    cursor: pointer;
  }
  .melhorias-table .quem-faz-select:focus { outline: none; border-color: var(--brand); }
  .melhorias-table .status-select { min-width: 128px !important; }


  /* v54 — ajuste pontual: STATUS mais compacto e DESCRIÇÃO com mais espaço */
  .melhorias-table thead th:nth-child(9),
  .melhorias-table tbody td:nth-child(9) {
    width: 168px !important;
    max-width: 168px !important;
  }
  .melhorias-table tbody td:nth-child(9) select.status-select,
  .melhorias-table tbody td:nth-child(9) select.action-status-select {
    width: 160px !important;
    min-width: 160px !important;
    max-width: 160px !important;
  }
  .melhorias-table thead th:nth-child(3),
  .melhorias-table tbody td:nth-child(3) {
    width: auto !important;
  }

        &lt;input id=&quot;p2m-termino&quot; style=&quot;width:100%;min-height:40px;border:1px solid #2a4268;border-radius:8px;background:#071225;color:#fff;padding:9px 12px;font-size:13px;color-scheme:dark;outline:none&quot; type=&quot;date&quot;/&gt;
      &lt;/label&gt;
      &lt;label&gt;
        &lt;span style=&quot;display:block;font-family:var(--font-mono);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--brand);margin-bottom:6px&quot;&gt;Quem Faz?&lt;/span&gt;
        &lt;select id=&quot;p2m-quem&quot; style=&quot;width:100%;min-height:40px;border:1px solid #2a4268;border-radius:8px;background:#071225;color:#fff;padding:9px 12px;font-size:12px;font-family:var(--font-mono);font-weight:700;outline:none&quot;&gt;
          &lt;option selected&gt;Pentagrama&lt;/option&gt;&lt;option&gt;Bolix&lt;/option&gt;&lt;option&gt;Terceiros&lt;/option&gt;

      &lt;button class=&quot;btn&quot; onclick=&quot;p2ModalFechar()&quot; type=&quot;button&quot;&gt;Cancelar&lt;/button&gt;
      &lt;button class=&quot;btn primary&quot; onclick=&quot;p2ModalSalvar()&quot; type=&quot;button&quot;&gt;Salvar projeto&lt;/button&gt;
    &lt;/div&gt;

&lt;script src=&quot;https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
  const UNITS_DATA = (function(){
    try{
      var saved = localStorage.getItem(&#x27;reset.units_data&#x27;) || localStorage.getItem(&#x27;reset_units_data&#x27;) || &#x27;{}&#x27;;
      var parsed = JSON.parse(saved);
      return (parsed &amp;&amp; typeof parsed === &#x27;object&#x27;) ? parsed : {};
    }catch(e){ return {}; }
  })();

  // V18 AJUSTE — não limpar dados ao carregar. As ações/melhorias criadas precisam alimentar o modal Incluir Projeto.
  function salvarUnitsData(){
    try{localStorage.setItem(&#x27;reset.units_data&#x27;,JSON.stringify(UNITS_DATA));}catch(e){}
  }

  // V18 PROJETOS — sincroniza os dados salvos antes de montar PROJETOS EM EXECUÇÃO.
  // Garante que ações e melhorias já gravadas em reset.units_data/reset_units_data apareçam na tela e no modal Incluir Projeto.
  function sincronizarUnitsDataSalvo(){
    try{
      var raw = localStorage.getItem(&#x27;reset.units_data&#x27;) || localStorage.getItem(&#x27;reset_units_data&#x27;) || &#x27;{}&#x27;;
      var saved = JSON.parse(raw);
      if(saved &amp;&amp; typeof saved === &#x27;object&#x27;){
        Object.keys(UNITS_DATA || {}).forEach(function(k){ delete UNITS_DATA[k]; });
        Object.keys(saved).forEach(function(k){
          UNITS_DATA[k] = Array.isArray(saved[k]) ? saved[k] : [];
          UNITS_DATA[k].forEach(function(acao){
            if(!Array.isArray(acao.melhorias)) acao.melhorias = [];
            acao.melhorias.forEach(function(m, i){
              if(!m.idm) m.idm = &#x27;M&#x27; + String(i + 1).padStart(2, &#x27;0&#x27;);
            });
          });
        });
      }
    }catch(e){}
    return UNITS_DATA;
  }

  var _udEditTarget=null;

  function udFecharModais(){
    [&#x27;ud-modal-editar&#x27;,&#x27;ud-modal-excluir&#x27;].forEach(function(id){
      var el=document.getElementById(id);if(el)el.style.display=&#x27;none&#x27;;
    });
    _udEditTarget=null;
  }

  function udAbrirModalEditar(){
    var modal=document.getElementById(&#x27;ud-modal-editar&#x27;);
    var body=document.getElementById(&#x27;ud-editar-body&#x27;);
    if(!modal||!body)return;
    var html=&#x27;&#x27;;
    Object.entries(UNITS_DATA).forEach(function(kv){
      var un=kv[0];var acoes=kv[1]||[];if(!acoes.length)return;
      html+=&#x27;&lt;p style=&quot;font-family:var(--font-mono);font-size:10px;color:var(--brand);text-transform:uppercase;margin:12px 0 6px&quot;&gt;&#x27;+escapeHtml(un)+&#x27;&lt;/p&gt;&#x27;;
      acoes.forEach(function(ac,ai){
        var sel=_udEditTarget&amp;&amp;_udEditTarget.u===un&amp;&amp;_udEditTarget.ai===ai;
        var bg=sel?&#x27;rgba(168,204,58,.10)&#x27;:&#x27;#071225&#x27;;
        var bd=sel?&#x27;rgba(168,204,58,.4)&#x27;:&#x27;#1e3050&#x27;;
        html+=&#x27;&lt;div onclick=&quot;udSelEditar(\&#x27;&#x27;+(un.replace(/\&#x27;/g,&#x27;&#x27;))+&#x27;\&#x27;,&#x27;+ai+&#x27;)&quot; style=&quot;display:flex;align-items:center;gap:8px;padding:8px 10px;background:&#x27;+bg+&#x27;;border:1px solid &#x27;+bd+&#x27;;border-radius:6px;margin-bottom:4px;cursor:pointer&quot;&gt;&lt;span style=&quot;color:var(--brand);font-family:var(--font-mono);font-size:11px;font-weight:900&quot;&gt;&#x27;+escapeHtml(ac.idac||&#x27;&#x27;)+&#x27;&lt;/span&gt;&lt;span style=&quot;color:#fff;font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap&quot;&gt;&#x27;+escapeHtml(ac.nome||&#x27;&#x27;)+&#x27;&lt;/span&gt;&lt;/div&gt;&#x27;;
      });
    });
    if(_udEditTarget){
      var a=(UNITS_DATA[_udEditTarget.u]||[])[_udEditTarget.ai];
      if(a){
        html+=&#x27;&lt;div style=&quot;margin-top:16px;padding-top:14px;border-top:1px solid #1e3050&quot;&gt;&lt;label style=&quot;display:block;font-size:10px;font-family:var(--font-mono);color:var(--brand);text-transform:uppercase;margin-bottom:6px&quot;&gt;Nome&lt;/label&gt;&lt;input id=&quot;ud-input-nome&quot; value=&quot;&#x27;+escapeHtml(a.nome||&#x27;&#x27;)+&#x27;&quot; style=&quot;width:100%;background:#071225;color:#fff;border:1px solid #2a4268;border-radius:8px;padding:8px 12px;font-size:13px;box-sizing:border-box;outline:none&quot;&gt;&lt;p style=&quot;color:#9ab;font-size:11px;margin:10px 0 6px&quot;&gt;Melhorias:&lt;/p&gt;&lt;div id=&quot;ud-melhorias-edit&quot;&gt;&#x27;;
        (a.melhorias||[]).forEach(function(m,mi){
          html+=&#x27;&lt;div style=&quot;display:flex;align-items:center;gap:6px;padding:5px 8px;background:#050d1c;border:1px solid #1e3050;border-radius:5px;margin-bottom:3px&quot;&gt;&lt;span style=&quot;color:var(--brand);font-family:var(--font-mono);font-size:10px;font-weight:900&quot;&gt;&#x27;+escapeHtml(m.idm||&#x27;&#x27;)+&#x27;&lt;/span&gt;&lt;input data-midx=&quot;&#x27;+mi+&#x27;&quot; value=&quot;&#x27;+escapeHtml(m.desc||&#x27;&#x27;)+&#x27;&quot; style=&quot;flex:1;background:transparent;color:#fff;border:none;border-bottom:1px solid #2a4268;padding:2px 4px;font-size:12px;outline:none&quot;&gt;&lt;/div&gt;&#x27;;
        });
        html+=&#x27;&lt;/div&gt;&lt;/div&gt;&#x27;;
      }
    }
    body.innerHTML=html;modal.style.display=&#x27;flex&#x27;;
  }

  function udSelEditar(u,ai){_udEditTarget={u:u,ai:ai};udAbrirModalEditar();}

  function udSalvarEdicao(){
    if(!_udEditTarget)return;
    var a=(UNITS_DATA[_udEditTarget.u]||[])[_udEditTarget.ai];
    if(!a)return;
    var inp=document.getElementById(&#x27;ud-input-nome&#x27;);
    if(inp&amp;&amp;inp.value.trim())a.nome=inp.value.trim();
    document.querySelectorAll(&#x27;#ud-melhorias-edit input[data-midx]&#x27;).forEach(function(el){
      var mi=parseInt(el.getAttribute(&#x27;data-midx&#x27;),10);
      if(!isNaN(mi)&amp;&amp;(a.melhorias||[])[mi]&amp;&amp;el.value.trim())a.melhorias[mi].desc=el.value.trim();
    });
    salvarUnitsData();
    var info=unitMap[_udEditTarget.u];
    if(info)renderUnit(info.key,_udEditTarget.u);
    atualizarStatsUnidade(_udEditTarget.u);
    udFecharModais();
  }

  function udAbrirModalExcluir(){
    var modal=document.getElementById(&#x27;ud-modal-excluir&#x27;);
    var body=document.getElementById(&#x27;ud-excluir-body&#x27;);
    if(!modal||!body)return;
    var html=&#x27;&#x27;;
    Object.entries(UNITS_DATA).forEach(function(kv){
      var un=kv[0];var acoes=kv[1]||[];if(!acoes.length)return;
      html+=&#x27;&lt;p style=&quot;font-family:var(--font-mono);font-size:10px;color:var(--brand);text-transform:uppercase;margin:12px 0 6px&quot;&gt;&#x27;+escapeHtml(un)+&#x27;&lt;/p&gt;&#x27;;
      acoes.forEach(function(ac,ai){
        html+=&#x27;&lt;div style=&quot;background:#071225;border:1px solid #1e3050;border-radius:6px;margin-bottom:6px;overflow:hidden&quot;&gt;&lt;div style=&quot;display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid #0e1f38&quot;&gt;&lt;span style=&quot;color:var(--brand);font-family:var(--font-mono);font-size:11px;font-weight:900&quot;&gt;&#x27;+escapeHtml(ac.idac||&#x27;&#x27;)+&#x27;&lt;/span&gt;&lt;span style=&quot;color:#fff;font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap&quot;&gt;&#x27;+escapeHtml(ac.nome||&#x27;&#x27;)+&#x27;&lt;/span&gt;&lt;button onclick=&quot;udConfAcao(\&#x27;&#x27;+(un.replace(/\&#x27;/g,&#x27;&#x27;))+&#x27;\&#x27;,&#x27;+ai+&#x27;)&quot; style=&quot;background:transparent;border:1px solid rgba(248,113,113,.5);border-radius:4px;color:#f87171;font-size:12px;font-weight:900;cursor:pointer;padding:2px 8px;flex-shrink:0&quot;&gt;x Excluir&lt;/button&gt;&lt;/div&gt;&#x27;;
        (ac.melhorias||[]).forEach(function(m,mi){
          html+=&#x27;&lt;div style=&quot;display:flex;align-items:center;gap:8px;padding:5px 10px 5px 24px&quot;&gt;&lt;span style=&quot;color:#5a7fb0;font-family:var(--font-mono);font-size:10px;font-weight:900&quot;&gt;&#x27;+escapeHtml(m.idm||&#x27;&#x27;)+&#x27;&lt;/span&gt;&lt;span style=&quot;color:#9ab;font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap&quot;&gt;&#x27;+escapeHtml(m.desc||&#x27;&#x27;)+&#x27;&lt;/span&gt;&lt;button onclick=&quot;udConfMelhoria(\&#x27;&#x27;+(un.replace(/\&#x27;/g,&#x27;&#x27;))+&#x27;\&#x27;,&#x27;+ai+&#x27;,&#x27;+mi+&#x27;)&quot; style=&quot;background:transparent;border:none;color:rgba(248,113,113,.6);font-size:14px;cursor:pointer;padding:0 6px&quot;&gt;x&lt;/button&gt;&lt;/div&gt;&#x27;;
        });
        html+=&#x27;&lt;/div&gt;&#x27;;
      });
    });
    body.innerHTML=html;modal.style.display=&#x27;flex&#x27;;
  }

  function udConfAcao(un,ai){
    var ac=(UNITS_DATA[un]||[])[ai];
    if(!ac||!confirm(&#x27;Excluir acao &#x27;+escapeHtml(ac.idac||&#x27;&#x27;)+&#x27;?&#x27;))return;
    (UNITS_DATA[un]||[]).splice(ai,1);salvarUnitsData();
    var info=unitMap[un];if(info)renderUnit(info.key,un);atualizarStatsUnidade(un);
    if(typeof p2Render===&#x27;function&#x27;)p2Render();udAbrirModalExcluir();
  }

  function udConfMelhoria(un,ai,mi){
    var ac=(UNITS_DATA[un]||[])[ai];if(!ac)return;
    var m=(ac.melhorias||[])[mi];
    if(!m||!confirm(&#x27;Excluir melhoria &#x27;+(m.idm||&#x27;&#x27;)+&#x27;?&#x27;))return;
    ac.melhorias.splice(mi,1);salvarUnitsData();
    var info=unitMap[un];if(info)renderUnit(info.key,un);
    if(typeof p2Render===&#x27;function&#x27;)p2Render();udAbrirModalExcluir();
  }


  const unitMap = {};

  function statusClass(s) {
    const status = String(s || &#x27;&#x27;).trim();
    const mapa = {
      &#x27;Não iniciada&#x27;: &#x27;naoiniciada&#x27;,
      &#x27;Não iniciado&#x27;: &#x27;naoiniciado&#x27;,
      &#x27;Em andamento&#x27;: &#x27;emandamento&#x27;,
      &#x27;Concluída&#x27;: &#x27;concluida&#x27;,
      &#x27;Executado&#x27;: &#x27;executado&#x27;,
      &#x27;Não executado&#x27;: &#x27;naoexecutado&#x27;,
      &#x27;Não concluída&#x27;: &#x27;naoconcluida&#x27;,
      &#x27;Com pendência&#x27;: &#x27;compendencias&#x27;,
      &#x27;Com pendências&#x27;: &#x27;compendencias&#x27;,
      &#x27;Concluída parcialmente&#x27;: &#x27;compendencias&#x27;
    };
    if (mapa[status]) return mapa[status];
    return status.toLowerCase()
      .replace(/\s+/g, &#x27;&#x27;)
      .replace(/[áàâã]/g,&#x27;a&#x27;)
      .replace(/[éê]/g,&#x27;e&#x27;)
      .replace(/[í]/g,&#x27;i&#x27;)
      .replace(/[óôõ]/g,&#x27;o&#x27;)
      .replace(/[ú]/g,&#x27;u&#x27;)
      .replace(/[ç]/g,&#x27;c&#x27;);
  }

  function contarMelhorias(action) {
    return Array.isArray(action.melhorias) ? action.melhorias.length : 0;
  }

  function getMelhoriaId(unidade, action, m) {
    return (unidade + &#x27;-&#x27; + action.idac + &#x27;-&#x27; + m.idm).replace(/[^a-zA-Z0-9_-]/g, &#x27;-&#x27;);
  }

  function getSavedField(mid, field, fallback) {
    try {
      const saved = localStorage.getItem(FIELD_KEY_PREFIX + mid + &#x27;.&#x27; + field);
      if (saved != null &amp;&amp; saved !== &#x27;&#x27;) return saved;
    } catch(e) {}
    return fallback;
  }

  function getSavedActionField(acaoId, field, fallback) {
    try {
      const saved = localStorage.getItem(ACAO_KEY_PREFIX + acaoId + &#x27;.&#x27; + field);
      if (saved != null &amp;&amp; saved !== &#x27;&#x27;) return saved;
    } catch(e) {}
    return fallback;
  }

  function calcularProgressoAcao(unidade, action) {
    const melhorias = Array.isArray(action.melhorias) ? action.melhorias : [];
    const total = melhorias.length;
    let concluidas = 0;
    melhorias.forEach(m =&gt; {
      const mid = getMelhoriaId(unidade, action, m);
      const status = getSavedField(mid, &#x27;status&#x27;, m.status);
      if (status === &#x27;Concluída&#x27;) concluidas++;
    });
    const pct = total ? Math.round((concluidas / total) * 100) : 0;
    return { total, concluidas, pct };
  }

  function atualizarProgressoAcao(unidade, action) {
    const acaoId = (unidade + &#x27;-&#x27; + action.idac).replace(/[^a-zA-Z0-9_-]/g, &#x27;-&#x27;);
    const p = calcularProgressoAcao(unidade, action);
    document.querySelectorAll(`[data-progress-acaoid=&quot;${acaoId}&quot;]`).forEach(el =&gt; {
      el.textContent = `${p.pct}%`;
      el.title = `${p.concluidas} de ${p.total} melhorias concluídas`;
    });
    document.querySelectorAll(`[data-progress-detail-acaoid=&quot;${acaoId}&quot;]`).forEach(el =&gt; {
      el.textContent = `${p.concluidas}/${p.total} (${p.pct}%)`;
    });
  }

  function atualizarTodosProgressos() {
    Object.entries(UNITS_DATA).forEach(([unidade, actions]) =&gt; {
      actions.forEach(action =&gt; atualizarProgressoAcao(unidade, action));
    });
  }


  function contarLinhasMelhoriasNoCard(domId) {
    const card = document.getElementById(domId);
    if (!card) return null;
    return card.querySelectorAll(&#x27;tbody &gt; tr:not(.obs-row)&#x27;).length;
  }

  function quantidadeMelhorias(action, domId) {
    const linhas = contarLinhasMelhoriasNoCard(domId);
    if (linhas !== null) return linhas;
    return contarMelhorias(action);
  }

  function atualizarContadoresAcao(domId) {
    const total = contarLinhasMelhoriasNoCard(domId);
    if (total === null) return;

    document.querySelectorAll(`.action-count[data-domid=&quot;${domId}&quot;]`).forEach(el =&gt; {
      el.textContent = el.classList.contains(&#x27;pill&#x27;) ? `${total} melhorias` : total;
    });

    document.querySelectorAll(`.action-count-title[data-domid=&quot;${domId}&quot;]`).forEach(el =&gt; {
      el.textContent = `Melhorias vinculadas (${total})`;
    });
  }

  function atualizarTodosContadoresDOM(scope = document) {
    scope.querySelectorAll(&#x27;.action-card[id]&#x27;).forEach(card =&gt; atualizarContadoresAcao(card.id));
  }

  function calcularTotalAcoes() {
    return Object.values(UNITS_DATA).reduce((total, actions) =&gt; total + actions.length, 0);
  }

  function calcularTotalMelhorias() {
    return Object.values(UNITS_DATA).reduce((total, actions) =&gt; {
      return total + actions.reduce((sub, action) =&gt; sub + contarMelhorias(action), 0);
    }, 0);
  }

  function parseDataResumo(valor) {
    if (!valor) return null;
    const v = String(valor).trim();
    if (!v) return null;
    let d = null;
    if (/^\d{4}-\d{2}-\d{2}$/.test(v)) {
      d = new Date(v + &#x27;T00:00:00&#x27;);
    } else {
      const m = v.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
      if (m) d = new Date(`${m[3]}-${m[2]}-${m[1]}T00:00:00`);
    }
    return d &amp;&amp; !isNaN(d.getTime()) ? d : null;
  }

  function formatarDataResumo(date) {
    if (!date) return &#x27;--/--/----&#x27;;
    return String(date.getDate()).padStart(2,&#x27;0&#x27;) + &#x27;/&#x27; + String(date.getMonth()+1).padStart(2,&#x27;0&#x27;) + &#x27;/&#x27; + date.getFullYear();
  }

  function calcularUltimaPrevisaoCronograma() {
    let ultima = null;
    Object.entries(UNITS_DATA || {}).forEach(([unidade, actions]) =&gt; {
      (actions || []).forEach(action =&gt; {
        const acaoId = (unidade + &#x27;-&#x27; + action.idac).replace(/[^a-zA-Z0-9_-]/g, &#x27;-&#x27;);
        const prevAcao = getSavedActionField(acaoId, &#x27;previsao&#x27;, action.previsao);
        const dataAcao = parseDataResumo(prevAcao);
        if (dataAcao &amp;&amp; (!ultima || dataAcao &gt; ultima)) ultima = dataAcao;
        (action.melhorias || []).forEach(m =&gt; {
          const mid = getMelhoriaId(unidade, action, m);
          const prevMelhoria = getSavedField(mid, &#x27;previsao&#x27;, m.previsao);
          const dataMelhoria = parseDataResumo(prevMelhoria);
          if (dataMelhoria &amp;&amp; (!ultima || dataMelhoria &gt; ultima)) ultima = dataMelhoria;
        });
      });
    });
    return ultima;
  }

  function atualizarResumoGeral() {
    const acoesEl = document.getElementById(&#x27;summary-acoes-total&#x27;);
    const melhoriasEl = document.getElementById(&#x27;summary-melhorias-total&#x27;);
    const previsaoFinalEl = document.getElementById(&#x27;summary-previsao-final&#x27;);
    if (acoesEl) acoesEl.textContent = calcularTotalAcoes();
    if (melhoriasEl) melhoriasEl.textContent = calcularTotalMelhorias();
    if (previsaoFinalEl) previsaoFinalEl.textContent = formatarDataResumo(calcularUltimaPrevisaoCronograma());
  }

  function calcularStatsUnidade(unidade) {
    const actions = UNITS_DATA[unidade] || [];
    const totalAcoes = actions.length;
    let totalMelh = 0, conc = 0;
    actions.forEach(action =&gt; {
      (action.melhorias || []).forEach(m =&gt; {
        totalMelh++;
        const melhoriaId = getMelhoriaId(unidade, action, m);
        let status = m.status;
        try {
          const saved = localStorage.getItem(FIELD_KEY_PREFIX + melhoriaId + &#x27;.status&#x27;);
          if (saved) status = saved;
        } catch(e) {}
        if (status === &#x27;Concluída&#x27;) conc++;
      });
    });
    const pct = totalMelh ? Math.round((conc / totalMelh) * 100) : 0;
    return { totalAcoes, totalMelh, conc, pct };
  }

  function addDiasISO(inicioISO, dias) {
    if (!inicioISO) return &#x27;&#x27;;
    const n = parseInt(dias, 10);
    if (!n || isNaN(n) || n &lt;= 0) return &#x27;&#x27;;
    const d = new Date(inicioISO + &#x27;T00:00:00&#x27;);
    if (isNaN(d)) return &#x27;&#x27;;
    d.setDate(d.getDate() + n);
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, &#x27;0&#x27;);
    const dd = String(d.getDate()).padStart(2, &#x27;0&#x27;);
    return yyyy + &#x27;-&#x27; + mm + &#x27;-&#x27; + dd;
  }

  // ===== Observações em log único por melhoria =====

  function obsLinhaVazia() {

  function obsLinhaTemConteudo(r) {

  function getObsLogRows(melhoriaId) {
    const key = OBS_KEY_PREFIX + melhoriaId;

      const raw = localStorage.getItem(key);
      if (raw) {

        if (Array.isArray(arr)) return normalizarObsLog(arr);
      }
    } catch (e) { /* ignore */ }

    // Migração silenciosa das 3 observações antigas, se existirem
    const migradas = [];
    for (let i = 1; i &lt;= 3; i++) {
      try {
        const antigo = localStorage.getItem(&#x27;reset.obs.v1.&#x27; + melhoriaId + &#x27;.&#x27; + i);
        if (antigo &amp;&amp; antigo.trim()) {
          migradas.push({ autor: &#x27;&#x27;, data: &#x27;&#x27;, desc: antigo, status: &#x27;-&#x27;, alerta: false });

  function normalizarObsLog(rows) {
    const limpas = (rows || []).map(r =&gt; ({
      autor: (r.autor || &#x27;&#x27;).toString(),
      data: (r.data || &#x27;&#x27;).toString(),
      desc: (r.desc || &#x27;&#x27;).toString(),
      status: r.status === &#x27;feito&#x27; || r.status === &#x27;✓&#x27; ? &#x27;feito&#x27; : (obsLinhaTemConteudo(r) ? &#x27;-&#x27; : &#x27;&#x27;),
      alerta: (r.alerta === true || r.alerta === &#x27;true&#x27;) &amp;&amp; obsLinhaTemConteudo(r) &amp;&amp; !(r.status === &#x27;feito&#x27; || r.status === &#x27;✓&#x27;)
    }));
    while (limpas.length &amp;&amp; !obsLinhaTemConteudo(limpas[limpas.length - 1])) limpas.pop();
    limpas.push(obsLinhaVazia());

  function alterarObsLog(melhoriaId, idx, field, value) {

  // ===== Projetos em Execução =====
  const PROJETOS_EXECUCAO_KEY = &#x27;reset.projetosExecucao.v1&#x27;;
  function projetosSlug(v) {
    return String(v ?? &#x27;&#x27;).toLowerCase().normalize(&#x27;NFD&#x27;).replace(/[\u0300-\u036f]/g,&#x27;&#x27;).replace(/[^a-z0-9]+/g,&#x27;-&#x27;).replace(/^-+|-+$/g,&#x27;&#x27;);

  function carregarProjetosExecucao() {

  }

  function projetoKey(unidade, acao, melhoria) {
    return [unidade, acao &amp;&amp; acao.idac, melhoria &amp;&amp; melhoria.idm].map(projetosSlug).join(&#x27;__&#x27;);

  // V6 — leitura única e segura dos projetos da melhoria.
  // Corrige o caso em que o P01 é salvo, o próximo código vira P02, mas a tabela não mostra o P01
  // por diferença de chave/unidade ou por sobra de gravação anterior.
  function projetosDaMelhoria(data, unidade, acao, melhoria) {
    data = data &amp;&amp; typeof data === &#x27;object&#x27; ? data : {};
    var canonical = projetoKey(unidade, acao, melhoria);
    var acSlug = projetosSlug(acao &amp;&amp; acao.idac);
    var melSlug = projetosSlug(melhoria &amp;&amp; melhoria.idm);
    var unSlug = projetosSlug(unidade);
    var out = [];
    var seen = {};
    function addList(arr) {
      if (!Array.isArray(arr)) return;
      arr.forEach(function(p){
        var sig = JSON.stringify(p || {});
        if (!seen[sig]) { seen[sig] = true; out.push(p); }
      });
    }
    addList(data[canonical]);
    Object.keys(data || {}).forEach(function(k){
      if (k === canonical) return;
      var parts = String(k).split(&#x27;__&#x27;);
      var keyUn = parts[0] || &#x27;&#x27;;
      var keyAc = parts[1] || &#x27;&#x27;;
      var keyMel = parts[2] || &#x27;&#x27;;
      var mesmaAcao = keyAc === acSlug || String(k).indexOf(&#x27;__&#x27; + acSlug + &#x27;__&#x27;) &gt;= 0;
      var mesmaMelhoria = keyMel === melSlug || String(k).endsWith(&#x27;__&#x27; + melSlug);
      /* T37: remove !keyUn — exige unidade explícita */
      var mesmaUnidade = keyUn === unSlug || String(k).indexOf(unSlug + &#x27;__&#x27;) === 0;
      if (mesmaAcao &amp;&amp; mesmaMelhoria &amp;&amp; mesmaUnidade) addList(data[k]);
      else if (Array.isArray(data[k])) {
        data[k].forEach(function(p){
          var pAc = projetosSlug((p &amp;&amp; p.acao) || &#x27;&#x27;);
          var pMel = projetosSlug((p &amp;&amp; p.melhoria) || &#x27;&#x27;);
          var pUn = projetosSlug((p &amp;&amp; p.unidade) || unidade || &#x27;&#x27;);
          if (pAc === acSlug &amp;&amp; pMel === melSlug &amp;&amp; (!pUn || pUn === unSlug)) addList([p]);
        });
      }
    });
    return out;
  }

  // V5 — corrige projetos salvos em chave errada: se o projeto foi gravado com unidade indefinida,
  // aplicação ou chave antiga, ele é migrado para a chave canônica UNIDADE__AC__MELHORIA.
  function normalizarProjetosExecucaoChaves(data) {
    try {
      data = data &amp;&amp; typeof data === &#x27;object&#x27; ? data : {};

  // ===== Importação / exportação JSON =====
  function coletarLocalStorageReset() {
    const data = {};
    try {
      for (let i = 0; i &lt; localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k &amp;&amp; k.indexOf(&#x27;reset.&#x27;) === 0) data[k] = localStorage.getItem(k);
      }
    } catch(e) {}
    return data;
  }

  function exportarJSON() {
    const payload = {
      versao: &#x27;reset-json-v2&#x27;,
      exportado_em: new Date().toISOString(),
      unidades: UNITS_DATA,
      localStorage: coletarLocalStorageReset()
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: &#x27;application/json&#x27; });
    const url = URL.createObjectURL(blob);
    const a = document.createElement(&#x27;a&#x27;);
    a.href = url;
    a.download = &#x27;sistema-reset-export.json&#x27;;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function importarJSON(event) {
    const file = event.target.files &amp;&amp; event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function() {
      try {
        const data = JSON.parse(reader.result);
        if (data.unidades &amp;&amp; typeof data.unidades === &#x27;object&#x27;) {
          Object.keys(UNITS_DATA).forEach(k =&gt; delete UNITS_DATA[k]);
          Object.assign(UNITS_DATA, data.unidades);
        }
        if (data.localStorage &amp;&amp; typeof data.localStorage === &#x27;object&#x27;) {
          Object.entries(data.localStorage).forEach(([k, v]) =&gt; {
            if (k.indexOf(&#x27;reset.&#x27;) === 0) localStorage.setItem(k, v);
          });
        }
        atualizarTelaCompleta();
        alert(&#x27;JSON importado com sucesso. Clique em “Salvar alterações” para enviar essa versão para a nuvem.&#x27;);
      } catch (e) {
        alert(&#x27;Não foi possível importar o JSON. Verifique se o arquivo é válido.&#x27;);
      } finally {
        event.target.value = &#x27;&#x27;;
      }
    };
    reader.readAsText(file);
  }

  // ===== Calendário de melhorias por início e unidade =====
  function getCalendarItems() {
    const items = [];
    Object.entries(UNITS_DATA).forEach(([unidade, actions]) =&gt; {
      actions.forEach(action =&gt; {
        (action.melhorias || []).forEach(m =&gt; {
          const mid = getMelhoriaId(unidade, action, m);
          const inicioISO = getSavedField(mid, &#x27;inicio&#x27;, dateISOFromBR(m.inicio));
          if (!inicioISO) return;
          items.push({
            date: inicioISO,
            unidade,
            acao: action.idac,
            melhoria: m.idm,
            desc: m.desc,
            status: getSavedField(mid, &#x27;status&#x27;, m.status)
          });
        });
      });
    });
    return items.sort((a,b) =&gt; a.date.localeCompare(b.date) || a.unidade.localeCompare(b.unidade));
  }

  function renderCalendarMonthOptions() {
    const sel = document.getElementById(&#x27;calendar-month&#x27;);
    if (!sel) return;
    const old = sel.value;
    const items = getCalendarItems();
    const months = [...new Set(items.map(i =&gt; i.date.slice(0,7)))];
    sel.innerHTML = months.map(m =&gt; {
      const [y, mo] = m.split(&#x27;-&#x27;);
      return `&lt;option value=&quot;${m}&quot;&gt;${mo}/${y}&lt;/option&gt;`;
    }).join(&#x27;&#x27;);
    if (months.includes(old)) sel.value = old;
    else if (months.length) sel.value = months[0];
  }

  function escapeHtml(value) {
    return String(value || &#x27;&#x27;).replace(/[&amp;&lt;&gt;&#x27;&quot;]/g, c =&gt; ({&#x27;&amp;&#x27;:&#x27;&amp;amp;&#x27;,&#x27;&lt;&#x27;:&#x27;&amp;lt;&#x27;,&#x27;&gt;&#x27;:&#x27;&amp;gt;&#x27;,&quot;&#x27;&quot;:&#x27;&amp;#39;&#x27;,&#x27;&quot;&#x27;:&#x27;&amp;quot;&#x27;}[c]));
  }

  function renderCalendar() {
    const grid = document.getElementById(&#x27;calendar-grid&#x27;);
    const sel = document.getElementById(&#x27;calendar-month&#x27;);
    const count = document.getElementById(&#x27;calendar-count&#x27;);
    if (!grid || !sel) return;
    if (!sel.options.length) renderCalendarMonthOptions();
    const month = sel.value;
    if (!month) {
      grid.innerHTML = &#x27;&lt;div class=&quot;calendar-empty&quot;&gt;Nenhuma melhoria encontrada.&lt;/div&gt;&#x27;;
      if (count) count.textContent = &#x27;&#x27;;
      return;
    }

    const items = getCalendarItems().filter(item =&gt; item.date.slice(0,7) === month);
    const byDate = {};
    items.forEach(item =&gt; {
      if (!byDate[item.date]) byDate[item.date] = [];
      byDate[item.date].push(item);
    });

    const dates = Object.keys(byDate).sort();
    if (!dates.length) {
      grid.innerHTML = &#x27;&lt;div class=&quot;calendar-empty&quot;&gt;Nenhuma melhoria encontrada para o mês selecionado.&lt;/div&gt;&#x27;;
      if (count) count.innerHTML = &#x27;&lt;strong&gt;0&lt;/strong&gt; melhorias no mês selecionado&#x27;;
      return;
    }

    const html = dates.map(date =&gt; {
      const [y, m, d] = date.split(&#x27;-&#x27;);
      const dayItems = byDate[date].sort((a,b) =&gt;
        a.unidade.localeCompare(b.unidade) ||
        a.acao.localeCompare(b.acao) ||
        a.melhoria.localeCompare(b.melhoria)
      );
      const cards = dayItems.map(item =&gt; {
        const statusSlug = statusClass(item.status);
        return `&lt;div class=&quot;kanban-card status-${statusSlug}&quot;&gt;
          &lt;strong&gt;${escapeHtml(item.unidade)} · ${escapeHtml(item.acao)} · ${escapeHtml(item.melhoria)}&lt;/strong&gt;

  /* ─── MAIN TAB ─── */
  .main-tabs-wrap {
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .main-tabs {
    max-width: 1320px;
    margin: 0 auto;
    padding: 0 28px;
    display: flex;
    gap: 4px;
  }
  .main-tab {
    padding: 14px 22px;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    background: transparent;
    border: none;
    border-bottom: 3px solid transparent;
    cursor: pointer;
    font-family: var(--font-main);
    text-transform: uppercase;
    letter-spacing: .07em;
    transition: color .2s, border-color .2s;
  }
  .main-tab:hover { color: var(--text); }
  .main-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: rgba(80,50,148,.06);
  }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* ─── NAV TABS ─── */
  .nav-tabs {
    max-width: 1320px;
    margin: auto;
    padding: 0 28px;
    display: flex;
    gap: 2px;
    overflow-x: auto;
  }
  .nav-tab {
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: .05em;
    transition: color .2s, border-color .2s;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ─── CONTAINER ─── */
  .container {
    max-width: 1320px;
    margin: 0 auto;
    padding: 28px 28px 60px;
  }

  /* ─── SECTION ─── */
  .section {
    margin-bottom: 28px;
    scroll-margin-top: 100px;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .section-letter {
    width: 32px; height: 32px;
    background: var(--accent);
    color: #fff;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .section-title { font-size: 15px; font-weight: 600; color: #e8f0fe; }
  .section-sub { font-size: 12px; color: var(--muted); }

  /* ─── CARD ─── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }
  .card + .card { margin-top: 12px; }

  /* ─── METRICS ROW ─── */
  .metrics-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .metric strong {
    display: block;
    font-size: 22px;
    font-family: var(--font-mono);
    color: #e8f0fe;
  }
  .metric span { display: block; color: var(--muted); font-size: 11px; margin-top: 4px; text-transform: uppercase; letter-spacing: .05em; }

  /* ─── FIELDS ─── */
  .field { margin-bottom: 14px; }
  label.lbl {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 6px;
  }
  input, select, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 13px;
    font-family: var(--font-main);
    transition: border-color .2s, box-shadow .2s;
    outline: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(80,50,148,.20);
  }
  textarea { min-height: 80px; resize: vertical; }
  input::placeholder, textarea::placeholder { color: var(--muted); opacity: .7; }
  select option { background: var(--surface2); }

  /* ─── GRID HELPERS ─── */
  .g2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; }
  .g3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
  .g4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
  .g5 { display: grid; grid-template-columns: repeat(5,1fr); gap: 14px; }
  .g6 { display: grid; grid-template-columns: repeat(6,1fr); gap: 14px; }

  /* ─── HELP TEXT ─── */
  .help {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 16px;
    padding: 10px 14px;
    background: rgba(80,50,148,.07);
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
  }

  /* ─── SCORE ─── */
  .score-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 10px;
    align-items: end;
  }
  .score-total-box {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    margin-top: 14px;
  }
  .score-number {
    font-family: var(--font-mono);
    font-size: 36px;
    font-weight: 600;
  }
  .score-label { font-size: 13px; font-weight: 600; margin-top: 2px; }
  .score-hint { font-size: 11px; color: var(--muted); }
  .lvl-critical { color: var(--red); }
  .lvl-high     { color: var(--yellow); }
  .lvl-medium   { color: #60a5fa; }
  .lvl-low      { color: var(--green); }

  /* ─── RESET TABLE ─── */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 99px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    font-weight: 600;
    font-size: 12px;
    font-family: var(--font-mono);
  }
  .pill.r { color: #fca5a5; border-color: #fca5a580; }
  .pill.e1 { color: #93c5fd; border-color: #93c5fd80; }
  .pill.s { color: #fcd34d; border-color: #fcd34d80; }
  .pill.e2 { color: var(--green); border-color: #34d39980; }
  .pill.t { color: var(--purple); border-color: #a78bfa80; }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--surface2);
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .06em;
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  tbody td {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    vertical-align: top;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  /* ─── CHECKLIST ─── */
  .check-list { display: flex; flex-direction: column; gap: 8px; }
  .check-item-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .check-item-row:hover { background: var(--surface2); }
  .check-item-row.checked {
    border-color: var(--green);
    background: rgba(52,211,153,.06);
  }
  .check-item-row input[type=&quot;checkbox&quot;] {
    width: 16px; height: 16px;
    accent-color: var(--green);
    flex-shrink: 0;
    margin-top: 1px;
    cursor: pointer;
  }
  .check-item-row span { font-size: 13px; line-height: 1.5; }

  /* ─── CHECKLIST DETAIL (Validation Checklist) ─── */
  .check-detail {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .check-detail-title {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .check-num {
    width: 22px; height: 22px;
    background: var(--accent);
    color: #fff;
    border-radius: 50%;
    font-size: 11px;
    font-weight: 600;
    font-family: var(--font-mono);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .check-detail .g2 { margin-top: 10px; }
  .radio-group { display: flex; gap: 12px; margin-top: 10px; }
  .radio-btn {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    text-align: center;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: all .15s;
    user-select: none;
  }
  .radio-btn.approved { border-color: var(--green); color: var(--green); background: rgba(52,211,153,.08); }
  .radio-btn.rejected { border-color: var(--red); color: var(--red); background: rgba(248,113,113,.08); }
  .radio-btn.partial { border-color: var(--yellow); color: var(--yellow); background: rgba(251,191,36,.10); }
  .radio-btn.neutral { color: var(--muted); }

  /* ─── IMPROVEMENTS TABLE ─── */
  .status-tag {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .status-tag.done { color: var(--green); border-color: #34d39950; background: rgba(52,211,153,.08); }
  .status-tag.inprogress { color: var(--yellow); border-color: #fbbf2450; background: rgba(251,191,36,.08); }
  .status-tag.pending { color: var(--muted); }

  /* ─── BUTTONS ─── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 16px;
    border: none;
    border-radius: 8px;
    font-family: var(--font-main);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
  .btn-secondary:hover { background: var(--border); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--border2); }
  .actions-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }

  /* ─── DIVIDER ─── */
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* ─── VALIDATION SUMMARY ─── */
  .validation-summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }
  .vs-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }
  .vs-box strong { display: block; font-size: 26px; font-family: var(--font-mono); }
  .vs-box span { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  .vs-box.approved { border-color: #34d39960; }
  .vs-box.approved strong { color: var(--green); }
  .vs-box.rejected { border-color: #f8717160; }
  .vs-box.rejected strong { color: var(--red); }

  /* ─── TOAST ─── */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transform: translateY(10px);
    transition: all .3s ease;
    z-index: 999;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* ─── AMBIENT TABLE ─── */
  .amb-table {
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .amb-header {
    display: grid;
    grid-template-columns: 1.4fr 1.2fr 1fr 1.4fr 1fr;
    gap: 0;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 8px 12px;
  }
  .amb-header &gt; div {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .07em;
  }
  .amb-row {
    display: grid;
    grid-template-columns: 1.4fr 1.2fr 1fr 1.4fr 1fr;
    gap: 0;
    border-bottom: 1px solid var(--border);
    padding: 10px 12px;
    align-items: start;
    transition: background .15s;
  }
  .amb-row:last-child { border-bottom: none; }
  .amb-row:hover { background: rgba(80,50,148,.05); }
  .amb-row.row-approved { background: rgba(52,211,153,.05); border-left: 3px solid var(--green); }
  .amb-row.row-rejected { background: rgba(248,113,113,.05); border-left: 3px solid var(--red); }
  /* Variante: tabela com coluna de descricao mais larga (Acao tecnica) */
  .amb-table.wide-desc .amb-header,
  .amb-table.wide-desc .amb-row { grid-template-columns: 1.6fr 1.1fr 2.4fr .95fr .95fr .65fr; }
  /* Status alinhado a direita aproveitando o espaco vago */
  .amb-table.wide-desc .amb-status-cell { align-items: flex-end; }
  .amb-table.wide-desc .amb-status-cell .lbl { text-align: right; }
  /* Barra de aprovacao por linha (usado no Item 1 - plano de manutencao) */
  .amb-row-approval {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    background: rgba(80,50,148,.04);
  }
  .amb-table &gt; .amb-row-approval:last-child { border-bottom: none; }
  .amb-cell { padding: 0 8px 0 0; }
  .amb-cell .lbl { font-size: 9px; }
  .amb-cell input {
    font-size: 12px;
    padding: 6px 8px;
  }
  .amb-status-cell { display: flex; flex-direction: column; }
  .amb-radio-group {
    display: flex;
    gap: 4px;
    margin-top: 0;
  }
  .amb-radio {
    width: 32px; height: 32px;
    border-radius: 6px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    cursor: pointer;
    transition: all .15s;
    user-select: none;
  }
  .amb-radio.neutral { color: var(--muted); }
  .amb-radio.neutral:hover { border-color: var(--border2); color: var(--text); }
  .amb-radio.approved { background: rgba(52,211,153,.15); border-color: var(--green); color: var(--green); }
  .amb-radio.rejected { background: rgba(248,113,113,.15); border-color: var(--red); color: var(--red); }
  .amb-radio.pending  { background: rgba(251,191,36,.10); border-color: var(--yellow); color: var(--yellow); }
  .amb-radio.partial  { background: rgba(251,191,36,.18); border-color: var(--yellow); color: var(--yellow); }
  @media (max-width: 900px) {
    .amb-header { display: none; }
    .amb-row { grid-template-columns: 1fr 1fr; gap: 8px; }
    .amb-row { padding: 12px; }
  }
  @media (max-width: 600px) {
    .amb-row { grid-template-columns: 1fr; }
  }

  /* Cor verde Bolix nos labels */
  label.lbl,
  .amb-header &gt; div {
    color: var(--brand);
  }

  /* ─── WORKFLOW (assinatura + trava de aba) ─── */
  .signoff-bar {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 18px;
    display: flex;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 16px;
    row-gap: 14px;
  }
  .signoff-bar .sb-status {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
    padding: 4px 10px;
    border-radius: 6px;
    background: rgba(251,191,36,.15);
    color: var(--yellow);
    border: 1px solid #fbbf2440;
  }
  .signoff-bar select.sb-status {
    width: auto;
    min-width: 190px;
    height: 32px;
    padding: 4px 10px;
  }
  .signoff-bar.locked .sb-status {
    background: rgba(168,204,58,.15);
    color: var(--brand);
    border-color: rgba(168,204,58,.4);
  }
  .signoff-bar .sb-field {
    display: flex; flex-direction: column; gap: 4px; min-width: 200px;
  }
  .signoff-bar .sb-actions {
    display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap;
  }
  .tab-pane.locked input,
  .tab-pane.locked select,
  .tab-pane.locked textarea {
    pointer-events: none;
    opacity: .85;
  }
  .tab-pane.locked .amb-radio,
  .tab-pane.locked .radio-btn,
  .tab-pane.locked .check-item-row {
    pointer-events: none;
    opacity: .8;
  }
  .tab-pane.locked .signoff-bar input,
  .tab-pane.locked .signoff-bar select,
  .tab-pane.locked .signoff-bar button { pointer-events: auto; opacity: 1; }
  .tab-pane.locked .signoff-bar .sb-unlock { display: inline-flex !important; }
  .tab-pane.locked .signoff-bar .sb-conclude { display: none !important; }
  .signoff-bar .sb-unlock { display: none; }

  /* ─── SIGNOFF (grade unificada 5 colunas x 5 linhas com Implantacao/Medicao tall na direita) ─── */
  .sb-grid {
    display: grid;
    grid-template-columns: 1.3fr 1.3fr 1.3fr 1.1fr 1.1fr;
    grid-template-rows: auto auto auto auto auto;
    column-gap: 14px;
    row-gap: 14px;
    align-items: end;
  }
  .sb-score-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--brand);
    text-transform: uppercase;
    letter-spacing: .07em;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(168,204,58,.25);
    margin-top: 4px;
    align-self: end;
  }
  /* Coluna alta (Implantacao / Medicao) ocupa todas as linhas */
  .sb-tall-col {
    display: flex;
    flex-direction: column;
    align-self: stretch;
    background: rgba(80,50,148,.05);
    border: 1px solid rgba(168,204,58,.18);
    border-radius: 10px;
    padding: 12px;
  }
  .sb-tall-col .group-title {
    text-align: center;
    margin-bottom: 14px;
    padding-bottom: 8px;
  }
  .sb-tall-col .group-fields-tall {
    display: flex;
    flex-direction: column;
    gap: 14px;
    flex: 1;
    justify-content: space-around;
  }
  .sb-tall-col .group-fields-tall .field {
    margin-bottom: 0;
    text-align: center;
  }
  .sb-tall-col .group-fields-tall .field .lbl { text-align: center; }
  .sb-tall-col .group-fields-tall input {
    text-align: center;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 16px;
    padding: 12px 8px;
    height: 44px;
  }
  .sb-tall-col .group-fields-tall input[readonly] {
    background: rgba(168,204,58,.08);
  }
  /* Field-group reutilizado para Implantacao e Medicao da Eficacia */
  .field-group .group-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--brand);
    text-transform: uppercase;
    letter-spacing: .06em;
    padding-bottom: 6px;
    margin-bottom: 8px;
    border-bottom: 1px solid rgba(168,204,58,.25);
    text-align: center;
  }
  .field-group .group-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .field-group .group-fields input {
    text-align: center;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 14px;
    padding: 10px 8px;
    height: 40px;
  }
  .field-group .group-fields input[readonly] {
    background: rgba(168,204,58,.06);
  }

  /* ─── Score da atuacao interna - 3 colunas em cima, 3 embaixo ─── */
  .signoff-score {
    margin-top: 4px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .signoff-score-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--brand);
    text-transform: uppercase;
    letter-spacing: .07em;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(168,204,58,.25);
  }
  .signoff-score-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    align-items: end;
  }
  /* Caixa do Resultado da Atuacao - numero + classificacao inline (mesmo modelo da Pontuacao das Melhorias) */
  .score-result-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-sizing: border-box;
    transition: border-color .2s, color .2s;
  }
  .score-result-box .score-number {
    font-size: 18px;
    line-height: 1;
    font-weight: 700;
    font-family: var(--font-main);
  }
  .score-result-box .score-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: capitalize;
    line-height: 1;
  }
  .score-result-box.lvl-low      { border-color: rgba(52,211,153,.4); }
  .score-result-box.lvl-medium   { border-color: rgba(96,165,250,.4); }

&lt;script&gt;
/* ─── SYNC: Acao do Reset -&gt; Acao do Formulario ─── */
  function syncAcao() {
    const src = document.getElementById('acaoReset');
    const dst = document.getElementById('acaoFormulario');
    if (src &amp;&amp; dst) dst.value = src.value;
  }
  document.addEventListener('DOMContentLoaded', () =&gt; {
    const src = document.getElementById('acaoReset');
    const dst = document.getElementById('acaoFormulario');
    if (src &amp;&amp; dst) {
      // Sincronizar valor inicial
      if (src.value) dst.value = src.value;
    }
  });

  /* ─── WORKFLOW: export, import, lock ─── */
  const FORM_VERSION = 'reset-ac01-v1';

  function sanitizeFilePart(value) {
    return String(value || '')
      .trim()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-zA-Z0-9-_ ]+/g, '')
      .replace(/\s+/g, '-')
      .replace(/-+/g, '-')
      .replace(/^-|-$/g, '');
  }

  function getTituloArquivo() {
    return sanitizeFilePart(document.querySelector('header h1')?.textContent || document.title || 'RESET');
  }

  function getIdArquivo() {
    const idEl = document.getElementById('registroId') || document.querySelector('input[value^=&quot;AC-02&quot;]');
    return sanitizeFilePart(idEl?.value || 'SEM-ID');
  }

  function getNomeArquivoBase() {
    return `${getTituloArquivo()}-${getIdArquivo()}`;
  }

  function collectTabData(tabName) {
    const pane = document.getElementById('pane-' + tabName);
    if (!pane) return null;
    const fields = pane.querySelectorAll('input, select, textarea');
    const values = [];
    fields.forEach(f =&gt; values.push({ type: f.type || f.tagName.toLowerCase(), id: f.id || '', value: f.value }));
    return {
      version: FORM_VERSION,
      tab: tabName,
      exportedAt: new Date().toISOString(),
      responsavel: document.getElementById('resp-' + tabName)?.value || '',
      dataPreenchimento: document.getElementById('data-' + tabName)?.value || '',
      locked: pane.classList.contains('locked'),
      values: values
    };
  }

  function exportTabData(tabName) {
    const data = collectTabData(tabName);
    if (!data) return;
    if (!data.dataPreenchimento) {
      data.dataPreenchimento = new Date().toISOString().slice(0, 10);
      const dEl = document.getElementById('data-' + tabName);
      if (dEl) dEl.value = data.dataPreenchimento;
    }
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().slice(0, 16).replace(/[:T]/g, '-');
    a.href = url;
    a.download = `${getNomeArquivoBase()}-${tabName}-${stamp}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('Dados da aba ' + tabName + ' exportados');
  }

  function applyTabData(data) {
    const pane = document.getElementById('pane-' + data.tab);
    if (!pane) { alert('Aba não encontrada: ' + data.tab); return; }
    const fields = pane.querySelectorAll('input, select, textarea');
    if (!Array.isArray(data.values)) { alert('JSON sem campos válidos'); return; }
    data.values.forEach((v, i) =&gt; {
      if (fields[i]) {
        fields[i].value = (typeof v === 'object') ? v.value : v;
      }
    });
    if (data.responsavel) {
      const r = document.getElementById('resp-' + data.tab);
      if (r) r.value = data.responsavel;
    }
    if (data.dataPreenchimento) {
      const d = document.getElementById('data-' + data.tab);
      if (d) d.value = data.dataPreenchimento;
    }
    restoreVisualStates();
    restoreResetLetterSelections();
    if (data.locked) lockTab(data.tab);
    updateProgress();
    if (typeof updateCheckSummary === 'function') updateCheckSummary();
    if (typeof updateMelhoriasSummary === 'function') updateMelhoriasSummary();
    toast('Dados importados com sucesso');
  }

  function importTabData(tabName, file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) =&gt; {
      try {
        const data = JSON.parse(e.target.result);
        if (data.tab &amp;&amp; data.tab !== tabName) {
          if (!confirm('O arquivo é da aba &quot;' + data.tab + '&quot;, mas você está importando na &quot;' + tabName + '&quot;. Deseja continuar mesmo assim?')) return;
        }
        applyTabData(data);
      } catch (err) {
        alert('Erro ao importar JSON: ' + err.message);
      }
    };
    reader.readAsText(file);
  }

    document.querySelectorAll('.amb-status, .m-status, .eficaz-status').forEach(hidden =&gt; {
      const val = hidden.value;
      const cell = hidden.closest('.amb-status-cell, td');
      if (!cell) return;
      const group = cell.querySelector('.amb-radio-group');
      if (!group) return;
      group.querySelectorAll('.amb-radio').forEach(b =&gt; b.className = 'amb-radio neutral');
      group.querySelectorAll('.amb-radio').forEach(b =&gt; {
        const onclick = b.getAttribute('onclick') || '';

          if (val === 'approved' || val === 'yes') b.className = 'amb-radio approved';
          else if (val === 'rejected' || val === 'no') b.className = 'amb-radio rejected';

          else                         b.className = 'amb-radio pending';

      });

      }

      const group = hidden.closest('.check-detail')?.querySelector('.radio-group');
      if (!group) return;
      group.querySelectorAll('.radio-btn').forEach(b =&gt; b.className = 'radio-btn neutral');
      group.querySelectorAll('.radio-btn').forEach(b =&gt; {
        const onclick = b.getAttribute('onclick') || '';
        if (onclick.includes(&quot;'&quot; + val + &quot;'&quot;) &amp;&amp; onclick.includes(&quot;'&quot; + hidden.id + &quot;'&quot;)) {

          else if (val === 'rejected') b.className = 'radio-btn rejected';
          else if (val === 'partial')  b.className = 'radio-btn partial';

  /* ─── SCORES ─── */
  function classify(total) {
    if (total &gt;= 11) return ['Crítico','lvl-critical'];
    if (total &gt;= 9)  return ['Alto','lvl-high'];
    if (total &gt;= 6)  return ['Médio','lvl-medium'];
    return ['Baixo','lvl-low'];
  }

  function calcularGrupo(cls, numId, lblId) {
    const elements = [...document.querySelectorAll('.' + cls)];
    const valid = elements.filter(el =&gt; el.value !== '' &amp;&amp; !isNaN(+el.value));
    const numEl = document.getElementById(numId);
    const lblEl = document.getElementById(lblId);
    const box = numEl ? numEl.parentElement : null;
    if (box &amp;&amp; box.classList.contains('score-result-box')) {
      box.classList.remove('lvl-low','lvl-medium','lvl-high','lvl-critical');
    }
    if (valid.length === 0) {
      // Nenhuma selecao - exibir vazio
      if (numEl) { numEl.textContent = ''; numEl.className = 'score-number'; }
      if (lblEl) { lblEl.textContent = ''; lblEl.className = 'score-label'; }
      atualizarFragilidadeOperacional(null, '', '');
      return;
    }
    const total = valid.map(el =&gt; +el.value).reduce((a,b)=&gt;a+b, 0);
    const [txt, klass] = classify(total);
    if (numEl) {
      numEl.textContent = total;
      numEl.className = 'score-number ' + klass;
    }
    if (box &amp;&amp; box.classList.contains('score-result-box')) {
      box.classList.add(klass);
    }
    if (lblEl) {
      lblEl.textContent = txt;
      lblEl.className = 'score-label ' + klass;
    }
    atualizarFragilidadeOperacional(total, txt, klass);
    if (typeof gerarDiagnostico === 'function') gerarDiagnostico();
  }

  function atualizarFragilidadeOperacional(total, label, cls) {
    const nivelEl = document.getElementById('nivelFragilidade');
    if (!nivelEl) return;
    if (!total || !label) {
      nivelEl.value = '';
      nivelEl.className = '';
      return;
    }
    nivelEl.value = label;
    nivelEl.className = cls;
  }

  function atualizarDiagnosticoInteligente() {
    const totalEl = document.getElementById('atuacaoTotal');
    const labelEl = document.getElementById('atuacaoLabel');
    const nivelEl = document.getElementById('nivelFragilidade');
    const diagEl  = document.getElementById('diagnosticoAutomatizado');
    const recEl   = document.getElementById('recomendacaoAutomatizada');

    if (!diagEl || !recEl) return;

    const score = parseFloat((totalEl?.textContent || '').trim());
    const atuacaoLabel = (labelEl?.textContent || '').trim();
    const fragilidade = (nivelEl?.value || '').trim();

    if (isNaN(score) || !atuacaoLabel || !fragilidade) {
      diagEl.textContent = '';
      recEl.textContent = '';
      return;
    }

    const resultado = diagnosticoOperacional(score);
    diagEl.textContent = resultado.diagnostico;
    recEl.textContent = resultado.recomendacao;
  }

  function diagnosticoOperacional(score) {
    if (score &lt;= 5) {
      return {
        diagnostico: 'Atuação controlada',
        recomendacao: 'Manter padrão de execução, evidências e rotina de acompanhamento.'
      };
    }
    if (score &lt;= 8) {
      return {
        diagnostico: 'Atuação com desvios moderados',
        recomendacao: 'Ajustar controle, prazo ou evidência antes de considerar a atuação estabilizada.'
      };
    }
    if (score &lt;= 10) {
      return {
        diagnostico: 'Atuação instável',
        recomendacao: 'Reforçar controle operacional e corrigir desvios antes de avançar.'
      };
    }
    return {
      diagnostico: 'Atuação crítica',
      recomendacao: 'Reestruturar a atuação operacional antes de qualquer encerramento.'
    };
  }

  function obterResumoMelhorias() {
    const itens = [...document.querySelectorAll('.m-status')];
    const total = itens.length;
    const aprovadas = itens.filter(i =&gt; i.value === 'approved').length;
    const reprovadas = itens.filter(i =&gt; i.value === 'rejected').length;
    const parciais = itens.filter(i =&gt; i.value === 'partial').length;
    const pendentes = itens.filter(i =&gt; i.value === 'none').length;
    return { total, aprovadas, reprovadas, parciais, pendentes };
  }

  function parseDataPrazo(valor) {
    if (!valor) return null;
    valor = String(valor).trim();

    // input type=&quot;date&quot; retorna yyyy-mm-dd
    if (/^\d{4}-\d{2}-\d{2}$/.test(valor)) {
      const [ano, mes, dia] = valor.split('-').map(Number);
      return new Date(ano, mes - 1, dia);
    }

    // fallback para dd/mm/aaaa, caso o navegador/localidade exponha esse formato
    if (/^\d{2}\/\d{2}\/\d{4}$/.test(valor)) {
      const [dia, mes, ano] = valor.split('/').map(Number);
      return new Date(ano, mes - 1, dia);
    }

    return null;
  }

  function obterResumoPrazos() {
    const rows = [...document.querySelectorAll('.melhorias-table-pro tr.melhoria-item')];
    let noPrazo = 0, atrasadas = 0, semDatas = 0;
    rows.forEach(tr =&gt; {
      const cells = tr.querySelectorAll('td');
      const previsaoValor = cells[4]?.querySelector('input[type=&quot;date&quot;]')?.value || '';
      const conclusaoValor = cells[5]?.querySelector('input[type=&quot;date&quot;]')?.value || '';
      const previsao = parseDataPrazo(previsaoValor);
      const conclusao = parseDataPrazo(conclusaoValor);
      if (!previsao || !conclusao) semDatas++;
      else if (conclusao &lt;= previsao) noPrazo++;
      else atrasadas++;
    });
    const total = rows.length;
    const avaliadas = noPrazo + atrasadas;
    const pctAtraso = total ? Math.round((atrasadas / total) * 100) : 0;
    const pctAtrasoAvaliado = avaliadas ? Math.round((atrasadas / avaliadas) * 100) : 0;
    return { total, noPrazo, atrasadas, semDatas, avaliadas, pctAtraso, pctAtrasoAvaliado };
  }

  function atualizarAlertaPrazoTopo() {
    const prazos = obterResumoPrazos();
    const box = document.getElementById('alertaPrazoTopo');
    const texto = document.getElementById('alertaPrazoTexto');
    const pct = document.getElementById('alertaPrazoPct');
    if (!box || !texto || !pct) return;

    box.classList.remove('ok', 'warn', 'crit');
    pct.textContent = `${prazos.pctAtraso}%`;

    if (!prazos.total || prazos.avaliadas === 0) {
      box.classList.add('ok');
      texto.textContent = `Ainda não há datas suficientes para medir atraso. ${prazos.semDatas}/${prazos.total} item(ns) sem previsão ou conclusão.`;
      return;
    }

    if (prazos.atrasadas === 0) {
      box.classList.add('ok');
      texto.textContent = `Nenhum item atrasado. ${prazos.noPrazo}/${prazos.total} dentro do prazo; ${prazos.semDatas} sem datas.`;
    } else if (prazos.pctAtraso &lt;= 20) {
      box.classList.add('warn');
      texto.textContent = `${prazos.atrasadas}/${prazos.total} item(ns) atrasado(s). ${prazos.noPrazo} no prazo; ${prazos.semDatas} sem datas.`;
    } else {
      box.classList.add('crit');
      texto.textContent = `${prazos.atrasadas}/${prazos.total} item(ns) atrasado(s). Replanejar prazos e responsáveis antes de avançar.`;
    }
  }

  function atualizarInteligenciaEstrategica(stats) {
    const prazos = obterResumoPrazos();
    const eficazAll = [...document.querySelectorAll('.eficaz-status')];
    const sim = eficazAll.filter(i =&gt; i.value === 'yes').length;
    const parcialEficaz = eficazAll.filter(i =&gt; i.value === 'partial').length;
    const efiPct = stats.total ? Math.round(((sim + 0.5 * parcialEficaz) / stats.total) * 100) : 0;
    const implPct = stats.total ? Math.round(((stats.ap + 0.5 * stats.pa) / stats.total) * 100) : 0;

    const reco = document.getElementById('proRecomendacao');
    if (!reco) return;

    if (!stats.interacted &amp;&amp; prazos.semDatas === prazos.total) {
      reco.innerHTML = 'Preencha a avaliação das melhorias para gerar a recomendação.';
      const prazoEl = document.getElementById('proResumoPrazo');
      if (prazoEl) {
        prazoEl.innerHTML = `&lt;strong&gt;Prazo&lt;/strong&gt;${prazos.pctAtraso}% atrasado(s) · ${prazos.noPrazo} no prazo · ${prazos.atrasadas} atrasada(s) · ${prazos.semDatas} sem datas.`;
      }
      return;
    }

    let msg = '';
    if (stats.re &gt; 0) {
      msg = '&lt;strong&gt;Prioridade estratégica:&lt;/strong&gt; reavaliar melhorias reprovadas antes de encerrar a ação.';
    } else if (prazos.atrasadas &gt; 0 &amp;&amp; implPct &lt; 60) {
      msg = '&lt;strong&gt;Alerta de execução:&lt;/strong&gt; há atraso e baixa implantação. Replanejar responsáveis, prazos e sequência das entregas.';
    } else if (prazos.atrasadas &gt; 0) {
      msg = '&lt;strong&gt;Alerta de prazo:&lt;/strong&gt; existem entregas concluídas fora da previsão. Avaliar causa do atraso e ajustar próximos ciclos.';
    } else if (implPct &lt; 50) {
      msg = '&lt;strong&gt;Risco de baixa implantação:&lt;/strong&gt; a ação ainda não ganhou tração suficiente. Priorizar conclusão das entregas-base.';
    } else if (implPct &gt;= 70 &amp;&amp; efiPct &lt; 60) {
      msg = '&lt;strong&gt;Risco de sustentação:&lt;/strong&gt; a implantação avançou, mas a eficácia ainda não acompanha. Medir resultado real antes de escalar.';
    } else if (implPct &gt;= 70 &amp;&amp; efiPct &gt;= 70) {
      msg = '&lt;strong&gt;Padrão em consolidação:&lt;/strong&gt; implantação e eficácia estão positivas. Manter calendário, rotina e acompanhamento.';
    } else {
      msg = '&lt;strong&gt;Acompanhamento necessário:&lt;/strong&gt; continuar a implantação e completar a medição de eficácia.';
    }

    reco.innerHTML = msg;
    const prazoEl = document.getElementById('proResumoPrazo');
    if (prazoEl) {
      prazoEl.innerHTML = `&lt;strong&gt;Prazo&lt;/strong&gt;${prazos.pctAtraso}% atrasado(s) · ${prazos.noPrazo} no prazo · ${prazos.atrasadas} atrasada(s) · ${prazos.semDatas} sem datas.`;
    }
  }

  function calcularFaixasDinamicas(totalMelhorias) {
    const max = Math.max(1, totalMelhorias * 2);
    return {
      max,
      baixoMax: Math.floor(max * 0.25),
      medioMax: Math.floor(max * 0.50),
      altoMax: Math.floor(max * 0.75)
    };
  }

  function classificarFragilidade(score, totalMelhorias) {
    const f = calcularFaixasDinamicas(totalMelhorias);
    if (score &gt; f.altoMax)  return { label: 'Crítico', cls: 'lvl-critical', faixas: f };
    if (score &gt; f.medioMax) return { label: 'Alto',    cls: 'lvl-high',     faixas: f };
    if (score &gt; f.baixoMax) return { label: 'Médio',   cls: 'lvl-medium',   faixas: f };
    return { label: 'Baixo', cls: 'lvl-low', faixas: f };
  }

  function atualizarPainelProMelhorias(stats) {
    const total = stats.total || 0;
    const implPct = total ? Math.round(((stats.ap + 0.5 * stats.pa) / total) * 100) : 0;
    const eficazAll = [...document.querySelectorAll('.eficaz-status')];
    const sim = eficazAll.filter(i =&gt; i.value === 'yes').length;
    const nao = eficazAll.filter(i =&gt; i.value === 'no').length;
    const parcial = eficazAll.filter(i =&gt; i.value === 'partial').length;
    const efiMarcadas = sim + nao + parcial;
    const efiPct = total ? Math.round(((sim + 0.5 * parcial) / total) * 100) : 0;

    const setText = (id, txt) =&gt; { const el = document.getElementById(id); if (el) el.textContent = txt; };
    const setWidth = (id, pct) =&gt; { const el = document.getElementById(id); if (el) el.style.width = Math.max(0, Math.min(100, pct)) + '%'; };

    setText('proImplPct', implPct + '%');
    setText('proImplBase', `${stats.ap + stats.pa}/${total}`);
    setWidth('proImplBar', implPct);

    setText('proEfiPct', efiPct + '%');
    setText('proEfiBase', `${efiMarcadas}/${total}`);
    setWidth('proEfiBar', efiPct);

    atualizarInteligenciaEstrategica(stats);
  }

  function updateMelhoriasSummary() {
    const all = [...document.querySelectorAll('.m-status')];
    const ap = all.filter(i =&gt; i.value === 'approved').length;
    const re = all.filter(i =&gt; i.value === 'rejected').length;
    const pa = all.filter(i =&gt; i.value === 'partial').length;
    const pe = all.filter(i =&gt; i.value === 'none').length;
    const interacted = (ap + re + pa) &gt; 0;
    if (!interacted) {
      // Sem nenhuma marcacao - manter campos calculados em branco
      ['mApproved','mRejected','mPartial','mPending','mScore','mScoreLabel'].forEach(id =&gt; {
        const el = document.getElementById(id);
        if (el) el.textContent = '';
      });
      const implEl = document.getElementById('implantadoPct');
      const efEl = document.getElementById('eficaciaPct');
      if (implEl) implEl.value = '';
      if (efEl) efEl.value = '';
      const total = all.length || 1;
      const f = calcularFaixasDinamicas(total);
      const rangesEl = document.getElementById('mScoreRanges');
      if (rangesEl) rangesEl.textContent = `Faixas dinâmicas (${total} melhorias / máx. ${f.max} pts): 0–${f.baixoMax} Baixo · ${f.baixoMax + 1}–${f.medioMax} Médio · ${f.medioMax + 1}–${f.altoMax} Alto · ${f.altoMax + 1}+ Crítico.`;
      atualizarPainelProMelhorias({ total, ap, re, pa, pe, interacted: false });
      atualizarDiagnosticoInteligente();
      return;
    }
    const apEl = document.getElementById('mApproved');
    const reEl = document.getElementById('mRejected');
    const paEl = document.getElementById('mPartial');
    const peEl = document.getElementById('mPending');
    if (apEl) apEl.textContent = ap;
    if (reEl) reEl.textContent = re;
    if (paEl) paEl.textContent = pa;
    if (peEl) peEl.textContent = pe;
    // Pontuacao (fragilidade) = 2*reprovados + 1*pendentes + 1*parciais
    const total = all.length || 1;
    const score = 2 * re + 1 * pe + 1 * pa;
    const classificacao = classificarFragilidade(score, total);
    const { baixoMax, medioMax, altoMax, max } = classificacao.faixas;
    const label = classificacao.label;
    const cls = classificacao.cls;

    const rangesEl = document.getElementById('mScoreRanges');
    if (rangesEl) {
      rangesEl.textContent = `Faixas dinâmicas (${total} melhorias / máx. ${max} pts): 0–${baixoMax} Baixo · ${baixoMax + 1}–${medioMax} Médio · ${medioMax + 1}–${altoMax} Alto · ${altoMax + 1}+ Crítico.`;
    }
    const sEl  = document.getElementById('mScore');
    const slEl = document.getElementById('mScoreLabel');
    if (sEl)  { sEl.textContent  = score; sEl.className  = 'score-number ' + cls; }
    if (slEl) { slEl.textContent = label; slEl.className = 'score-label '  + cls; }
    // Implantado % = (Aprovados + 0.5 * Parciais) / Total Melhorias * 100
    const implantadoPct = Math.round(((ap + 0.5 * pa) / total) * 100);
    const implEl = document.getElementById('implantadoPct');

(function () {
  function parseDataFinal(valor) {

    if (/^\d{4}-\d{2}-\d{2}$/.test(valor)) {
      const [ano, mes, dia] = valor.split('-').map(Number);
      return new Date(ano, mes - 1, dia);
    }
    if (/^\d{2}\/\d{2}\/\d{4}$/.test(valor)) {
      const [dia, mes, ano] = valor.split('/').map(Number);
      return new Date(ano, mes - 1, dia);
    }
    return null;
  }
  function getRowsPrazo() { return Array.from(document.querySelectorAll('.melhorias-table-pro tr.melhoria-item')); }
  window.atualizarPrazoFinal = function atualizarPrazoFinal() {

    getRowsPrazo().forEach(function (row) {
      const cells = row.querySelectorAll('td');

      dot.classList.remove('prazo-ok','prazo-atrasado','prazo-pendente');
      if (!conclusao) { semConclusao++; dot.classList.add('prazo-pendente'); dot.title = 'Aguardando conclusão'; return; }

      if (conclusao &lt;= previsao) { noPrazo++; dot.classList.add('prazo-ok'); dot.title = 'Dentro do prazo'; }
      else { atrasados++; dot.classList.add('prazo-atrasado'); dot.title = 'Atrasado'; }
    });
    const total = getRowsPrazo().length;
