  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #060d1a;
    --surface: #0b1628;
    --surface2: #111f35;
    --border: #1e3050;
    --border2: #2a4268;
    --text: #cdd9ee;
    --muted: #5a7499;
    --accent: #503294;
    --accent2: #382464;
    --brand: #a8cc3a;
    --font-main: 'IBM Plex Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-main); }
  .reset-shell { min-height: 100vh; background: var(--bg); }
  .reset-top-line { height: 4px; background: linear-gradient(90deg, var(--accent) 0%, var(--accent) 28%, var(--brand) 28%, var(--brand) 100%); border-bottom: 1px solid var(--border); }
  .reset-main-tabs-wrap { background: var(--surface); border-bottom: 1px solid var(--border); }
  .reset-main-tabs { max-width: 1320px; margin: 0 auto; display: flex; gap: 0; padding: 0 0 0 0; }
  .reset-main-tab {
    min-width: 145px; padding: 16px 16px; background: transparent; border: 0; border-bottom: 3px solid transparent;
    color: #5f80b7; font-family: var(--font-mono); font-size: 14px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .16em; cursor: pointer; transition: all .18s ease;
  }
  .reset-main-tab:hover { color: #d8e5fb; background: rgba(80,50,148,.08); }
  .reset-main-tab.active { background: rgba(80,50,148,.16); color: var(--accent); border-bottom-color: var(--accent); }
  .reset-main-tab.actions-tab.active { color: var(--brand); border-bottom-color: var(--brand); background: rgba(168,204,58,.08); }
  .reset-subtabs-wrap { background: var(--surface); border-bottom: 1px solid var(--border); display: none; }
  .reset-subtabs-wrap.active { display: block; }
  .reset-subtabs { max-width: 1320px; margin: 0 auto; display: flex; gap: 6px; padding: 8px 0 0; overflow-x: auto; align-items:flex-end; }
  .reset-pillar-subtabs { max-width:1320px; margin:0 auto; display:none; gap:2px; padding:4px 0 0; overflow-x:auto; border-top:1px solid rgba(30,48,80,.35); }
  .reset-pillar-subtabs.active { display:flex; }
  .reset-subtab { padding: 8px 16px; min-height: 34px; color: #5f80b7; font-family: var(--font-mono); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .07em; border: 1px solid transparent; border-bottom: 2px solid transparent; white-space: nowrap; display: inline-flex; align-items: center; gap: 10px; border-radius: 7px 7px 0 0; }
  .reset-subtab { cursor: pointer; }
  .reset-subtab.active { color: var(--brand); border-bottom-color: var(--brand); }
  .reset-subtab.create-action { color: #ffffff; border-color: rgba(128,0,32,.72); border-bottom-color: #9f1239; background: linear-gradient(180deg, #8a1232 0%, #5f0f2a 100%); box-shadow: inset 0 1px 0 rgba(255,255,255,.12), 0 4px 14px rgba(95,15,42,.20); }
  .reset-subtab.create-action.active { color: #ffffff; border-color: rgba(128,0,32,.86); border-bottom-color: #be123c; background: linear-gradient(180deg, #9f1239 0%, #6f102e 100%); }
  .reset-subtab.saved-action { color: var(--accent); border-color: rgba(168,204,58,.45); border-bottom-color: rgba(168,204,58,.75); background: linear-gradient(180deg, var(--brand) 0%, var(--brand-dk, #87a72e) 100%); font-size: 10.5px; letter-spacing: .045em; box-shadow: inset 0 1px 0 rgba(255,255,255,.12); }
  .reset-subtab.saved-action.active { color: var(--accent); border-color: rgba(168,204,58,.75); border-bottom-color: var(--brand); background: linear-gradient(180deg, var(--brand) 0%, var(--brand-dk, #87a72e) 100%); }
  .reset-pillar-tab { min-height:28px; padding:6px 12px; font-size:10px; letter-spacing:.055em; color:#cdd9ee; border:1px solid var(--border2); background:rgba(17,31,53,.92); }
  .reset-pillar-tab.active { color:var(--brand); border-color:rgba(168,204,58,.55); border-bottom-color:var(--brand); background:rgba(168,204,58,.13); }
  .reset-unit-subtabs { max-width:1320px; margin:0 auto; display:none; gap:2px; padding:2px 0 0; overflow-x:auto; border-top:1px solid rgba(30,48,80,.24); }
  .reset-unit-subtabs.active { display:flex; }
  .reset-unit-tab { min-height:24px; padding:4px 10px; font-size:9.5px; letter-spacing:.045em; color:#cdd9ee; border:1px solid var(--border2); background:rgba(10,20,38,.88); border-radius:6px 6px 0 0; }
  .reset-unit-tab.active { color:#ffffff; border-color:rgba(168,204,58,.55); border-bottom-color:var(--brand); background:rgba(168,204,58,.16); }

  .reset-action-subtabs { max-width:1320px; margin:0 auto; display:none; gap:2px; padding:2px 0 0; overflow-x:auto; border-top:1px solid rgba(30,48,80,.18); }
  .reset-action-subtabs.active { display:flex; }
  .reset-action-tab { min-height:22px; padding:3px 9px; font-size:9px; letter-spacing:.04em; color:#cdd9ee; border:1px solid var(--border2); background:rgba(10,20,38,.78); border-radius:5px 5px 0 0; }
  .reset-action-tab.active { color:#ffffff; border-color:rgba(80,50,148,.85); border-bottom-color:var(--accent); background:rgba(80,50,148,.22); }
  #pane-acoes .reset-frame:not(.active-action-frame) { display: none; }
  #pane-acoes .reset-frame.active-action-frame { display: block; }
  .reset-pane { display: none; }
  .reset-pane.active { display: block; }
  iframe.reset-frame { display: block; width: 100%; min-height: calc(100vh - 72px); border: 0; background: var(--bg); }
  #pane-acoes iframe.reset-frame { min-height: calc(100vh - 121px); }
  @media (max-width: 700px) {
    .reset-main-tab { min-width: auto; flex: 1; padding: 16px 12px; font-size: 12px; letter-spacing: .10em; }
    .reset-subtab { font-size: 11px; padding: 12px 10px; }
  }


  /* V26: cabeçalho superior fixo e sem barra dinâmica visual */
  .reset-top-line { display: none !important; }
  .reset-main-tabs-wrap {
    position: sticky !important;
    top: 0 !important;
    z-index: 9000 !important;
    background: var(--surface) !important;
  }
  .reset-subtabs-wrap.active {
    position: sticky !important;
    top: 59px !important;
    z-index: 8990 !important;
    background: var(--surface) !important;
    box-shadow: 0 10px 18px rgba(0,0,0,.22);
  }
  .reset-main-tab { min-width: 118px !important; padding: 14px 14px !important; }

  @media print {
    .reset-top-line, .reset-main-tabs-wrap, .reset-subtabs-wrap { display:none !important; }
    iframe.reset-frame { min-height: 100vh; }
  }

  /* V31: aba principal ativa com texto branco e acesso protegido à aba AÇÕES */
  .reset-subtabs > .reset-subtab.saved-action.active {
    color: #ffffff !important;
    text-shadow: 0 0 8px rgba(255,255,255,.28);
  }
  .acoes-lock-overlay {
    position: fixed; inset: 0; z-index: 20000;
    display: none; align-items: center; justify-content: center;
    background: rgba(3,8,18,.72); backdrop-filter: blur(4px);
  }
  .acoes-lock-overlay.active { display: flex; }
  .acoes-lock-modal {
    width: min(440px, calc(100vw - 34px));
    background: linear-gradient(180deg, #081426 0%, #050c18 100%);
    border: 1px solid rgba(168,204,58,.78);
    box-shadow: 0 0 22px rgba(168,204,58,.22), 0 22px 70px rgba(0,0,0,.55);
    border-radius: 14px; padding: 28px 30px 24px;
    color: var(--text); font-family: var(--font-main);
  }
  .acoes-lock-title {
    font-family: var(--font-mono); font-size: 22px; font-weight: 800;
    color: #ffffff; text-align: center; letter-spacing: .06em;
    margin-bottom: 8px; text-transform: uppercase;
  }
  .acoes-lock-subtitle { text-align: center; color: #cdd9ee; margin-bottom: 20px; }
  .acoes-lock-label {
    display:block; color: var(--brand); font-family: var(--font-mono);
    font-weight: 800; font-size: 12px; text-transform: uppercase;
    letter-spacing: .08em; margin-bottom: 8px;
  }
  .acoes-lock-input {
    width:100%; height:44px; border-radius:8px;
    border:1px solid rgba(168,204,58,.55);
    background:#071225; color:#ffffff; padding:0 14px;
    font-family:var(--font-main); font-size:16px; outline:none;
  }
  .acoes-lock-input:focus {
    border-color: var(--brand); box-shadow: 0 0 0 3px rgba(168,204,58,.16);
  }
  .acoes-lock-error { min-height: 20px; color:#ff5b6b; font-weight:700; margin:8px 0 14px; font-size:13px; }
  .acoes-lock-actions { display:flex; gap:12px; }
  .acoes-lock-btn {
    flex:1; height:42px; border-radius:8px; cursor:pointer;
    font-family:var(--font-mono); font-weight:800; text-transform:uppercase;
    letter-spacing:.05em; border:1px solid var(--border2);
    background:rgba(17,31,53,.92); color:#ffffff;
  }
  .acoes-lock-btn.primary {
    color:#18210a; border-color:rgba(168,204,58,.9);
    background:linear-gradient(180deg, var(--brand) 0%, #91b82f 100%);
    box-shadow:0 0 16px rgba(168,204,58,.24);
  }



  /* v50 — ajustes pontuais no cronograma: centralização de Melhorias e coluna Quem faz? */
  .meta-item.meta-melhorias-auto { text-align: center; }
  .meta-item.meta-melhorias-auto .val { display: block; text-align: center; }
  .melhorias-table .col-quem-faz { width: 118px; min-width: 118px; }
  .melhorias-table .quem-faz-select {
    width: 112px;
    min-width: 112px;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 700;
    padding: 5px 24px 5px 10px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border2);
    border-radius: 8px;
    cursor: pointer;
  }
  .melhorias-table .quem-faz-select:focus { outline: none; border-color: var(--brand); }
  .melhorias-table .status-select { min-width: 128px !important; }


  /* v54 — ajuste pontual: STATUS mais compacto e DESCRIÇÃO com mais espaço */
  .melhorias-table thead th:nth-child(9),
  .melhorias-table tbody td:nth-child(9) {
    width: 168px !important;
    max-width: 168px !important;
  }
  .melhorias-table tbody td:nth-child(9) select.status-select,
  .melhorias-table tbody td:nth-child(9) select.action-status-select {
    width: 160px !important;
    min-width: 160px !important;
    max-width: 160px !important;
  }
  .melhorias-table thead th:nth-child(3),
  .melhorias-table tbody td:nth-child(3) {
    width: auto !important;
  }



  /* V76: Agenda Operacional — colunas rebalanceadas conforme solicitado */
  .operacional-table { min-width: 0 !important; width: 100% !important; table-layout: fixed !important; }
  .operacional-table thead th,
  .operacional-table tbody td { padding-left: 8px !important; padding-right: 8px !important; }
  .operacional-table .op-data { width: 90px !important; }
  .operacional-table .op-unidade { width: 120px !important; }
  .operacional-table .op-area { width: 120px !important; }
  .operacional-table .op-pilar { width: 120px !important; }
  .operacional-table .op-quem { width: 120px !important; }
  .operacional-table .op-acao { width: 220px !important; min-width: 0 !important; }
  .operacional-table .op-melhoria { width: auto !important; min-width: 0 !important; }
  .operacional-table .op-status { width: 150px !important; }
  .operacional-table .op-prioridade { width: 130px !important; }
</style>


<style id="v101-melhoria-200px-fix">

<div class="reset-shell">
  <div class="reset-top-line"></div>
  <div class="reset-main-tabs-wrap">
    <nav class="reset-main-tabs" aria-label="Abas principais">
      <button class="reset-main-tab active" id="btn-cronograma" type="button" onclick="showMainPane('cronograma')">Cronograma</button>
      <button class="reset-main-tab actions-tab" id="btn-acoes" type="button" onclick="showMainPane('acoes')">Ações</button>

  </div>
  <div class="reset-subtabs-wrap" id="acoes-subtabs-wrap">

    <div id="pillar-subtabs-host"></div>

  <div class="acoes-lock-overlay" id="acoes-lock-overlay" aria-hidden="true">

      <div class="acoes-lock-title" id="acoes-lock-title">Acesso Restrito</div>
      <div class="acoes-lock-subtitle">Digite a senha para acessar a aba <strong>AÇÕES</strong>.</div>
      <label class="acoes-lock-label" for="acoes-lock-password">Senha</label>
      <input class="acoes-lock-input" id="acoes-lock-password" type="password" autocomplete="off" placeholder="Digite a senha" />
      <div class="acoes-lock-error" id="acoes-lock-error"></div>
      <div class="acoes-lock-actions">
        <button class="acoes-lock-btn" type="button" onclick="closeAcoesLock()">Cancelar</button>
        <button class="acoes-lock-btn primary" type="button" onclick="confirmAcoesPassword()">Entrar</button>
      </div>
    </div>
  </div>

  function statusClass(s) {
    const status = String(s || &#x27;&#x27;).trim();
    const mapa = {
      &#x27;Não iniciada&#x27;: &#x27;naoiniciada&#x27;,
      &#x27;Não iniciado&#x27;: &#x27;naoiniciado&#x27;,
      &#x27;Em andamento&#x27;: &#x27;emandamento&#x27;,
      &#x27;Concluída&#x27;: &#x27;concluida&#x27;,
      &#x27;Executado&#x27;: &#x27;executado&#x27;,
      &#x27;Não executado&#x27;: &#x27;naoexecutado&#x27;,
      &#x27;Não concluída&#x27;: &#x27;naoconcluida&#x27;,
      &#x27;Com pendência&#x27;: &#x27;compendencias&#x27;,
      &#x27;Com pendências&#x27;: &#x27;compendencias&#x27;,
      &#x27;Concluída parcialmente&#x27;: &#x27;compendencias&#x27;
    };
    if (mapa[status]) return mapa[status];
    return status.toLowerCase()
      .replace(/\s+/g, &#x27;&#x27;)
      .replace(/[áàâã]/g,&#x27;a&#x27;)
      .replace(/[éê]/g,&#x27;e&#x27;)
      .replace(/[í]/g,&#x27;i&#x27;)
      .replace(/[óôõ]/g,&#x27;o&#x27;)
      .replace(/[ú]/g,&#x27;u&#x27;)
      .replace(/[ç]/g,&#x27;c&#x27;);
  }

  function contarMelhorias(action) {
    return Array.isArray(action.melhorias) ? action.melhorias.length : 0;
  }

  function getMelhoriaId(unidade, action, m) {
    return (unidade + &#x27;-&#x27; + action.idac + &#x27;-&#x27; + m.idm).replace(/[^a-zA-Z0-9_-]/g, &#x27;-&#x27;);
  }

  function getSavedField(mid, field, fallback) {
    try {
      const saved = localStorage.getItem(FIELD_KEY_PREFIX + mid + &#x27;.&#x27; + field);
      if (saved != null &amp;&amp; saved !== &#x27;&#x27;) return saved;
    } catch(e) {}
    return fallback;
  }

  function getSavedActionField(acaoId, field, fallback) {
    try {
      const saved = localStorage.getItem(ACAO_KEY_PREFIX + acaoId + &#x27;.&#x27; + field);
      if (saved != null &amp;&amp; saved !== &#x27;&#x27;) return saved;
    } catch(e) {}
    return fallback;
  }

  function calcularProgressoAcao(unidade, action) {
    const melhorias = Array.isArray(action.melhorias) ? action.melhorias : [];
    const total = melhorias.length;
    let concluidas = 0;
    melhorias.forEach(m =&gt; {
      const mid = getMelhoriaId(unidade, action, m);
      const status = getSavedField(mid, &#x27;status&#x27;, m.status);
      if (status === &#x27;Concluída&#x27;) concluidas++;
    });
    const pct = total ? Math.round((concluidas / total) * 100) : 0;
    return { total, concluidas, pct };
  }

  function atualizarProgressoAcao(unidade, action) {
    const acaoId = (unidade + &#x27;-&#x27; + action.idac).replace(/[^a-zA-Z0-9_-]/g, &#x27;-&#x27;);
    const p = calcularProgressoAcao(unidade, action);
    document.querySelectorAll(`[data-progress-acaoid=&quot;${acaoId}&quot;]`).forEach(el =&gt; {
      el.textContent = `${p.pct}%`;
      el.title = `${p.concluidas} de ${p.total} melhorias concluídas`;
    });
    document.querySelectorAll(`[data-progress-detail-acaoid=&quot;${acaoId}&quot;]`).forEach(el =&gt; {
      el.textContent = `${p.concluidas}/${p.total} (${p.pct}%)`;
    });
  }

  function calcularTotalMelhorias() {

    }, 0);
  }

  function parseDataResumo(valor) {
    if (!valor) return null;
    const v = String(valor).trim();
    if (!v) return null;
    let d = null;
    if (/^\d{4}-\d{2}-\d{2}$/.test(v)) {
      d = new Date(v + &#x27;T00:00:00&#x27;);
    } else {
      const m = v.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
      if (m) d = new Date(`${m[3]}-${m[2]}-${m[1]}T00:00:00`);
    }
    return d &amp;&amp; !isNaN(d.getTime()) ? d : null;
  }

  function formatarDataResumo(date) {
    if (!date) return &#x27;--/--/----&#x27;;
    return String(date.getDate()).padStart(2,&#x27;0&#x27;) + &#x27;/&#x27; + String(date.getMonth()+1).padStart(2,&#x27;0&#x27;) + &#x27;/&#x27; + date.getFullYear();
  }

  function calcularUltimaPrevisaoCronograma() {
    let ultima = null;
    Object.entries(UNITS_DATA || {}).forEach(([unidade, actions]) =&gt; {
      (actions || []).forEach(action =&gt; {
        const acaoId = (unidade + &#x27;-&#x27; + action.idac).replace(/[^a-zA-Z0-9_-]/g, &#x27;-&#x27;);
        const prevAcao = getSavedActionField(acaoId, &#x27;previsao&#x27;, action.previsao);
        const dataAcao = parseDataResumo(prevAcao);
        if (dataAcao &amp;&amp; (!ultima || dataAcao &gt; ultima)) ultima = dataAcao;
        (action.melhorias || []).forEach(m =&gt; {
          const mid = getMelhoriaId(unidade, action, m);
          const prevMelhoria = getSavedField(mid, &#x27;previsao&#x27;, m.previsao);
          const dataMelhoria = parseDataResumo(prevMelhoria);
          if (dataMelhoria &amp;&amp; (!ultima || dataMelhoria &gt; ultima)) ultima = dataMelhoria;
        });
      });
    });
    return ultima;
  }

  function atualizarResumoGeral() {
    const acoesEl = document.getElementById(&#x27;summary-acoes-total&#x27;);
    const melhoriasEl = document.getElementById(&#x27;summary-melhorias-total&#x27;);
    const previsaoFinalEl = document.getElementById(&#x27;summary-previsao-final&#x27;);
    if (acoesEl) acoesEl.textContent = calcularTotalAcoes();
    if (melhoriasEl) melhoriasEl.textContent = calcularTotalMelhorias();
    if (previsaoFinalEl) previsaoFinalEl.textContent = formatarDataResumo(calcularUltimaPrevisaoCronograma());
  }

  function calcularStatsUnidade(unidade) {
    const actions = UNITS_DATA[unidade] || [];
    const totalAcoes = actions.length;
    let totalMelh = 0, conc = 0;
    actions.forEach(action =&gt; {
      (action.melhorias || []).forEach(m =&gt; {
        totalMelh++;
        const melhoriaId = getMelhoriaId(unidade, action, m);
        let status = m.status;
        try {
          const saved = localStorage.getItem(FIELD_KEY_PREFIX + melhoriaId + &#x27;.status&#x27;);
          if (saved) status = saved;
        } catch(e) {}
        if (status === &#x27;Concluída&#x27;) conc++;
      });
    });
    const pct = totalMelh ? Math.round((conc / totalMelh) * 100) : 0;
    return { totalAcoes, totalMelh, conc, pct };
  }

  function renderUnidadeStats(unidade) {

      if (mid &amp;&amp; field) {
        try {
          const saved = localStorage.getItem(FIELD_KEY_PREFIX + mid + &#x27;.&#x27; + field);
          if (saved != null &amp;&amp; saved !== &#x27;&#x27;) s.value = saved;
        } catch(e) {}
      }
      if (s.classList.contains(&#x27;status-select&#x27;) || s.classList.contains(&#x27;obs-status-select&#x27;)) {
        aplicarCorStatus(s);
      }
      if (s.classList.contains(&#x27;quem-faz-select&#x27;)) {
        aplicarCorQuemFaz(s);
      }
    });
    // Date inputs
    root.querySelectorAll(&#x27;input.cell-date&#x27;).forEach(el =&gt; {
      const mid = el.getAttribute(&#x27;data-mid&#x27;);
      const field = el.getAttribute(&#x27;data-field&#x27;);
      if (mid &amp;&amp; field) {
        try {
          const saved = localStorage.getItem(FIELD_KEY_PREFIX + mid + &#x27;.&#x27; + field);
          if (saved != null &amp;&amp; saved !== &#x27;&#x27;) el.value = saved;
        } catch(e) {}
      }
    });
  }

  // ===== Observações em log único por melhoria =====
  const OBS_KEY_PREFIX = &#x27;reset.obslog.v1.&#x27;;

  function hojeISOObsLog() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, &#x27;0&#x27;);
    const day = String(d.getDate()).padStart(2, &#x27;0&#x27;);
    return `${y}-${m}-${day}`;
  }

  function obsLinhaVazia() {
    return { autor: &#x27;&#x27;, data: &#x27;&#x27;, desc: &#x27;&#x27;, status: &#x27;&#x27;, alerta: false };
  }

  function obsLinhaTemConteudo(r) {
    return !!(r &amp;&amp; ((r.autor || &#x27;&#x27;).trim() || (r.data || &#x27;&#x27;).trim() || (r.desc || &#x27;&#x27;).trim()));
  }

  function getObsLogRows(melhoriaId) {
    const key = OBS_KEY_PREFIX + melhoriaId;
    try {
      const raw = localStorage.getItem(key);
      if (raw) {
        const arr = JSON.parse(raw);
        if (Array.isArray(arr)) return normalizarObsLog(arr);
      }
    } catch (e) { /* ignore */ }

    // Migração silenciosa das 3 observações antigas, se existirem
    const migradas = [];
    for (let i = 1; i &lt;= 3; i++) {
      try {
        const antigo = localStorage.getItem(&#x27;reset.obs.v1.&#x27; + melhoriaId + &#x27;.&#x27; + i);
        if (antigo &amp;&amp; antigo.trim()) {
          migradas.push({ autor: &#x27;&#x27;, data: &#x27;&#x27;, desc: antigo, status: &#x27;-&#x27;, alerta: false });
        }
      } catch (e) { /* ignore */ }
    }
    return normalizarObsLog(migradas);
  }

  function normalizarObsLog(rows) {
    const limpas = (rows || []).map(r =&gt; ({
      autor: (r.autor || &#x27;&#x27;).toString(),
      data: (r.data || &#x27;&#x27;).toString(),
      desc: (r.desc || &#x27;&#x27;).toString(),
      status: r.status === &#x27;feito&#x27; || r.status === &#x27;✓&#x27; ? &#x27;feito&#x27; : (obsLinhaTemConteudo(r) ? &#x27;-&#x27; : &#x27;&#x27;),
      alerta: (r.alerta === true || r.alerta === &#x27;true&#x27;) &amp;&amp; obsLinhaTemConteudo(r) &amp;&amp; !(r.status === &#x27;feito&#x27; || r.status === &#x27;✓&#x27;)
    }));
    while (limpas.length &amp;&amp; !obsLinhaTemConteudo(limpas[limpas.length - 1])) limpas.pop();
    limpas.push(obsLinhaVazia());
    return limpas;
  }

  function salvarObsLog(melhoriaId, rows) {
    const key = OBS_KEY_PREFIX + melhoriaId;
    const paraSalvar = normalizarObsLog(rows).filter(obsLinhaTemConteudo);
    try { localStorage.setItem(key, JSON.stringify(paraSalvar)); } catch (e) { /* ignore */ }
    atualizarIndicadorObsLog(melhoriaId);
    mostrarFlagObsLog(melhoriaId);
  }

  function escaparObsLog(v) {
    return (v || &#x27;&#x27;).toString()
      .replace(/&amp;/g, &#x27;&amp;amp;&#x27;)
      .replace(/&quot;/g, &#x27;&amp;quot;&#x27;)
      .replace(/&lt;/g, &#x27;&amp;lt;&#x27;)
      .replace(/&gt;/g, &#x27;&amp;gt;&#x27;);
  }

  function renderObsLog(melhoriaId) {
    const body = document.getElementById(`obs-log-body-${melhoriaId}`);
    if (!body) return;
    const rows = getObsLogRows(melhoriaId);
    body.innerHTML = rows.map((r, idx) =&gt; {
      const tem = obsLinhaTemConteudo(r);
      const simbolo = r.status === &#x27;feito&#x27; ? &#x27;✓&#x27; : (tem ? &#x27;–&#x27; : &#x27;&#x27;);
      const statusClass = r.status === &#x27;feito&#x27; ? &#x27;feito&#x27; : (tem ? &#x27;pendente&#x27; : &#x27;vazio&#x27;);
      const deleteClass = tem ? &#x27;&#x27; : &#x27;vazio&#x27;;
      return `
        &lt;div class=&quot;obs-log-line&quot; data-idx=&quot;${idx}&quot;&gt;
          &lt;div class=&quot;obs-log-cell&quot;&gt;&lt;input class=&quot;obs-log-input&quot; value=&quot;${escaparObsLog(r.autor)}&quot; placeholder=&quot;Nome&quot; oninput=&quot;alterarObsLog(&#x27;${melhoriaId}&#x27;, ${idx}, &#x27;autor&#x27;, this.value)&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;obs-log-cell&quot;&gt;&lt;input type=&quot;date&quot; class=&quot;obs-log-date&quot; value=&quot;${escaparObsLog(r.data)}&quot; onchange=&quot;alterarObsLog(&#x27;${melhoriaId}&#x27;, ${idx}, &#x27;data&#x27;, this.value)&quot;&gt;&lt;/div&gt;
          &lt;div class=&quot;obs-log-cell&quot;&gt;&lt;textarea rows=&quot;1&quot; class=&quot;obs-log-input obs-log-desc&quot; placeholder=&quot;Descrição da observação&quot; oninput=&quot;autoResizeObsLog(this); alterarObsLog(&#x27;${melhoriaId}&#x27;, ${idx}, &#x27;desc&#x27;, this.value)&quot;&gt;${escaparObsLog(r.desc)}&lt;/textarea&gt;&lt;/div&gt;
          &lt;div class=&quot;obs-log-cell&quot;&gt;&lt;button type=&quot;button&quot; class=&quot;obs-log-status-btn ${statusClass}&quot; onclick=&quot;alternarStatusObsLog(&#x27;${melhoriaId}&#x27;, ${idx})&quot;&gt;${simbolo}&lt;/button&gt;&lt;/div&gt;
          &lt;div class=&quot;obs-log-cell&quot;&gt;&lt;button type=&quot;button&quot; class=&quot;obs-log-delete-btn ${deleteClass}&quot; title=&quot;Excluir linha&quot; onclick=&quot;excluirObsLog(&#x27;${melhoriaId}&#x27;, ${idx})&quot;&gt;🗑&lt;/button&gt;&lt;/div&gt;
        &lt;/div&gt;`;
    }).join(&#x27;&#x27;);
    body.querySelectorAll(&#x27;textarea.obs-log-desc&#x27;).forEach(autoResizeObsLog);
    atualizarIndicadorObsLog(melhoriaId);
  }

  function alterarObsLog(melhoriaId, idx, field, value) {
    const rows = getObsLogRows(melhoriaId);
    if (!rows[idx]) rows[idx] = obsLinhaVazia();
    rows[idx][field] = value;

    if (obsLinhaTemConteudo(rows[idx])) {
      if (!rows[idx].data) rows[idx].data = hojeISOObsLog();
      rows[idx].status = &#x27;-&#x27;;
      rows[idx].alerta = true;
    } else {
      rows[idx].status = &#x27;&#x27;;
      rows[idx].alerta = false;
    }

    salvarObsLog(melhoriaId, rows);
    renderObsLog(melhoriaId);
    const body = document.getElementById(`obs-log-body-${melhoriaId}`);
    const line = body &amp;&amp; body.querySelector(`.obs-log-line[data-idx=&quot;${idx}&quot;]`);
    const el = line &amp;&amp; line.querySelector(field === &#x27;desc&#x27; ? &#x27;textarea&#x27; : (field === &#x27;data&#x27; ? &#x27;input[type=&quot;date&quot;]&#x27; : &#x27;input.obs-log-input&#x27;));
    if (el) {
      el.focus();
      if (field !== &#x27;data&#x27;) {
        const len = el.value.length;
        try { el.setSelectionRange(len, len); } catch (e) { /* ignore */ }
      }
    }
  }

  function excluirObsLog(melhoriaId, idx) {
    const rows = getObsLogRows(melhoriaId);
    if (!rows[idx] || !obsLinhaTemConteudo(rows[idx])) return;
    rows.splice(idx, 1);
    salvarObsLog(melhoriaId, rows);
    renderObsLog(melhoriaId);
  }

  function alternarStatusObsLog(melhoriaId, idx) {
    const rows = getObsLogRows(melhoriaId);
    if (!rows[idx] || !obsLinhaTemConteudo(rows[idx])) return;
    if (rows[idx].status === &#x27;feito&#x27;) {
      rows[idx].status = &#x27;-&#x27;;
      rows[idx].alerta = true;
    } else {
      rows[idx].status = &#x27;feito&#x27;;
      rows[idx].alerta = false;
    }
    salvarObsLog(melhoriaId, rows);
    renderObsLog(melhoriaId);
  }

  function toggleObsLog(melhoriaId, btn) {
    const row = document.getElementById(`obs-row-${melhoriaId}`);
    if (!row) return;
    const ficouHidden = row.classList.toggle(&#x27;hidden&#x27;);
    const visivel = !ficouHidden;
    if (btn) {
      btn.classList.toggle(&#x27;aberto&#x27;, visivel);
      btn.textContent = visivel ? &#x27;−&#x27; : &#x27;+&#x27;;
    }
    if (visivel) {
      renderObsLog(melhoriaId);
      const first = row.querySelector(&#x27;.obs-log-input&#x27;);
      if (first) setTimeout(() =&gt; first.focus(), 50);
    }
  }

  let obsSaveTimers = {};
  function mostrarFlagObsLog(melhoriaId) {
    const flag = document.getElementById(`obs-flag-${melhoriaId}`);
    if (!flag) return;
    flag.classList.add(&#x27;show&#x27;);
    clearTimeout(obsSaveTimers[melhoriaId]);
    obsSaveTimers[melhoriaId] = setTimeout(() =&gt; flag.classList.remove(&#x27;show&#x27;), 900);
  }

  function atualizarIndicadorObsLog(melhoriaId) {
    const btn = document.querySelector(`button.obs-log-toggle[data-mid=&quot;${melhoriaId}&quot;]`);
    const rows = getObsLogRows(melhoriaId).filter(obsLinhaTemConteudo);
    const temPendente = rows.some(r =&gt; r.alerta === true &amp;&amp; r.status !== &#x27;feito&#x27;);
    if (btn) {
      btn.classList.toggle(&#x27;obs-alerta&#x27;, temPendente);
      btn.style.borderColor = rows.length &gt; 0 ? &#x27;var(--brand)&#x27; : &#x27;&#x27;;
      btn.title = temPendente ? &#x27;Há observações pendentes&#x27; : (rows.length &gt; 0 ? &#x27;Observações concluídas&#x27; : &#x27;Observações&#x27;);
    }
    atualizarIndicadoresObsHierarquia();
  }

  function melhoriaTemObsPendente(melhoriaId) {
    return getObsLogRows(melhoriaId).filter(obsLinhaTemConteudo).some(r =&gt; r.alerta === true &amp;&amp; r.status !== &#x27;feito&#x27;);
  }

  function acaoTemObsPendente(unidade, action) {
    return (action.melhorias || []).some(m =&gt; melhoriaTemObsPendente(getMelhoriaId(unidade, action, m)));
  }

  function atualizarIndicadoresObsHierarquia() {
    Object.entries(UNITS_DATA || {}).forEach(([unidade, actions]) =&gt; {
      let unidadeTemPendente = false;
      (actions || []).forEach(action =&gt; {
        const acaoId = (unidade + &#x27;-&#x27; + action.idac).replace(/[^a-zA-Z0-9_-]/g, &#x27;-&#x27;);
        const tem = acaoTemObsPendente(unidade, action);
        if (tem) unidadeTemPendente = true;
        document.querySelectorAll(`[data-obs-actionid=&quot;${acaoId}&quot;]`).forEach(el =&gt; {
          el.classList.toggle(&#x27;obs-alerta&#x27;, tem);
          el.title = tem ? &#x27;Há observações pendentes nesta ação&#x27; : &#x27;&#x27;;
        });
      });
      document.querySelectorAll(`[data-obs-unidade=&quot;${unidade}&quot;]`).forEach(el =&gt; {
        if (el.classList.contains(&#x27;action-btn&#x27;)) return;
        el.classList.toggle(&#x27;obs-alerta&#x27;, unidadeTemPendente);
        el.title = unidadeTemPendente ? &#x27;Há observações pendentes nesta unidade&#x27; : &#x27;&#x27;;
      });
    });
  }

  function autoResizeObsLog(el) {
    if (!el) return;
    el.style.height = &#x27;auto&#x27;;
    el.style.height = Math.max(28, el.scrollHeight) + &#x27;px&#x27;;
  }

  function hidratarObs(scope) {
    const root = scope || document;
    root.querySelectorAll(&#x27;.obs-log-body&#x27;).forEach(body =&gt; {
      const mid = (body.id || &#x27;&#x27;).replace(&#x27;obs-log-body-&#x27;, &#x27;&#x27;);
      if (mid) renderObsLog(mid);
    });
    root.querySelectorAll(&#x27;button.obs-log-toggle&#x27;).forEach(btn =&gt; {
      const mid = btn.getAttribute(&#x27;data-mid&#x27;);
      const rows = getObsLogRows(mid).filter(obsLinhaTemConteudo);
      atualizarIndicadorObsLog(mid);
    });
    atualizarIndicadoresObsHierarquia();
  }

  // ===== Abas =====
  function showTab(tab) {
    document.getElementById(&#x27;section-unidades&#x27;).classList.toggle(&#x27;hidden&#x27;, tab !== &#x27;unidades&#x27;);
    document.getElementById(&#x27;section-calendario&#x27;).classList.toggle(&#x27;hidden&#x27;, tab !== &#x27;calendario&#x27;);

  // ===== Importação / exportação JSON =====
  function coletarLocalStorageReset() {
    const data = {};
    try {
      for (let i = 0; i &lt; localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k &amp;&amp; k.indexOf(&#x27;reset.&#x27;) === 0) data[k] = localStorage.getItem(k);
      }
    } catch(e) {}
    return data;
  }

  function exportarJSON() {
    const payload = {
      versao: &#x27;reset-json-v2&#x27;,
      exportado_em: new Date().toISOString(),
      unidades: UNITS_DATA,
      localStorage: coletarLocalStorageReset()
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: &#x27;application/json&#x27; });
    const url = URL.createObjectURL(blob);
    const a = document.createElement(&#x27;a&#x27;);
    a.href = url;
    a.download = &#x27;sistema-reset-export.json&#x27;;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function importarJSON(event) {
    const file = event.target.files &amp;&amp; event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function() {
      try {
        const data = JSON.parse(reader.result);
        if (data.unidades &amp;&amp; typeof data.unidades === &#x27;object&#x27;) {
          Object.keys(UNITS_DATA).forEach(k =&gt; delete UNITS_DATA[k]);
          Object.assign(UNITS_DATA, data.unidades);
        }
        if (data.localStorage &amp;&amp; typeof data.localStorage === &#x27;object&#x27;) {
          Object.entries(data.localStorage).forEach(([k, v]) =&gt; {
            if (k.indexOf(&#x27;reset.&#x27;) === 0) localStorage.setItem(k, v);
          });
        }
        atualizarTelaCompleta();
        alert(&#x27;JSON importado com sucesso. Clique em “Salvar alterações” para enviar essa versão para a nuvem.&#x27;);
      } catch (e) {
        alert(&#x27;Não foi possível importar o JSON. Verifique se o arquivo é válido.&#x27;);
      } finally {
        event.target.value = &#x27;&#x27;;
      }
    };
    reader.readAsText(file);
  }

  // ===== Calendário de melhorias por início e unidade =====
  function getCalendarItems() {
    const items = [];
    Object.entries(UNITS_DATA).forEach(([unidade, actions]) =&gt; {
      actions.forEach(action =&gt; {
        (action.melhorias || []).forEach(m =&gt; {
          const mid = getMelhoriaId(unidade, action, m);
          const inicioISO = getSavedField(mid, &#x27;inicio&#x27;, dateISOFromBR(m.inicio));
          if (!inicioISO) return;
          items.push({
            date: inicioISO,
            unidade,
            acao: action.idac,
            melhoria: m.idm,
            desc: m.desc,
            status: getSavedField(mid, &#x27;status&#x27;, m.status)
          });
        });
      });
    });
    return items.sort((a,b) =&gt; a.date.localeCompare(b.date) || a.unidade.localeCompare(b.unidade));
  }

  function renderCalendarMonthOptions() {
    const sel = document.getElementById(&#x27;calendar-month&#x27;);
    if (!sel) return;
    const old = sel.value;
    const items = getCalendarItems();
    const months = [...new Set(items.map(i =&gt; i.date.slice(0,7)))];
    sel.innerHTML = months.map(m =&gt; {
      const [y, mo] = m.split(&#x27;-&#x27;);
      return `&lt;option value=&quot;${m}&quot;&gt;${mo}/${y}&lt;/option&gt;`;
    }).join(&#x27;&#x27;);
    if (months.includes(old)) sel.value = old;
    else if (months.length) sel.value = months[0];
  }

  function escapeHtml(value) {
    return String(value || &#x27;&#x27;).replace(/[&amp;&lt;&gt;&#x27;&quot;]/g, c =&gt; ({&#x27;&amp;&#x27;:&#x27;&amp;amp;&#x27;,&#x27;&lt;&#x27;:&#x27;&amp;lt;&#x27;,&#x27;&gt;&#x27;:&#x27;&amp;gt;&#x27;,&quot;&#x27;&quot;:&#x27;&amp;#39;&#x27;,&#x27;&quot;&#x27;:&#x27;&amp;quot;&#x27;}[c]));
  }

  function renderCalendar() {
    const grid = document.getElementById(&#x27;calendar-grid&#x27;);
    const sel = document.getElementById(&#x27;calendar-month&#x27;);
    const count = document.getElementById(&#x27;calendar-count&#x27;);
    if (!grid || !sel) return;
    if (!sel.options.length) renderCalendarMonthOptions();
    const month = sel.value;
    if (!month) {
      grid.innerHTML = &#x27;&lt;div class=&quot;calendar-empty&quot;&gt;Nenhuma melhoria encontrada.&lt;/div&gt;&#x27;;
      if (count) count.textContent = &#x27;&#x27;;
      return;
    }

    const items = getCalendarItems().filter(item =&gt; item.date.slice(0,7) === month);
    const byDate = {};
    items.forEach(item =&gt; {
      if (!byDate[item.date]) byDate[item.date] = [];
      byDate[item.date].push(item);
    });

    const dates = Object.keys(byDate).sort();
    if (!dates.length) {
      grid.innerHTML = &#x27;&lt;div class=&quot;calendar-empty&quot;&gt;Nenhuma melhoria encontrada para o mês selecionado.&lt;/div&gt;&#x27;;
      if (count) count.innerHTML = &#x27;&lt;strong&gt;0&lt;/strong&gt; melhorias no mês selecionado&#x27;;
      return;
    }

    const html = dates.map(date =&gt; {
      const [y, m, d] = date.split(&#x27;-&#x27;);
      const dayItems = byDate[date].sort((a,b) =&gt;
        a.unidade.localeCompare(b.unidade) ||
        a.acao.localeCompare(b.acao) ||
        a.melhoria.localeCompare(b.melhoria)
      );
      const cards = dayItems.map(item =&gt; {
        const statusSlug = statusClass(item.status);
        return `&lt;div class=&quot;kanban-card status-${statusSlug}&quot;&gt;
          &lt;strong&gt;${escapeHtml(item.unidade)} · ${escapeHtml(item.acao)} · ${escapeHtml(item.melhoria)}&lt;/strong&gt;
          &lt;span class=&quot;kanban-status&quot;&gt;Status: ${escapeHtml(item.status)}&lt;/span&gt;
        &lt;/div&gt;`;
      }).join(&#x27;&#x27;);
      return `&lt;div class=&quot;kanban-day&quot;&gt;
        &lt;div class=&quot;kanban-day-header&quot;&gt;
          &lt;div class=&quot;kanban-day-title&quot;&gt;${d}/${m}/${y}&lt;/div&gt;
          &lt;div class=&quot;kanban-day-count&quot;&gt;${dayItems.length} melhoria${dayItems.length === 1 ? &#x27;&#x27; : &#x27;s&#x27;}&lt;/div&gt;
        &lt;/div&gt;
        ${cards}
      &lt;/div&gt;`;
    }).join(&#x27;&#x27;);

    grid.innerHTML = html;
    if (count) count.innerHTML = `&lt;strong&gt;${items.length}&lt;/strong&gt; melhorias no mês selecionado`;
  }




  // ===== Agenda Operacional =====
  function formatBRFromISO(iso) {
    if (!iso) return &#x27;&#x27;;
    const parts = String(iso).split(&#x27;-&#x27;);
    if (parts.length !== 3) return iso;
    return parts[2] + &#x27;/&#x27; + parts[1] + &#x27;/&#x27; + String(parts[0]).slice(-2);
  }
  function normalizarTextoFiltro(v) {
    return String(v || &#x27;&#x27;).toLowerCase().normalize(&#x27;NFD&#x27;).replace(/[\u0300-\u036f]/g, &#x27;&#x27;);
  }
  function normalizarQuemFazValor(v) {
    const s = String(v || '').trim();
    if (!s || s === '—' || s === '-') return '';
    const n = normalizarTextoFiltro(s);
    if (n === 'bolix') return 'Bolix';
    if (n === 'pentagrama') return 'Pentagrama';
    if (n === 'terceiro') return 'Terceiro';
    return s;
  }

  function getQuemFazAgenda(mid, melhoria) {
    let valor = '';

    // 1) Lê exatamente o select visível do Cronograma, quando ele já está renderizado.
    try {
      const el = document.querySelector('select.quem-faz-select[data-mid=&quot;' + mid + '&quot;]');
      if (el) valor = normalizarQuemFazValor(el.value);
    } catch(e) {}

    // 2) Lê o mesmo armazenamento usado pelo Cronograma ao alterar o campo Quem faz?.
    if (!valor) {
      const campos = ['quem-faz', 'quemFaz', 'quem_faz', 'responsavel', 'quem'];
      for (const campo of campos) {
        valor = normalizarQuemFazValor(getSavedField(mid, campo, ''));
        if (valor) break;
      }
    }

    // 3) Varredura defensiva para versões anteriores que possam ter salvo o campo com outro sufixo.
    if (!valor) {
      try {

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    user-select: none;

  .amb-radio.neutral { color: var(--muted); }
  .amb-radio.neutral:hover { border-color: var(--border2); color: var(--text); }
  .amb-radio.approved { background: rgba(52,211,153,.15); border-color: var(--green); color: var(--green); }
  .amb-radio.rejected { background: rgba(248,113,113,.15); border-color: var(--red); color: var(--red); }
  .amb-radio.pending  { background: rgba(251,191,36,.10); border-color: var(--yellow); color: var(--yellow); }
  .amb-radio.partial  { background: rgba(251,191,36,.18); border-color: var(--yellow); color: var(--yellow); }
  @media (max-width: 900px) {
    .amb-header { display: none; }
    .amb-row { grid-template-columns: 1fr 1fr; gap: 8px; }
    .amb-row { padding: 12px; }
  }
  @media (max-width: 600px) {
    .amb-row { grid-template-columns: 1fr; }
  }

  /* Cor verde Bolix nos labels */
  label.lbl,
  .amb-header &gt; div {
    color: var(--brand);
  }

  /* ─── WORKFLOW (assinatura + trava de aba) ─── */
  .signoff-bar {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 18px;
    display: flex;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 16px;
    row-gap: 14px;
  }
  .signoff-bar .sb-status {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
    padding: 4px 10px;
    border-radius: 6px;
    background: rgba(251,191,36,.15);
    color: var(--yellow);
    border: 1px solid #fbbf2440;
  }
  .signoff-bar select.sb-status {
    width: auto;
    min-width: 190px;
    height: 32px;
    padding: 4px 10px;
  }
  .signoff-bar.locked .sb-status {
    background: rgba(168,204,58,.15);
    color: var(--brand);
    border-color: rgba(168,204,58,.4);
  }
  .signoff-bar .sb-field {
    display: flex; flex-direction: column; gap: 4px; min-width: 200px;
  }
  .signoff-bar .sb-actions {
    display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap;
  }
  .tab-pane.locked input,
  .tab-pane.locked select,
  .tab-pane.locked textarea {
    pointer-events: none;
    opacity: .85;
  }
  .tab-pane.locked .amb-radio,
  .tab-pane.locked .radio-btn,
  .tab-pane.locked .check-item-row {
    pointer-events: none;
    opacity: .8;
  }
  .tab-pane.locked .signoff-bar input,
  .tab-pane.locked .signoff-bar select,
  .tab-pane.locked .signoff-bar button { pointer-events: auto; opacity: 1; }
  .tab-pane.locked .signoff-bar .sb-unlock { display: inline-flex !important; }
  .tab-pane.locked .signoff-bar .sb-conclude { display: none !important; }
  .signoff-bar .sb-unlock { display: none; }

  /* ─── SIGNOFF (grade unificada 5 colunas x 5 linhas com Implantacao/Medicao tall na direita) ─── */
  .sb-grid {
    display: grid;
    grid-template-columns: 1.3fr 1.3fr 1.3fr 1.1fr 1.1fr;
    grid-template-rows: auto auto auto auto auto;
    column-gap: 14px;
    row-gap: 14px;
    align-items: end;
  }
  .sb-score-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--brand);
    text-transform: uppercase;
    letter-spacing: .07em;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(168,204,58,.25);
    margin-top: 4px;
    align-self: end;
  }
  /* Coluna alta (Implantacao / Medicao) ocupa todas as linhas */
  .sb-tall-col {
    display: flex;
    flex-direction: column;
    align-self: stretch;
    background: rgba(80,50,148,.05);
    border: 1px solid rgba(168,204,58,.18);
    border-radius: 10px;
    padding: 12px;
  }
  .sb-tall-col .group-title {
    text-align: center;
    margin-bottom: 14px;
    padding-bottom: 8px;
  }
  .sb-tall-col .group-fields-tall {
    display: flex;
    flex-direction: column;
    gap: 14px;
    flex: 1;
    justify-content: space-around;
  }
  .sb-tall-col .group-fields-tall .field {
    margin-bottom: 0;
    text-align: center;
  }
  .sb-tall-col .group-fields-tall .field .lbl { text-align: center; }
  .sb-tall-col .group-fields-tall input {
    text-align: center;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 16px;
    padding: 12px 8px;
    height: 44px;
  }
  .sb-tall-col .group-fields-tall input[readonly] {
    background: rgba(168,204,58,.08);
  }
  /* Field-group reutilizado para Implantacao e Medicao da Eficacia */
  .field-group .group-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--brand);
    text-transform: uppercase;
    letter-spacing: .06em;
    padding-bottom: 6px;
    margin-bottom: 8px;
    border-bottom: 1px solid rgba(168,204,58,.25);
    text-align: center;
  }
  .field-group .group-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .field-group .group-fields input {
    text-align: center;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 14px;
    padding: 10px 8px;
    height: 40px;
  }
  .field-group .group-fields input[readonly] {
    background: rgba(168,204,58,.06);
  }

  /* ─── Score da atuacao interna - 3 colunas em cima, 3 embaixo ─── */
  .signoff-score {
    margin-top: 4px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .signoff-score-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--brand);
    text-transform: uppercase;
    letter-spacing: .07em;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(168,204,58,.25);
  }
  .signoff-score-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    align-items: end;
  }
  /* Caixa do Resultado da Atuacao - numero + classificacao inline (mesmo modelo da Pontuacao das Melhorias) */
  .score-result-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-sizing: border-box;
    transition: border-color .2s, color .2s;
  }
  .score-result-box .score-number {
    font-size: 18px;
    line-height: 1;
    font-weight: 700;
    font-family: var(--font-main);
  }
  .score-result-box .score-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: capitalize;
    line-height: 1;
  }
  .score-result-box.lvl-low      { border-color: rgba(52,211,153,.4); }
  .score-result-box.lvl-medium   { border-color: rgba(96,165,250,.4); }
  .score-result-box.lvl-high     { border-color: rgba(251,191,36,.4); }
  .score-result-box.lvl-critical { border-color: rgba(248,113,113,.4); }
  .score-result-box.lvl-low .score-number,
  .score-result-box.lvl-low .score-label      { color: var(--green); }
  .score-result-box.lvl-medium .score-number,
  .score-result-box.lvl-medium .score-label   { color: #60a5fa; }
  .score-result-box.lvl-high .score-number,
  .score-result-box.lvl-high .score-label     { color: var(--yellow); }
  .score-result-box.lvl-critical .score-number,
  .score-result-box.lvl-critical .score-label { color: var(--red); }

  /* Nivel de Fragilidade - cor dinamica conforme classificacao */
  #nivelFragilidade.lvl-low      { color: var(--green); border-color: rgba(52,211,153,.4); }
  #nivelFragilidade.lvl-medium   { color: #60a5fa;     border-color: rgba(96,165,250,.4); }
  #nivelFragilidade.lvl-high     { color: var(--yellow); border-color: rgba(251,191,36,.4); }
  #nivelFragilidade.lvl-critical { color: var(--red);   border-color: rgba(248,113,113,.4); }
  @media (max-width: 1100px) {
    .sb-grid { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: auto auto auto auto auto auto auto; }
    .sb-grid &gt; * { grid-column: auto !important; grid-row: auto !important; }
    .sb-grid &gt; .field[style*=&quot;grid-column: 1 / 3&quot;] { grid-column: 1 / -1 !important; }
    .sb-grid &gt; .sb-score-title { grid-column: 1 / -1 !important; }
    .sb-grid &gt; .sb-tall-col { grid-column: 1 / -1 !important; }
    .sb-tall-col .group-fields-tall { flex-direction: row; }
    .sb-tall-col .group-fields-tall .field { flex: 1; }
  }
  @media (max-width: 700px) {
    .sb-grid { grid-template-columns: 1fr 1fr; }
    .sb-grid &gt; .field[style*=&quot;grid-column: 1 / 3&quot;] { grid-column: 1 / -1 !important; }
  }
  @media (max-width: 480px) {
    .sb-grid { grid-template-columns: 1fr; }
    .sb-grid &gt; * { grid-column: 1 / -1 !important; }
    .sb-tall-col .group-fields-tall { flex-direction: column; }
  }
  /* Grupos com titulo (Implantacao / Medicao da Eficacia) */
  .field-group {
    display: flex;
    flex-direction: column;
  }
  .field-group .group-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--brand);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid rgba(168,204,58,.25);
  }
  .field-group .group-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }
  .field-group .group-fields .field { margin-bottom: 0; }


  /* ─── MOBILE-FRIENDLY ─── */
  @media (max-width: 1200px) {
    .signoff-grid { grid-template-columns: 1fr 1fr 1fr 1fr; }
    .signoff-grid &gt; .field, .signoff-grid &gt; .grp-title { grid-column: auto !important; grid-row: auto !important; }
    .signoff-grid .grp-title { grid-column: span 2 !important; text-align: left; }
  }
  @media (max-width: 700px) {
    .signoff-grid { grid-template-columns: 1fr 1fr; }
    .signoff-grid &gt; .field, .signoff-grid &gt; .grp-title { grid-column: auto !important; grid-row: auto !important; }
    .signoff-grid .grp-title { grid-column: 1 / -1 !important; }
  }
  @media (max-width: 700px) {
    .signoff-row { grid-template-columns: 1fr 1fr; }
    .signoff-row &gt; .field:first-child,
    .signoff-row &gt; .field-group { grid-column: 1 / -1; }
    .header-inner { padding: 12px 16px; }
    .header-actions { flex-wrap: wrap; }
    .header-actions .btn { font-size: 12px; padding: 7px 10px; }
    h1 { font-size: 14px !important; padding: 4px 10px !important; }
    .container { padding: 12px 12px 40px; }
    .signoff-bar { padding: 12px; gap: 10px; }
    .signoff-bar .sb-actions { width: 100%; }
    .signoff-bar .sb-actions .btn { flex: 1; min-width: 0; font-size: 11px; padding: 8px; }
    .main-tabs { padding: 0 12px; }
    .main-tab { padding: 12px 14px; font-size: 11px; }
    .nav-tabs { padding: 0 6px; }
    .nav-tab { padding: 8px 10px; font-size: 11px; }
    .card { padding: 14px; }
    body { font-size: 13px; }
  }
  @media (max-width: 480px) {
    .signoff-grid { grid-template-columns: 1fr; }
    .signoff-grid &gt; .field, .signoff-grid &gt; .grp-title { grid-column: 1 / -1 !important; grid-row: auto !important; }
  }

  /* Mobile: legenda compacta + caixas de pontuacao das melhorias menores */
  @media (max-width: 700px) {
    section .card &gt; div[style*=&quot;margin-top:18px&quot;][style*=&quot;display:flex&quot;] {
      font-size: 11px !important;
      column-gap: 12px !important;
      row-gap: 6px !important;
    }
    section .card &gt; div[style*=&quot;margin-top:18px&quot;][style*=&quot;display:flex&quot;] .amb-radio {
      width: 24px !important;
      height: 24px !important;
      font-size: 12px !important;
    }
    .validation-summary { gap: 6px !important; }
    .vs-box { padding: 8px 6px !important; }
    .vs-box strong { font-size: 18px !important; }
    .vs-box span { font-size: 9px !important; }
  }

  /* Mobile */
  @media (max-width: 900px) {
    /* Bloco A - linha de identificacao (g5) vira 2 colunas */
    .g5[style*=&quot;grid-template-columns: 2.6fr&quot;] { grid-template-columns: 1fr 1fr !important; }
    /* Bloco A - linha de responsaveis (g4) */
    .g4 { grid-template-columns: 1fr 1fr !important; }
    /* g6 da Identificacao (Inicio/Prazo/Previsao/Status/Meta/Aderencia) */
    .g6 { grid-template-columns: 1fr 1fr !important; }
    /* Bloco B - tabelas de checklist com scroll */
    .amb-table { overflow-x: auto; }
    .amb-header, .amb-row { min-width: 600px; }
    /* Resultado final do checklist */
    .g5[style*=&quot;grid-template-columns: 1.1fr&quot;] { grid-template-columns: 1fr 1fr !important; }
    /* Linha de Dados do teste (Operacao + datas + condicao) */
    .dados-teste-row { grid-template-columns: 1fr 1fr !important; }
    .empresa-row { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 600px) {
    .g5[style*=&quot;grid-template-columns&quot;], .g6, .g4, .g3 {
      grid-template-columns: 1fr !important;
    }
    .dados-teste-row, .empresa-row { grid-template-columns: 1fr !important; }
    .amb-header, .amb-row { min-width: 480px; }
    .check-detail-title { font-size: 13px; }
    .item-hint { font-size: 11px; }
    .check-detail { padding: 12px; }
    .signoff-bar { padding: 12px; gap: 10px; }
    .check-detail .radio-group .radio-btn { font-size: 11px; padding: 7px; }
    .melhorias-table { font-size: 11px; }
  }

  /* ─── Análise da atuação: escala, diagnóstico e recomendação ─── */
  .analise-diagnostico {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .analise-header {
    display: block;
    margin-bottom: 14px;
  }
  .analise-title {
    font-weight: 700;
    font-size: 13px;
    color: var(--brand);
    text-transform: uppercase;
    letter-spacing: .07em;
  }
  .analise-sub {
    margin-top: 4px;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
  }
  .analise-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1.4fr;
    gap: 18px;
    align-items: start;
  }
  .analise-cell { min-width: 0; }
  .analise-cell-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--brand);
    text-transform: uppercase;
    letter-spacing: .07em;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .escala-pills { display: flex; flex-wrap: nowrap; gap: 8px; align-items: center; }
  .score-legend-pill {
    padding: 4px 10px;
    border-radius: 99px;
    border: 1px solid;
    font-weight: 600;
    font-family: var(--font-mono);
    font-size: 11px;
  }
  .score-legend-pill.lvl-low      { color: var(--green);  border-color: rgba(52,211,153,.4);  background: rgba(52,211,153,.06); }
  .score-legend-pill.lvl-medium   { color: #60a5fa;       border-color: rgba(96,165,250,.4);  background: rgba(96,165,250,.06); }
  .score-legend-pill.lvl-high     { color: var(--yellow); border-color: rgba(251,191,36,.4);  background: rgba(251,191,36,.06); }
  .score-legend-pill.lvl-critical { color: var(--red);    border-color: rgba(248,113,113,.4); background: rgba(248,113,113,.06); }
  .info-tip {
    position: relative;
    display: inline-flex;
    color: var(--brand);
    cursor: help;
    font-weight: 700;
    text-transform: none;
    letter-spacing: normal;
    font-size: 14px;
  }
  .info-box {
    display: none;
    position: absolute;
    left: 0;
    bottom: 140%;
    width: 300px;
    padding: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-size: 11px;
    line-height: 1.5;
    text-transform: none;
    letter-spacing: normal;
    font-family: var(--font-main);
    z-index: 50;
    box-shadow: 0 8px 24px rgba(0,0,0,.5);
    font-weight: 400;
  }
  .info-tip:hover .info-box, .info-tip:focus .info-box { display: block; }
  .diagnostico-output {
    min-height: 22px;
    color: #e8f0fe;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.45;
  }
  .recomendacao-output {
    min-height: 22px;
    color: #e8f0fe;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.45;
  }
  @media (max-width: 900px) {
    .analise-grid { grid-template-columns: 1fr; gap: 14px; }
  }



  /* ─── VERSÃO PRO: melhorias dinâmicas + layout compacto ─── */
  .melhorias-table-wrap {
    width: 100%;
    overflow-x: hidden;
  }

  .melhorias-table-pro th:nth-child(5), .melhorias-table-pro td:nth-child(5) { width: 116px; }
  .melhorias-table-pro th:nth-child(6), .melhorias-table-pro td:nth-child(6) { width: 116px; }
  .melhorias-table-pro th:nth-child(7), .melhorias-table-pro td:nth-child(7) { width: 108px; }
  .melhorias-table-pro th:nth-child(8), .melhorias-table-pro td:nth-child(8) { width: 46px; }

  .melhorias-table-pro th:nth-child(10), .melhorias-table-pro td:nth-child(10) { width: 96px; }
  .melhorias-table-pro th:nth-child(11), .melhorias-table-pro td:nth-child(11) { width: 100px; }
  .melhorias-table-pro input,
  .melhorias-table-pro select {

    font-size: 12px !important;

  .melhorias-table-pro .pill {

  .melhorias-table-pro .amb-radio {

  .melhorias-table-pro .amb-radio-group {

  .pro-panel {

  }

  }
  .pro-title {

  /* ─── Ajustes PRO solicitados: análise operacional/estratégica + prazo ─── */

&lt;script&gt;
/* ─── SYNC: Acao do Reset -&gt; Acao do Formulario ─── */
  function syncAcao() {
    const src = document.getElementById(&#x27;acaoReset&#x27;);
    const dst = document.getElementById(&#x27;acaoFormulario&#x27;);
    if (src &amp;&amp; dst) dst.value = src.value;
  }
  document.addEventListener(&#x27;DOMContentLoaded&#x27;, () =&gt; {
    const src = document.getElementById(&#x27;acaoReset&#x27;);
    const dst = document.getElementById(&#x27;acaoFormulario&#x27;);
    if (src &amp;&amp; dst) {
      // Sincronizar valor inicial
      if (src.value) dst.value = src.value;
    }
  });

  /* ─── WORKFLOW: export, import, lock ─── */
  const FORM_VERSION = &#x27;reset-ac01-v1&#x27;;

  function sanitizeFilePart(value) {
    return String(value || &#x27;&#x27;)
      .trim()
      .normalize(&#x27;NFD&#x27;).replace(/[\u0300-\u036f]/g, &#x27;&#x27;)
      .replace(/[^a-zA-Z0-9-_ ]+/g, &#x27;&#x27;)
      .replace(/\s+/g, &#x27;-&#x27;)
      .replace(/-+/g, &#x27;-&#x27;)
      .replace(/^-|-$/g, &#x27;&#x27;);
  }

  function getTituloArquivo() {
    return sanitizeFilePart(document.querySelector(&#x27;header h1&#x27;)?.textContent || document.title || &#x27;RESET&#x27;);
  }

  function getIdArquivo() {
    const idEl = document.getElementById(&#x27;registroId&#x27;) || document.querySelector(&#x27;input[value^=&quot;AC-02&quot;]&#x27;);
    return sanitizeFilePart(idEl?.value || &#x27;SEM-ID&#x27;);
  }

  function getNomeArquivoBase() {
    return `${getTituloArquivo()}-${getIdArquivo()}`;
  }

  function collectTabData(tabName) {
    const pane = document.getElementById(&#x27;pane-&#x27; + tabName);
    if (!pane) return null;
    const fields = pane.querySelectorAll(&#x27;input, select, textarea&#x27;);
    const values = [];
    fields.forEach(f =&gt; values.push({ type: f.type || f.tagName.toLowerCase(), id: f.id || &#x27;&#x27;, value: f.value }));
    return {
      version: FORM_VERSION,
      tab: tabName,
      exportedAt: new Date().toISOString(),
      responsavel: document.getElementById(&#x27;resp-&#x27; + tabName)?.value || &#x27;&#x27;,
      dataPreenchimento: document.getElementById(&#x27;data-&#x27; + tabName)?.value || &#x27;&#x27;,
      locked: pane.classList.contains(&#x27;locked&#x27;),
      values: values
    };
  }

  function exportTabData(tabName) {
    const data = collectTabData(tabName);
    if (!data) return;
    if (!data.dataPreenchimento) {
      data.dataPreenchimento = new Date().toISOString().slice(0, 10);
      const dEl = document.getElementById(&#x27;data-&#x27; + tabName);
      if (dEl) dEl.value = data.dataPreenchimento;
    }
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: &#x27;application/json&#x27; });
    const url = URL.createObjectURL(blob);
    const a = document.createElement(&#x27;a&#x27;);
    const stamp = new Date().toISOString().slice(0, 16).replace(/[:T]/g, &#x27;-&#x27;);
    a.href = url;
    a.download = `${getNomeArquivoBase()}-${tabName}-${stamp}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast(&#x27;Dados da aba &#x27; + tabName + &#x27; exportados&#x27;);
  }

  function applyTabData(data) {
    const pane = document.getElementById(&#x27;pane-&#x27; + data.tab);
    if (!pane) { alert(&#x27;Aba não encontrada: &#x27; + data.tab); return; }
    const fields = pane.querySelectorAll(&#x27;input, select, textarea&#x27;);
    if (!Array.isArray(data.values)) { alert(&#x27;JSON sem campos válidos&#x27;); return; }
    data.values.forEach((v, i) =&gt; {
      if (fields[i]) {
        fields[i].value = (typeof v === &#x27;object&#x27;) ? v.value : v;
      }
    });
    if (data.responsavel) {
      const r = document.getElementById(&#x27;resp-&#x27; + data.tab);
      if (r) r.value = data.responsavel;
    }
    if (data.dataPreenchimento) {
      const d = document.getElementById(&#x27;data-&#x27; + data.tab);
      if (d) d.value = data.dataPreenchimento;
    }
    restoreVisualStates();
    restoreResetLetterSelections();
    if (data.locked) lockTab(data.tab);
    updateProgress();
    if (typeof updateCheckSummary === &#x27;function&#x27;) updateCheckSummary();
    if (typeof updateMelhoriasSummary === &#x27;function&#x27;) updateMelhoriasSummary();
    toast(&#x27;Dados importados com sucesso&#x27;);
  }

  function importTabData(tabName, file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) =&gt; {
      try {
        const data = JSON.parse(e.target.result);
        if (data.tab &amp;&amp; data.tab !== tabName) {
          if (!confirm(&#x27;O arquivo é da aba &quot;&#x27; + data.tab + &#x27;&quot;, mas você está importando na &quot;&#x27; + tabName + &#x27;&quot;. Deseja continuar mesmo assim?&#x27;)) return;
        }
        applyTabData(data);
      } catch (err) {
        alert(&#x27;Erro ao importar JSON: &#x27; + err.message);
      }
    };
    reader.readAsText(file);
  }

  function restoreVisualStates() {

    document.querySelectorAll(&#x27;.amb-status, .m-status, .eficaz-status&#x27;).forEach(hidden =&gt; {

        const onclick = b.getAttribute(&#x27;onclick&#x27;) || &#x27;&#x27;;
        if (onclick.includes(&quot;&#x27;&quot; + val + &quot;&#x27;&quot;)) {

      group.querySelectorAll(&#x27;.radio-btn&#x27;).forEach(b =&gt; {

  /* ─── SCORES ─── */
  function classify(total) {
    if (total &gt;= 11) return [&#x27;Crítico&#x27;,&#x27;lvl-critical&#x27;];
    if (total &gt;= 9)  return [&#x27;Alto&#x27;,&#x27;lvl-high&#x27;];
    if (total &gt;= 6)  return [&#x27;Médio&#x27;,&#x27;lvl-medium&#x27;];
    return [&#x27;Baixo&#x27;,&#x27;lvl-low&#x27;];
  }

  function calcularGrupo(cls, numId, lblId) {
    const elements = [...document.querySelectorAll(&#x27;.&#x27; + cls)];
    const valid = elements.filter(el =&gt; el.value !== &#x27;&#x27; &amp;&amp; !isNaN(+el.value));
    const numEl = document.getElementById(numId);
    const lblEl = document.getElementById(lblId);
    const box = numEl ? numEl.parentElement : null;
    if (box &amp;&amp; box.classList.contains(&#x27;score-result-box&#x27;)) {
      box.classList.remove(&#x27;lvl-low&#x27;,&#x27;lvl-medium&#x27;,&#x27;lvl-high&#x27;,&#x27;lvl-critical&#x27;);
    }
    if (valid.length === 0) {
      // Nenhuma selecao - exibir vazio
      if (numEl) { numEl.textContent = &#x27;&#x27;; numEl.className = &#x27;score-number&#x27;; }
      if (lblEl) { lblEl.textContent = &#x27;&#x27;; lblEl.className = &#x27;score-label&#x27;; }
      atualizarFragilidadeOperacional(null, &#x27;&#x27;, &#x27;&#x27;);
      return;
    }
    const total = valid.map(el =&gt; +el.value).reduce((a,b)=&gt;a+b, 0);
    const [txt, klass] = classify(total);
    if (numEl) {
      numEl.textContent = total;
      numEl.className = &#x27;score-number &#x27; + klass;
    }
    if (box &amp;&amp; box.classList.contains(&#x27;score-result-box&#x27;)) {
      box.classList.add(klass);
    }
    if (lblEl) {
      lblEl.textContent = txt;
      lblEl.className = &#x27;score-label &#x27; + klass;
    }
    atualizarFragilidadeOperacional(total, txt, klass);
    if (typeof gerarDiagnostico === &#x27;function&#x27;) gerarDiagnostico();
  }

  function atualizarFragilidadeOperacional(total, label, cls) {
    const nivelEl = document.getElementById(&#x27;nivelFragilidade&#x27;);
    if (!nivelEl) return;
    if (!total || !label) {
      nivelEl.value = &#x27;&#x27;;
      nivelEl.className = &#x27;&#x27;;
      return;
    }
    nivelEl.value = label;
    nivelEl.className = cls;
  }

  function atualizarDiagnosticoInteligente() {
    const totalEl = document.getElementById(&#x27;atuacaoTotal&#x27;);
    const labelEl = document.getElementById(&#x27;atuacaoLabel&#x27;);
    const nivelEl = document.getElementById(&#x27;nivelFragilidade&#x27;);
    const diagEl  = document.getElementById(&#x27;diagnosticoAutomatizado&#x27;);
    const recEl   = document.getElementById(&#x27;recomendacaoAutomatizada&#x27;);

    if (!diagEl || !recEl) return;

    const score = parseFloat((totalEl?.textContent || &#x27;&#x27;).trim());
    const atuacaoLabel = (labelEl?.textContent || &#x27;&#x27;).trim();
    const fragilidade = (nivelEl?.value || &#x27;&#x27;).trim();

    if (isNaN(score) || !atuacaoLabel || !fragilidade) {
      diagEl.textContent = &#x27;&#x27;;
      recEl.textContent = &#x27;&#x27;;
      return;
    }

    const resultado = diagnosticoOperacional(score);
    diagEl.textContent = resultado.diagnostico;
    recEl.textContent = resultado.recomendacao;
  }

  function diagnosticoOperacional(score) {
    if (score &lt;= 5) {
      return {
        diagnostico: &#x27;Atuação controlada&#x27;,
        recomendacao: &#x27;Manter padrão de execução, evidências e rotina de acompanhamento.&#x27;
      };
    }
    if (score &lt;= 8) {
      return {
        diagnostico: &#x27;Atuação com desvios moderados&#x27;,
        recomendacao: &#x27;Ajustar controle, prazo ou evidência antes de considerar a atuação estabilizada.&#x27;
      };
    }
    if (score &lt;= 10) {
      return {
        diagnostico: &#x27;Atuação instável&#x27;,
        recomendacao: &#x27;Reforçar controle operacional e corrigir desvios antes de avançar.&#x27;
      };
    }
    return {
      diagnostico: &#x27;Atuação crítica&#x27;,
      recomendacao: &#x27;Reestruturar a atuação operacional antes de qualquer encerramento.&#x27;
    };
  }

  function obterResumoMelhorias() {
    const itens = [...document.querySelectorAll(&#x27;.m-status&#x27;)];
    const total = itens.length;
    const aprovadas = itens.filter(i =&gt; i.value === &#x27;approved&#x27;).length;
    const reprovadas = itens.filter(i =&gt; i.value === &#x27;rejected&#x27;).length;
    const parciais = itens.filter(i =&gt; i.value === &#x27;partial&#x27;).length;
    const pendentes = itens.filter(i =&gt; i.value === &#x27;none&#x27;).length;
    return { total, aprovadas, reprovadas, parciais, pendentes };
  }

  function parseDataPrazo(valor) {
    if (!valor) return null;
    valor = String(valor).trim();

    // input type=&quot;date&quot; retorna yyyy-mm-dd
    if (/^\d{4}-\d{2}-\d{2}$/.test(valor)) {
      const [ano, mes, dia] = valor.split(&#x27;-&#x27;).map(Number);
      return new Date(ano, mes - 1, dia);
    }

    // fallback para dd/mm/aaaa, caso o navegador/localidade exponha esse formato
    if (/^\d{2}\/\d{2}\/\d{4}$/.test(valor)) {
      const [dia, mes, ano] = valor.split(&#x27;/&#x27;).map(Number);
      return new Date(ano, mes - 1, dia);
    }

    return null;
  }

  function obterResumoPrazos() {
    const rows = [...document.querySelectorAll(&#x27;.melhorias-table-pro tr.melhoria-item&#x27;)];
    let noPrazo = 0, atrasadas = 0, semDatas = 0;
    rows.forEach(tr =&gt; {
      const cells = tr.querySelectorAll(&#x27;td&#x27;);
      const previsaoValor = cells[4]?.querySelector(&#x27;input[type=&quot;date&quot;]&#x27;)?.value || &#x27;&#x27;;
      const conclusaoValor = cells[5]?.querySelector(&#x27;input[type=&quot;date&quot;]&#x27;)?.value || &#x27;&#x27;;
      const previsao = parseDataPrazo(previsaoValor);
      const conclusao = parseDataPrazo(conclusaoValor);
      if (!previsao || !conclusao) semDatas++;
      else if (conclusao &lt;= previsao) noPrazo++;
      else atrasadas++;
    });
    const total = rows.length;
    const avaliadas = noPrazo + atrasadas;
    const pctAtraso = total ? Math.round((atrasadas / total) * 100) : 0;
    const pctAtrasoAvaliado = avaliadas ? Math.round((atrasadas / avaliadas) * 100) : 0;
    return { total, noPrazo, atrasadas, semDatas, avaliadas, pctAtraso, pctAtrasoAvaliado };
  }

  function atualizarAlertaPrazoTopo() {
    const prazos = obterResumoPrazos();
    const box = document.getElementById(&#x27;alertaPrazoTopo&#x27;);
    const texto = document.getElementById(&#x27;alertaPrazoTexto&#x27;);
    const pct = document.getElementById(&#x27;alertaPrazoPct&#x27;);
    if (!box || !texto || !pct) return;

    box.classList.remove(&#x27;ok&#x27;, &#x27;warn&#x27;, &#x27;crit&#x27;);
    pct.textContent = `${prazos.pctAtraso}%`;

    if (!prazos.total || prazos.avaliadas === 0) {
      box.classList.add(&#x27;ok&#x27;);
      texto.textContent = `Ainda não há datas suficientes para medir atraso. ${prazos.semDatas}/${prazos.total} item(ns) sem previsão ou conclusão.`;
      return;
    }

    if (prazos.atrasadas === 0) {
      box.classList.add(&#x27;ok&#x27;);
      texto.textContent = `Nenhum item atrasado. ${prazos.noPrazo}/${prazos.total} dentro do prazo; ${prazos.semDatas} sem datas.`;
    } else if (prazos.pctAtraso &lt;= 20) {
      box.classList.add(&#x27;warn&#x27;);
      texto.textContent = `${prazos.atrasadas}/${prazos.total} item(ns) atrasado(s). ${prazos.noPrazo} no prazo; ${prazos.semDatas} sem datas.`;
    } else {
      box.classList.add(&#x27;crit&#x27;);
      texto.textContent = `${prazos.atrasadas}/${prazos.total} item(ns) atrasado(s). Replanejar prazos e responsáveis antes de avançar.`;
    }
  }

  function atualizarInteligenciaEstrategica(stats) {
    const prazos = obterResumoPrazos();
    const eficazAll = [...document.querySelectorAll(&#x27;.eficaz-status&#x27;)];
    const sim = eficazAll.filter(i =&gt; i.value === &#x27;yes&#x27;).length;
    const parcialEficaz = eficazAll.filter(i =&gt; i.value === &#x27;partial&#x27;).length;
    const efiPct = stats.total ? Math.round(((sim + 0.5 * parcialEficaz) / stats.total) * 100) : 0;
    const implPct = stats.total ? Math.round(((stats.ap + 0.5 * stats.pa) / stats.total) * 100) : 0;

    const reco = document.getElementById(&#x27;proRecomendacao&#x27;);
    if (!reco) return;

    if (!stats.interacted &amp;&amp; prazos.semDatas === prazos.total) {
      reco.innerHTML = &#x27;Preencha a avaliação das melhorias para gerar a recomendação.&#x27;;
      const prazoEl = document.getElementById(&#x27;proResumoPrazo&#x27;);
      if (prazoEl) {
        prazoEl.innerHTML = `&lt;strong&gt;Prazo&lt;/strong&gt;${prazos.pctAtraso}% atrasado(s) · ${prazos.noPrazo} no prazo · ${prazos.atrasadas} atrasada(s) · ${prazos.semDatas} sem datas.`;
      }
      return;
    }

    let msg = &#x27;&#x27;;
    if (stats.re &gt; 0) {
      msg = &#x27;&lt;strong&gt;Prioridade estratégica:&lt;/strong&gt; reavaliar melhorias reprovadas antes de encerrar a ação.&#x27;;
    } else if (prazos.atrasadas &gt; 0 &amp;&amp; implPct &lt; 60) {
      msg = &#x27;&lt;strong&gt;Alerta de execução:&lt;/strong&gt; há atraso e baixa implantação. Replanejar responsáveis, prazos e sequência das entregas.&#x27;;
    } else if (prazos.atrasadas &gt; 0) {
      msg = &#x27;&lt;strong&gt;Alerta de prazo:&lt;/strong&gt; existem entregas concluídas fora da previsão. Avaliar causa do atraso e ajustar próximos ciclos.&#x27;;
    } else if (implPct &lt; 50) {
      msg = &#x27;&lt;strong&gt;Risco de baixa implantação:&lt;/strong&gt; a ação ainda não ganhou tração suficiente. Priorizar conclusão das entregas-base.&#x27;;
    } else if (implPct &gt;= 70 &amp;&amp; efiPct &lt; 60) {
      msg = &#x27;&lt;strong&gt;Risco de sustentação:&lt;/strong&gt; a implantação avançou, mas a eficácia ainda não acompanha. Medir resultado real antes de escalar.&#x27;;
    } else if (implPct &gt;= 70 &amp;&amp; efiPct &gt;= 70) {
      msg = &#x27;&lt;strong&gt;Padrão em consolidação:&lt;/strong&gt; implantação e eficácia estão positivas. Manter calendário, rotina e acompanhamento.&#x27;;
    } else {
      msg = &#x27;&lt;strong&gt;Acompanhamento necessário:&lt;/strong&gt; continuar a implantação e completar a medição de eficácia.&#x27;;
    }

    reco.innerHTML = msg;
    const prazoEl = document.getElementById(&#x27;proResumoPrazo&#x27;);
    if (prazoEl) {
      prazoEl.innerHTML = `&lt;strong&gt;Prazo&lt;/strong&gt;${prazos.pctAtraso}% atrasado(s) · ${prazos.noPrazo} no prazo · ${prazos.atrasadas} atrasada(s) · ${prazos.semDatas} sem datas.`;
    }
  }

  function calcularFaixasDinamicas(totalMelhorias) {
    const max = Math.max(1, totalMelhorias * 2);
    return {
      max,
      baixoMax: Math.floor(max * 0.25),
      medioMax: Math.floor(max * 0.50),
      altoMax: Math.floor(max * 0.75)
    };
  }

  function classificarFragilidade(score, totalMelhorias) {
    const f = calcularFaixasDinamicas(totalMelhorias);
    if (score &gt; f.altoMax)  return { label: &#x27;Crítico&#x27;, cls: &#x27;lvl-critical&#x27;, faixas: f };
    if (score &gt; f.medioMax) return { label: &#x27;Alto&#x27;,    cls: &#x27;lvl-high&#x27;,     faixas: f };
    if (score &gt; f.baixoMax) return { label: &#x27;Médio&#x27;,   cls: &#x27;lvl-medium&#x27;,   faixas: f };
    return { label: &#x27;Baixo&#x27;, cls: &#x27;lvl-low&#x27;, faixas: f };
  }

  function atualizarPainelProMelhorias(stats) {
    const total = stats.total || 0;
    const implPct = total ? Math.round(((stats.ap + 0.5 * stats.pa) / total) * 100) : 0;
    const eficazAll = [...document.querySelectorAll(&#x27;.eficaz-status&#x27;)];
    const sim = eficazAll.filter(i =&gt; i.value === &#x27;yes&#x27;).length;
    const nao = eficazAll.filter(i =&gt; i.value === &#x27;no&#x27;).length;
    const parcial = eficazAll.filter(i =&gt; i.value === &#x27;partial&#x27;).length;
    const efiMarcadas = sim + nao + parcial;
    const efiPct = total ? Math.round(((sim + 0.5 * parcial) / total) * 100) : 0;

    const setText = (id, txt) =&gt; { const el = document.getElementById(id); if (el) el.textContent = txt; };
    const setWidth = (id, pct) =&gt; { const el = document.getElementById(id); if (el) el.style.width = Math.max(0, Math.min(100, pct)) + &#x27;%&#x27;; };

    setText(&#x27;proImplPct&#x27;, implPct + &#x27;%&#x27;);
    setText(&#x27;proImplBase&#x27;, `${stats.ap + stats.pa}/${total}`);
    setWidth(&#x27;proImplBar&#x27;, implPct);

    setText(&#x27;proEfiPct&#x27;, efiPct + &#x27;%&#x27;);
    setText(&#x27;proEfiBase&#x27;, `${efiMarcadas}/${total}`);
    setWidth(&#x27;proEfiBar&#x27;, efiPct);

    atualizarInteligenciaEstrategica(stats);
  }

  function updateMelhoriasSummary() {
    const all = [...document.querySelectorAll(&#x27;.m-status&#x27;)];
    const ap = all.filter(i =&gt; i.value === &#x27;approved&#x27;).length;
    const re = all.filter(i =&gt; i.value === &#x27;rejected&#x27;).length;
    const pa = all.filter(i =&gt; i.value === &#x27;partial&#x27;).length;
    const pe = all.filter(i =&gt; i.value === &#x27;none&#x27;).length;
    const interacted = (ap + re + pa) &gt; 0;
    if (!interacted) {
      // Sem nenhuma marcacao - manter campos calculados em branco
      [&#x27;mApproved&#x27;,&#x27;mRejected&#x27;,&#x27;mPartial&#x27;,&#x27;mPending&#x27;,&#x27;mScore&#x27;,&#x27;mScoreLabel&#x27;].forEach(id =&gt; {
        const el = document.getElementById(id);
        if (el) el.textContent = &#x27;&#x27;;
      });
      const implEl = document.getElementById(&#x27;implantadoPct&#x27;);
      const efEl = document.getElementById(&#x27;eficaciaPct&#x27;);
      if (implEl) implEl.value = &#x27;&#x27;;
      if (efEl) efEl.value = &#x27;&#x27;;
      const total = all.length || 1;
      const f = calcularFaixasDinamicas(total);
      const rangesEl = document.getElementById(&#x27;mScoreRanges&#x27;);
      if (rangesEl) rangesEl.textContent = `Faixas dinâmicas (${total} melhorias / máx. ${f.max} pts): 0–${f.baixoMax} Baixo · ${f.baixoMax + 1}–${f.medioMax} Médio · ${f.medioMax + 1}–${f.altoMax} Alto · ${f.altoMax + 1}+ Crítico.`;
      atualizarPainelProMelhorias({ total, ap, re, pa, pe, interacted: false });
      atualizarDiagnosticoInteligente();
      return;
    }
    const apEl = document.getElementById(&#x27;mApproved&#x27;);
    const reEl = document.getElementById(&#x27;mRejected&#x27;);
    const paEl = document.getElementById(&#x27;mPartial&#x27;);
    const peEl = document.getElementById(&#x27;mPending&#x27;);
    if (apEl) apEl.textContent = ap;
    if (reEl) reEl.textContent = re;
    if (paEl) paEl.textContent = pa;
    if (peEl) peEl.textContent = pe;
    // Pontuacao (fragilidade) = 2*reprovados + 1*pendentes + 1*parciais
    const total = all.length || 1;
    const score = 2 * re + 1 * pe + 1 * pa;
    const classificacao = classificarFragilidade(score, total);
    const { baixoMax, medioMax, altoMax, max } = classificacao.faixas;
    const label = classificacao.label;
    const cls = classificacao.cls;

    const rangesEl = document.getElementById(&#x27;mScoreRanges&#x27;);
    if (rangesEl) {
      rangesEl.textContent = `Faixas dinâmicas (${total} melhorias / máx. ${max} pts): 0–${baixoMax} Baixo · ${baixoMax + 1}–${medioMax} Médio · ${medioMax + 1}–${altoMax} Alto · ${altoMax + 1}+ Crítico.`;
    }
    const sEl  = document.getElementById(&#x27;mScore&#x27;);
    const slEl = document.getElementById(&#x27;mScoreLabel&#x27;);
    if (sEl)  { sEl.textContent  = score; sEl.className  = &#x27;score-number &#x27; + cls; }
    if (slEl) { slEl.textContent = label; slEl.className = &#x27;score-label &#x27;  + cls; }
    // Implantado % = (Aprovados + 0.5 * Parciais) / Total Melhorias * 100
    const implantadoPct = Math.round(((ap + 0.5 * pa) / total) * 100);
    const implEl = document.getElementById(&#x27;implantadoPct&#x27;);
    if (implEl) implEl.value = implantadoPct + &#x27;%&#x27;;

    // Medicao da Eficacia % = (Sim + 0.5 * Parcial) / Total Eficaz * 100
    const eficazAll = [...document.querySelectorAll(&#x27;.eficaz-status&#x27;)];
    const simCount = eficazAll.filter(i =&gt; i.value === &#x27;yes&#x27;).length;
    const partialEficaz = eficazAll.filter(i =&gt; i.value === &#x27;partial&#x27;).length;
    const eficazTotal = eficazAll.length || 1;
    const eficaciaPct = Math.round(((simCount + 0.5 * partialEficaz) / eficazTotal) * 100);
    const efEl = document.getElementById(&#x27;eficaciaPct&#x27;);
    if (efEl) efEl.value = eficaciaPct + &#x27;%&#x27;;

    atualizarPainelProMelhorias({ total, ap, re, pa, pe, interacted: true });
    atualizarDiagnosticoInteligente();
  }

    if (formIds.includes(id)) switchMainTab(&#x27;formulario&#x27;);

    setTimeout(() =&gt; {

  // Highlight nav on scroll

  const observer = new IntersectionObserver(entries =&gt; {
    entries.forEach(entry =&gt; {
      if (entry.isIntersecting) setActiveNavTab(entry.target.id);

  }, { rootMargin: &#x27;-40% 0px -55% 0px&#x27; });
  sections.forEach(id =&gt; { const el = document.getElementById(id); if(el) observer.observe(el); });
