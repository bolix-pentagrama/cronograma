<script id="v10-linha-estavel-e-exclusao-total">
(function(){
  'use strict';
  if (window.__v10LinhaEstavelExclusaoTotal) return;
  window.__v10LinhaEstavelExclusaoTotal = true;

  function getCronFrame(){
    var f=document.getElementById('frame-cronograma');
    if(!f) return null;
    try { return { win:f.contentWindow, doc:f.contentDocument || (f.contentWindow && f.contentWindow.document) }; } catch(e){ return null; }
  }
  function inject(){
    var c=getCronFrame();
    if(!c || !c.win || !c.doc || !c.doc.body) return;
    var w=c.win, d=c.doc;

    // 1) Corrige a linha do projeto que "anda sozinha":
    //    os marcadores laranja de alteração estavam sendo aplicados também nos campos de Projetos em Execução.
    //    Eles embrulhavam inputs/selects em .reset-change-host e ocupavam espaço dentro das colunas.
    if(!d.getElementById('v10-p2-sem-marcadores')){
      var st=d.createElement('style');
      st.id='v10-p2-sem-marcadores';
      st.textContent = [
        '#section-projetos2 .reset-change-marker{display:none!important;width:0!important;height:0!important;margin:0!important;padding:0!important;overflow:hidden!important}',
        '#section-projetos2 .reset-change-host{display:contents!important}',
        '#section-projetos2 .p2-p td{position:relative!important}',
        '#section-projetos2 .p2-sel,#section-projetos2 .p2-date{width:100%!important;max-width:100%!important;min-width:0!important}',
        '#section-projetos2 .p2-p .p2-feito-wrap{display:flex!important;align-items:center!important;justify-content:center!important;gap:6px!important}'
      ].join('\n');
      d.head.appendChild(st);
    }

    function unwrapP2Markers(){
      var sec=d.getElementById('section-projetos2');
      if(!sec) return;
      sec.querySelectorAll('.reset-change-marker').forEach(function(m){ m.remove(); });
      sec.querySelectorAll('.reset-change-host').forEach(function(host){
        var parent=host.parentNode;
        if(!parent) return;
        while(host.firstChild){ parent.insertBefore(host.firstChild, host); }
        parent.removeChild(host);
      });
      sec.querySelectorAll('[data-reset-marker-ready],[data-reset-marker-key]').forEach(function(el){
        try { delete el.dataset.resetMarkerReady; delete el.dataset.resetMarkerKey; } catch(e){}
      });
    }
    w.v10UnwrapP2Markers = unwrapP2Markers;
    unwrapP2Markers();
    setTimeout(unwrapP2Markers,80);
    setTimeout(unwrapP2Markers,300);
    if(!w.__v10P2MarkerObserver){
      try{
        w.__v10P2MarkerObserver = new w.MutationObserver(function(){ unwrapP2Markers(); });
        w.__v10P2MarkerObserver.observe(d.body,{childList:true,subtree:true});
      }catch(e){}
    }

    // 2) Limpeza de sujeira órfã e exclusão em cascata.
    function slug(v){
      try { if(typeof w.projetosSlug==='function') return w.projetosSlug(v); } catch(e){}
      return String(v||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
    }
    function safeId(v){ return String(v||'').replace(/[^a-zA-Z0-9_-]/g,'-'); }
    function actionKey(un, ac){
      try { if(typeof w.projetoActionKey==='function') return w.projetoActionKey(un, ac); } catch(e){}
      return [un, ac && ac.idac].map(slug).join('__');
    }
    function projectKey(un, ac, m){
      try { if(typeof w.projetoKey==='function') return w.projetoKey(un, ac, m); } catch(e){}
      return [un, ac && ac.idac, m && m.idm].map(slug).join('__');
    }
    function projectsStorageKey(){
      try { return (typeof w.PROJETOS_EXECUCAO_KEY !== 'undefined') ? w.PROJETOS_EXECUCAO_KEY : 'reset.projetosExecucao.v1'; } catch(e){ return 'reset.projetosExecucao.v1'; }
    }
    function loadProjects(){
      try { return JSON.parse(localStorage.getItem(projectsStorageKey()) || '{}') || {}; } catch(e){ return {}; }
    }
    function saveProjects(data){
      try { localStorage.setItem(projectsStorageKey(), JSON.stringify(data || {})); } catch(e){}
    }
    function validMaps(){
      var ak={}, pk={}, mids={}, acids={};
      Object.entries(w.UNITS_DATA||{}).forEach(function(pair){
        var un=pair[0], list=Array.isArray(pair[1])?pair[1]:[];
        list.forEach(function(ac){
          var akey=actionKey(un,ac);
          ak[akey]=true;
          acids[safeId(un+'-'+(ac&&ac.idac||''))]=true;
          (Array.isArray(ac.melhorias)?ac.melhorias:[]).forEach(function(m){
            pk[projectKey(un,ac,m)]=true;
            mids[safeId(un+'-'+(ac&&ac.idac||'')+'-'+(m&&m.idm||''))]=true;
          });
        });
      });
      return {ak:ak, pk:pk, mids:mids, acids:acids};
    }
    function removeLocalStorageForAction(un, ac, mels){
      var ak=actionKey(un,ac);
      var acId=safeId(un+'-'+(ac&&ac.idac||''));
      var melIds=(mels||[]).map(function(m){ return safeId(un+'-'+(ac&&ac.idac||'')+'-'+(m&&m.idm||'')); });
      var toDel=[];
      for(var i=0;i<localStorage.length;i++){
        var k=localStorage.key(i)||'';
        var del=false;
        if(k.indexOf('reset.p2ac.'+ak+'.')===0) del=true;
        if(k.indexOf('reset.acao.v1.'+acId+'.')===0) del=true;
        if(k.indexOf('reset.field.v1.'+acId+'.')===0) del=true;
        melIds.forEach(function(mid){
          if(k.indexOf('reset.field.v1.'+mid+'.')===0) del=true;
          if(k.indexOf('reset.obslog.v1.'+mid)===0) del=true;
          if(k.indexOf('reset.obs.v1.'+mid)===0) del=true;
        });
        if(del) toDel.push(k);
      }
      toDel.forEach(function(k){ try{ localStorage.removeItem(k); }catch(e){} });
    }
    function removeProjectsForAction(un, ac){
      var data=loadProjects(), out={}, changed=false;
      var us=slug(un), as=slug(ac&&ac.idac);
      Object.keys(data||{}).forEach(function(k){
        var p=String(k).split('__');
        if(p[0]===us && p[1]===as){ changed=true; return; }
        out[k]=data[k];
      });
      if(changed) saveProjects(out);
    }
    function removeProjectsForMelhoria(un, ac, m){
      var data=loadProjects();
      var k=projectKey(un,ac,m);
      if(Object.prototype.hasOwnProperty.call(data,k)){
        delete data[k]; saveProjects(data);
      }
    }
    function cleanOrphans(){
      var maps=validMaps();
      var data=loadProjects(), out={}, changed=false;
      Object.keys(data||{}).forEach(function(k){
        if(maps.pk[k]) out[k]=data[k];
        else changed=true;
      });
      if(changed) saveProjects(out);
      var del=[];
      for(var i=0;i<localStorage.length;i++){
        var key=localStorage.key(i)||'';
        if(key.indexOf('reset.p2ac.')===0){
          var mid=key.slice('reset.p2ac.'.length).split('.').slice(0,1)[0];
          if(mid && !maps.ak[mid]) del.push(key);
        }
      }
      del.forEach(function(k){ try{ localStorage.removeItem(k); }catch(e){} });
    }
    w.v10CleanOrphans = cleanOrphans;

    if(!w.__v10DeletionPatched){
      w.__v10DeletionPatched=true;
      w.udConfAcao = function(un, ai){
        var list=w.UNITS_DATA && w.UNITS_DATA[un] ? w.UNITS_DATA[un] : [];
        var ac=list[ai];
        if(!ac) return;
        if(!confirm('Excluir ação '+(ac.idac||'')+'?')) return;
        var mels=Array.isArray(ac.melhorias)?ac.melhorias.slice():[];
        removeProjectsForAction(un, ac);
        removeLocalStorageForAction(un, ac, mels);
        list.splice(ai,1);
        if(list.length) w.UNITS_DATA[un]=list; else delete w.UNITS_DATA[un];
        try { if(typeof w.salvarUnitsData==='function') w.salvarUnitsData(); else localStorage.setItem('reset.units_data', JSON.stringify(w.UNITS_DATA||{})); } catch(e){}
        try { localStorage.setItem('reset_units_data', JSON.stringify(w.UNITS_DATA||{})); } catch(e){}
        cleanOrphans();
        try { if(typeof w.atualizarTelaCompleta==='function') w.atualizarTelaCompleta(); } catch(e){}
        try { if(typeof w.renderUnitButtons==='function') w.renderUnitButtons(); } catch(e){}
        try { if(typeof w.p2Render==='function') w.p2Render(); } catch(e){}
        try { if(typeof w.udAbrirModalExcluir==='function') w.udAbrirModalExcluir(); } catch(e){}
        unwrapP2Markers();
      };
      w.udConfMelhoria = function(un, ai, mi){
        var ac=((w.UNITS_DATA||{})[un]||[])[ai];
        if(!ac) return;
        var m=(Array.isArray(ac.melhorias)?ac.melhorias:[])[mi];
        if(!m) return;
        if(!confirm('Excluir melhoria '+(m.idm||'')+'?')) return;
        removeProjectsForMelhoria(un, ac, m);
        removeLocalStorageForAction(un, ac, [m]);
        ac.melhorias.splice(mi,1);
        try { if(typeof w.salvarUnitsData==='function') w.salvarUnitsData(); else localStorage.setItem('reset.units_data', JSON.stringify(w.UNITS_DATA||{})); } catch(e){}
        try { localStorage.setItem('reset_units_data', JSON.stringify(w.UNITS_DATA||{})); } catch(e){}
        cleanOrphans();
        try { if(typeof w.atualizarTelaCompleta==='function') w.atualizarTelaCompleta(); } catch(e){}
        try { if(typeof w.p2Render==='function') w.p2Render(); } catch(e){}
        try { if(typeof w.udAbrirModalExcluir==='function') w.udAbrirModalExcluir(); } catch(e){}
        unwrapP2Markers();
      };
      var oldP2=w.p2Render;
      if(typeof oldP2==='function'){
        w.p2Render=function(){ var r=oldP2.apply(this, arguments); setTimeout(unwrapP2Markers,0); setTimeout(unwrapP2Markers,80); return r; };
      }
      cleanOrphans();
    }
  }
  function boot(){ inject(); setTimeout(inject,200); setTimeout(inject,800); }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', boot); else boot();
  window.addEventListener('load', boot);
})();
</script>

<script id="v16-unidades-toggle-estavel">
(function(){

  function frame(){
    var f=document.getElementById('frame-cronograma');
    try{return f && (f.contentDocument || (f.contentWindow && f.contentWindow.document));}catch(e){return null;}
  }
  function patchDoc(doc){
    if(!doc || !doc.body) return;
    if(!doc.getElementById('v16-unidades-toggle-style')){
      var st=doc.createElement('style');

      st.textContent = `
        #section-unidades .action-card-ref > h3{display:none!important;}

      if(btn.__v16unit) return;
      btn.__v16unit = true;
      btn.addEventListener('click', function(ev){

        setTimeout(function(){
          var panel=doc.getElementById(id);
          if(!panel) return;
          doc.querySelectorAll('#unit-buttons .unit-btn').forEach(function(b){ if(b!==btn)b.classList.remove('active'); });
          doc.querySelectorAll('#section-unidades .panel').forEach(function(p){ if(p!==panel)p.classList.add('hidden'); });
          var wasOpen = btn.getAttribute('data-v16-open')==='1';
          if(wasOpen){ panel.classList.add('hidden'); btn.classList.remove('active'); btn.setAttribute('data-v16-open','0'); }
          else{ panel.classList.remove('hidden'); btn.classList.add('active'); btn.setAttribute('data-v16-open','1'); }
        }, 30);
      }, true);
    });

    /* Reaplica abre/recolhe da ação usando apenas o card imediatamente abaixo da linha */
    doc.querySelectorAll('#section-unidades .action-list .action-btn').forEach(function(btn){
      if(btn.__v16acao) return;
      btn.__v16acao = true;
      btn.addEventListener('click', function(ev){
        ev.preventDefault();
        ev.stopPropagation();
        var card=btn.nextElementSibling;
        while(card && !card.classList.contains('action-card-v18')) card=card.nextElementSibling;
        if(!card) return false;
        var open=!card.classList.contains('hidden');
        card.classList.toggle('hidden', open);
        btn.classList.toggle('open', !open);
        var caret=btn.querySelector('.v18-action-caret');
        if(caret) caret.textContent = open ? '▸' : '▾';
        return false;
      }, true);
    });
  }
  function run(){patchDoc(frame());}
  window.addEventListener('load', function(){setTimeout(run,400);setTimeout(run,1200);});
  var f=document.getElementById('frame-cronograma');
  if(f) f.addEventListener('load', function(){setTimeout(run,300);setTimeout(run,1000);});

})();
</script>

<script id="v88-obs-stable-script-parent">

  var css = `

<!-- T16 - Modal Incluir Projeto: codigo sequencial P01 por Acao/Melhoria + limpeza orfaos -->
<script id="p2-modal-externo-final">
(function(){
  if (window.__p2ModalExternoFinal) return;
  window.__p2ModalExternoFinal = true;

  var PROJ_KEY = 'reset.projetosExecucao.v1';
  var _acoes = [];

  function getUnitsData(){
    try{
      var s=localStorage.getItem('reset.units_data')||localStorage.getItem('reset_units_data');
      var p=JSON.parse(s);
      return(p&&typeof p==='object')?p:{};
    }catch(e){return{};}
  }

  function slug(v){
    return String(v==null?'':v).toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
  }

  function projetoKey(un,acao,mel){
    return slug(un)+'__'+slug(acao&&acao.idac)+'__'+slug(mel&&mel.idm);
  }

  /* Retorna proximo codigo sequencial P01, P02... para uma chave acao/melhoria */
  function proximoCodigo(ak){
    /* T35: max código existente evita duplicata após deleções */
    var data={};
    try{data=JSON.parse(localStorage.getItem(PROJ_KEY))||{};}catch(e){}
    var arr=Array.isArray(data[ak])?data[ak]:[];
    var max=0;
    arr.forEach(function(p){
      var m=String(p.codigo||'').match(/P(\d+)/i);
      if(m)max=Math.max(max,parseInt(m[1],10)||0);
    });
    return 'P'+String(max+1).padStart(2,'0');
  }

  function getFrame(){
    var f=document.getElementById('frame-cronograma');
    if(!f)return null;
    try{return{win:f.contentWindow,doc:f.contentDocument||f.contentWindow.document};}
    catch(e){return null;}
  }

  /* ---------- Remove projetos cujos acao/melhoria/unidade foram deletados ---------- */
  function limparOrfaos(){
    var ud=getUnitsData();
    var validos=new Set();
    Object.entries(ud).forEach(function(e){
      var un=e[0];
      var acoes=Array.isArray(e[1])?e[1]:[];
      acoes.forEach(function(acao){
        var mels=Array.isArray(acao.melhorias)?acao.melhorias:[];
        mels.forEach(function(mel){
          validos.add(projetoKey(un,acao,mel));
        });
      });
    });
    var data={};
    try{data=JSON.parse(localStorage.getItem(PROJ_KEY))||{};}catch(e){}
    var antes=Object.keys(data).length;
    var limpo={};
    Object.keys(data).forEach(function(k){
      if(validos.has(k)) limpo[k]=data[k];
    });
    var depois=Object.keys(limpo).length;
    if(antes!==depois){
      try{localStorage.setItem(PROJ_KEY,JSON.stringify(limpo));}catch(e){}
      console.log('[p2ext] limparOrfaos: removeu '+(antes-depois)+' chave(s) orfas');
      try{
        var c=getFrame();
        if(c&&c.win&&typeof c.win.p2Render==='function')c.win.p2Render();
      }catch(e){}
    }
  }

  /* ---------- Cria o modal no documento EXTERNO ---------- */
  function criarModal(){
    if(document.getElementById('p2ext2-overlay'))return;
    var ov=document.createElement('div');
    ov.id='p2ext2-overlay';
    ov.style.cssText='display:none;position:fixed;inset:0;z-index:99999;background:rgba(3,8,18,.9);'
      +'align-items:center;justify-content:center;';

    var st_base='width:100%;min-height:40px;border:1px solid #2a4268;border-radius:8px;'
      +'background:#071225;color:#cdd9ee;padding:8px 12px;font-size:13px;box-sizing:border-box;';
    var lbl='font-family:IBM Plex Mono,monospace;font-size:10px;font-weight:800;'
      +'text-transform:uppercase;letter-spacing:.08em;color:#5a7499;margin-bottom:6px;display:block;';

    ov.innerHTML=
      '<div style="width:min(560px,calc(100vw - 32px));max-height:calc(100vh - 48px);overflow-y:auto;'
      +'background:linear-gradient(180deg,#0b1628,#060d1a);border:1px solid #2a4268;'

      +'</label>'
      /* Codigo badge: mostra ID gerado automaticamente */
      +'<div id="p2ext2-cod" style="display:none;grid-column:1/-1;'
      +'border:1px solid rgba(168,204,58,.35);background:rgba(168,204,58,.06);'
      +'border-radius:8px;padding:10px 14px;font-family:IBM Plex Mono,monospace;'

      +'<input id="p2ext2-fim" type="date" style="'+st_base+'">'
      +'</label>'

      +'<span style="'+lbl+'">Quem Faz</span>'
      +'<select id="p2ext2-quem" style="'+st_base+'">'
      +'<option selected>Pentagrama</option><option>Bolix</option><option>Terceiros</option>'
      +'</select></label>'
      +'</div>'
      +'<div style="display:flex;justify-content:flex-end;gap:10px;margin-top:18px;'
      +'padding-top:14px;border-top:1px solid #1e3050;">'
      +'<button id="p2ext2-cancel" style="padding:8px 18px;border:1px solid #2a4268;border-radius:8px;'
      +'background:transparent;color:#cdd9ee;cursor:pointer;font-family:IBM Plex Mono,monospace;'
      +'font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;">Cancelar</button>'
      +'<button id="p2ext2-save" style="padding:8px 18px;border:1px solid #a8cc3a;border-radius:8px;'
      +'background:rgba(168,204,58,.12);color:#a8cc3a;cursor:pointer;font-family:IBM Plex Mono,monospace;'
      +'font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;">Salvar projeto</button>'
      +'</div></div>';

    document.body.appendChild(ov);
    document.getElementById('p2ext2-x').onclick=fechar;
    document.getElementById('p2ext2-cancel').onclick=fechar;
    document.getElementById('p2ext2-save').onclick=salvar;
    document.getElementById('p2ext2-acao').onchange=popMel;
    document.getElementById('p2ext2-mel').onchange=atualizarCod;
  }

  function abrir(){
    criarModal();
    var ov=document.getElementById('p2ext2-overlay');
    if(!ov)return;

    var acSel=document.getElementById('p2ext2-acao');
    acSel.innerHTML='';
    _acoes=[];
    /* T35: lê cw.UNITS_DATA (live) em vez de localStorage stale */
    var ud={};
    try{
      var _fr=document.getElementById('frame-cronograma');
      var _cw=_fr&&_fr.contentWindow;
      if(_cw&&_cw.UNITS_DATA&&Object.keys(_cw.UNITS_DATA).length){
        ud=_cw.UNITS_DATA;
      } else {
        var _fresh=_cw&&_cw.eval('typeof UNITS_DATA!=="undefined"?UNITS_DATA:null');
        ud=(_fresh&&typeof _fresh==='object')?_fresh:getUnitsData();
      }
    }catch(_e){ ud=getUnitsData(); }
    Object.entries(ud).forEach(function(entry){
      var un=entry[0];
      var arr=Array.isArray(entry[1])?entry[1]:[];
      arr.forEach(function(acao){
        var desc=(acao.nome||'').replace(/^AC-\d+\s*[-\u2014]\s*/,'');
        var lbl=[un,(acao.idac?acao.idac+' — ':'')+desc].filter(Boolean).join(' | ');
        _acoes.push({un:un,acao:acao});
        var opt=document.createElement('option');
        opt.value=_acoes.length-1;
        opt.textContent=lbl;
        acSel.appendChild(opt);
      });
    });
    if(!acSel.options.length){
      var o=document.createElement('option');
      o.value='';o.textContent='Nenhuma ação — crie uma ação antes';
      acSel.appendChild(o);
    }

    ['p2ext2-desc','p2ext2-ini','p2ext2-fim'].forEach(function(id){
      var el=document.getElementById(id);if(el)el.value='';
    });
    var pri=document.getElementById('p2ext2-pri');if(pri)pri.value='Média';
    var quem=document.getElementById('p2ext2-quem');if(quem)quem.value='Pentagrama';

    popMel();
    ov.style.display='flex';
  }

  function fechar(){
    var ov=document.getElementById('p2ext2-overlay');
    if(ov)ov.style.display='none';
  }

  function popMel(){
    var acSel=document.getElementById('p2ext2-acao');
    var melSel=document.getElementById('p2ext2-mel');
    var cod=document.getElementById('p2ext2-cod');
    if(!acSel||!melSel)return;
    melSel.innerHTML='';
    var item=_acoes[parseInt(acSel.value,10)];
    if(!item){
      var o=document.createElement('option');o.value='';
      o.textContent='Nenhuma melhoria disponível';melSel.appendChild(o);
      if(cod)cod.style.display='none';return;
    }
    var mels=Array.isArray(item.acao.melhorias)?item.acao.melhorias:[];
    if(!mels.length){
      var o=document.createElement('option');o.value='';
      o.textContent='Esta ação não tem melhorias';melSel.appendChild(o);
      if(cod)cod.style.display='none';return;
    }
    mels.forEach(function(m,i){
      var o=document.createElement('option');
      o.value=i;
      o.textContent=(m.idm||('M'+String(i+1).padStart(2,'0')))+' — '+(m.desc||'');
      melSel.appendChild(o);
    });
    atualizarCod();
  }

  function atualizarCod(){
    var acSel=document.getElementById('p2ext2-acao');
    var melSel=document.getElementById('p2ext2-mel');
    var cod=document.getElementById('p2ext2-cod');
    if(!acSel||!melSel||!cod)return;
    var item=_acoes[parseInt(acSel.value,10)];
    var mels=item&&Array.isArray(item.acao.melhorias)?item.acao.melhorias:[];
    var mel=mels[parseInt(melSel.value,10)];
    if(!item||!mel){cod.style.display='none';delete cod.dataset.ak;delete cod.dataset.codigo;return;}
    var ak=projetoKey(item.un,item.acao,mel);
    var codigo=proximoCodigo(ak);
    /* armazena para uso no salvar() */
    cod.dataset.ak=ak;
    cod.dataset.codigo=codigo;
    cod.innerHTML='<span style="opacity:.6;font-size:10px;">ID DO PROJETO</span>'
      +'<br><span style="font-size:15px;font-weight:900;letter-spacing:.1em;">'+codigo+'</span>'
      +'<span style="opacity:.5;font-size:10px;margin-left:8px;">'+ak+'</span>';
    cod.style.display='block';
  }

  function salvar(){
    var cod=document.getElementById('p2ext2-cod');
    var ak=cod&&cod.dataset.ak;
    var codigo=cod&&cod.dataset.codigo;
    if(!ak||!codigo){console.warn('[p2ext2] sem chave/codigo');return;}
    var proj={
      codigo:codigo,
      descricao:(document.getElementById('p2ext2-desc')||{}).value||'',
      inicio:(document.getElementById('p2ext2-ini')||{}).value||'',
      termino:(document.getElementById('p2ext2-fim')||{}).value||'',
      prioridade:(document.getElementById('p2ext2-pri')||{}).value||'Média',
      quem:(document.getElementById('p2ext2-quem')||{}).value||'Pentagrama',
      status:'Em andamento',percentual:0,_criado:Date.now()
    };
    var data={};
    try{data=JSON.parse(localStorage.getItem(PROJ_KEY))||{};}catch(e){}
    if(!Array.isArray(data[ak]))data[ak]=[];
    data[ak].push(proj);
    try{localStorage.setItem(PROJ_KEY,JSON.stringify(data));}catch(e){}
    try{
      var c=getFrame();
      if(c&&c.win&&typeof c.win.p2Render==='function')c.win.p2Render();
    }catch(e){}
    fechar();
  }

  /* ---------- Conecta listener direto no botao do iframe ---------- */
  function instalar(){
    limparOrfaos();
    criarModal();
    var c=getFrame();
    if(!c||!c.doc)return;
    var btns=c.doc.querySelectorAll('#section-projetos2 .p2-toolbar button');
    btns.forEach(function(btn){
      if(btn.__p2ext2_ok)return;
      var txt=(btn.textContent||btn.innerText||'');
      if(txt.indexOf('Incluir Projeto')<0)return;
      btn.__p2ext2_ok=true;
      btn.addEventListener('click',function(e){
        e.stopImmediatePropagation();
        e.preventDefault();
        abrir();
      },true);
    });
  }

  function boot(){
    instalar();
    setTimeout(instalar,400);
    setTimeout(instalar,1200);
    setTimeout(instalar,3000);
  }

  window.addEventListener('storage',function(ev){
    if(ev.key&&(ev.key.indexOf('units_data')>=0||ev.key.indexOf('reset.')===0)){
      setTimeout(limparOrfaos,100);
    }
  });

  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot);
  else boot();
  window.addEventListener('load',boot);
  var _f=document.getElementById('frame-cronograma');
  if(_f)_f.addEventListener('load',function(){
    instalar();setTimeout(instalar,300);setTimeout(instalar,900);
  });
})();
</script>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
<script id="t40-parent-sync-melhorias">
(function(){
window.parentSyncActionMelhorias=function(p){
  if(!p||!p.idac||!p.unidade)return;
  var un=p.unidade,id=String(p.idac).toUpperCase();
  if(typeof UNITS_DATA==='undefined'||!UNITS_DATA||!UNITS_DATA[un])return;
  var ac=(UNITS_DATA[un]||[]).find(function(a){return String(a.idac||'')
    .toUpperCase()===id;});
  if(!ac)return;
  var nm=(p.melhorias||[]).filter(function(m){return m&&m.desc;}).map(function(m,i){
    var ex=(ac.melhorias||[]).find(function(x){return(x.idm||'')
      .toUpperCase()===(m.idm||'').toUpperCase();});
    return Object.assign({idm:'M'+String(i+1).padStart(2,'0'),desc:'',inicio:'',
      prazo:'',meses:'',previsao:'',conclusao:'',status:''},ex||{},
      {idm:(m.idm||'M'+String(i+1).padStart(2,'0')).toUpperCase(),desc:m.desc});
  });
  ac.melhorias=nm;ac.qtd_melhorias=nm.length;
  try{var PK='reset.projetosExecucao.v1';
  function sl(v){return String(v||'')
    .toLowerCase().normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');}
  var vs=new Set(nm.map(function(m){return sl(un)+'__'+sl(id)+'__'+sl(m.idm);}));
  var pk=sl(un)+'__'+sl(id)+'__';var pj={};try{pj=JSON.parse(
    localStorage.getItem(PK)||'{}')}catch(e){}
  var cl={};Object.keys(pj).forEach(function(k){
    if(!k.startsWith(pk)||vs.has(k))cl[k]=pj[k];});
  localStorage.setItem(PK,JSON.stringify(cl));}catch(e){}
  try{localStorage.setItem('reset.units_data',JSON.stringify(UNITS_DATA));}catch(e){}
  try{if(typeof syncCron==='function')syncCron({area:ac.area||'',
    pilar:ac.pillar||ac.pilar||'',unidade:un,idac:id,
    titulo:ac.titulo||'',melhorias:nm});}catch(e){}};
})();
</script>
