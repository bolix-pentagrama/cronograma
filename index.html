      else if (pctAtraso &lt;= 30) { box.classList.add('warn'); texto.textContent = atrasados + ' item(ns) atrasado(s) de ' + avaliados + ' avaliado(s). ' + noPrazo + ' dentro do prazo; ' + semConclusao + ' sem conclusão.'; }
      else { box.classList.add('crit'); texto.textContent = 'Risco de prazo: ' + atrasados + ' item(ns) atrasado(s) de ' + avaliados + ' avaliado(s). Replanejar responsáveis e próximos marcos.'; }
    }
  };
  document.addEventListener('input', function(ev){ if (ev.target &amp;&amp; ev.target.matches('.melhorias-table-pro input[type=&quot;date&quot;]')) window.atualizarPrazoFinal(); });

  function ac03AddDaysIso(startIso, days){

  function parseDate(v){ if(!v) return null; var d = new Date(v+'T00:00:00'); return isNaN(d.getTime()) ? null : d; }
  function addDays(date, days){ if(!date || isNaN(days)) return null; var d = new Date(date.getTime()); d.setDate(d.getDate()+Number(days)); return d; }
  function isoDate(date){ if(!date) return ''; return date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0'); }
  function setDot(dot, cls){ if(!dot) return; dot.classList.remove('prazo-ok','prazo-atrasado','prazo-pendente'); dot.classList.add(cls); }

  window.calcMelhoriasPro = function(){
    var rows = getMelhoriaRows();
    var total = rows.length;
    var aprovados=0, reprovados=0, parciais=0, pendentes=0;

<script>
  const ACOES_PASSWORD = '3132';
  let acoesUnlocked = sessionStorage.getItem('reset_acoes_unlocked') === '1';

  function openAcoesLock() {
    const overlay = document.getElementById('acoes-lock-overlay');
    const input = document.getElementById('acoes-lock-password');
    const error = document.getElementById('acoes-lock-error');
    if (error) error.textContent = '';
    if (input) input.value = '';
    if (overlay) {
      overlay.classList.add('active');
      overlay.setAttribute('aria-hidden', 'false');
    }
    setTimeout(() => input && input.focus(), 60);
  }

  function closeAcoesLock() {
    const overlay = document.getElementById('acoes-lock-overlay');
    if (overlay) {
      overlay.classList.remove('active');
      overlay.setAttribute('aria-hidden', 'true');
    }
  }

  function confirmAcoesPassword() {
    const input = document.getElementById('acoes-lock-password');
    const error = document.getElementById('acoes-lock-error');
    if ((input && input.value) === ACOES_PASSWORD) {
      acoesUnlocked = true;
      sessionStorage.setItem('reset_acoes_unlocked', '1');
      closeAcoesLock();
      showMainPane('acoes', true);
    } else {
      if (error) error.textContent = 'Senha incorreta.';
      if (input) { input.select(); input.focus(); }
    }
  }

  document.addEventListener('keydown', function(e){
    const overlay = document.getElementById('acoes-lock-overlay');
    if (!overlay || !overlay.classList.contains('active')) return;
    if (e.key === 'Enter') confirmAcoesPassword();
    if (e.key === 'Escape') closeAcoesLock();
  });

  function showMainPane(name, authorized = false) {
    if (name === 'acoes' && !acoesUnlocked && !authorized) {
      openAcoesLock();
      return;

    document.getElementById('pane-cronograma').classList.toggle('active', isCronograma);

    document.getElementById('btn-cronograma').classList.toggle('active', isCronograma);
    document.getElementById('btn-acoes').classList.toggle('active', !isCronograma);
    document.getElementById('acoes-subtabs-wrap').classList.toggle('active', !isCronograma);
    setTimeout(resizeFrames, 120);
  }

  let savedActionCounter = 0;
  const actionAreas = {};

  let currentPillarKey = null;

  function getFrameDocument(frame) {
    try { return frame.contentDocument || frame.contentWindow.document; }

    if (!isCreate && activeFrame) {
      currentAreaKey = activeFrame.dataset.areaKey || currentAreaKey;

    document.querySelectorAll('#pillar-subtabs-host .reset-pillar-tab').forEach(tab => {
      tab.classList.toggle('active', !isCreate && tab.dataset.areaKey === currentAreaKey && tab.dataset.pillarKey === currentPillarKey);
    });
    document.querySelectorAll('#pillar-subtabs-host .reset-unit-subtabs').forEach(nav => {
      nav.classList.toggle('active', !isCreate && nav.dataset.areaKey === currentAreaKey && nav.dataset.pillarKey === currentPillarKey);
    });
    document.querySelectorAll('#pillar-subtabs-host .reset-unit-tab').forEach(tab => {
      tab.classList.toggle('active', tab.dataset.actionIndex === String(index));
    });
    document.querySelectorAll('#pane-acoes iframe.reset-frame').forEach(frame => {
      frame.classList.toggle('active-action-frame', frame.dataset.actionIndex === String(index));
    });
    setTimeout(resizeFrames, 120);
  }


  function normalizeKey(value) {
    return (value || '').toString().normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'sem-nome';
  }

  function activateArea(areaKey, pillarKey, unitIndex) {
    currentAreaKey = areaKey;
    const area = actionAreas[areaKey];
    if (!area) return;
    let target = unitIndex || area.firstIndex;
    let targetPillarKey = pillarKey;
    if (targetPillarKey && area.pillars && area.pillars[targetPillarKey]) {
      const pillar = area.pillars[targetPillarKey];
      target = unitIndex || pillar.firstIndex || target;
    } else if (target) {
      const frame = document.querySelector('#pane-acoes iframe.reset-frame[data-action-index="' + target + '"]');
      targetPillarKey = frame ? frame.dataset.pillarKey : null;
    }
    currentPillarKey = targetPillarKey || currentPillarKey;
    showActionTab(target);
  }


  function findActionName(doc) {
    const title = doc.getElementById('titulo-editavel');
    if (title && title.textContent && title.textContent.trim()) return title.textContent.trim();
    const preferred = doc.getElementById('acaoReset');
    if (preferred && preferred.value && preferred.value.trim()) return preferred.value.trim();
    const firstText = doc.querySelector('input:not([type="hidden"]):not([type="file"]), textarea, [contenteditable="true"]');
    if (!firstText) return '';
    return ((firstText.value !== undefined ? firstText.value : firstText.textContent) || '').trim();
  }

  function findPillarName(doc) {
    const subtitle = doc.getElementById('subtitulo-editavel');
    if (subtitle && subtitle.textContent && subtitle.textContent.trim()) return subtitle.textContent.trim();
    return '';
  }


  function findUnitName(doc) {
    const unitEditable = doc.getElementById('unidade-editavel');
    if (unitEditable && unitEditable.textContent && unitEditable.textContent.trim()) return unitEditable.textContent.trim();
    const labels = Array.from(doc.querySelectorAll('label, .lbl'));
    for (const label of labels) {
      if ((label.textContent || '').trim().toLowerCase() === 'unidade') {
        const fieldWrap = label.closest('.field') || label.parentElement;
        if (fieldWrap) {
          const field = fieldWrap.querySelector('input, select, textarea, [contenteditable="true"]');
          if (field) {
            if (field.tagName === 'SELECT') {
              const opt = field.options[field.selectedIndex];
              return ((opt && opt.text) || field.value || '').trim();
            }
            return ((field.value !== undefined ? field.value : field.textContent) || '').trim();
          }
        }
      }
    }
    return '';
  }


  function applyUnitReference(doc, unitName) {
    const value = (unitName || '').toString().trim();
    if (!doc || !value) return;
    const labels = Array.from(doc.querySelectorAll('label.lbl, .lbl'));
    for (const label of labels) {
      const labelText = (label.textContent || '').trim().toLowerCase();
      if (label.id === 'parent-unit-label') continue;
      if (label.classList && label.classList.contains('parent-title-label')) continue;
      if (labelText !== 'unidade') continue;
      const fieldWrap = label.closest('.field') || label.parentElement;
      if (!fieldWrap) continue;
      const field = fieldWrap.querySelector('select, input, textarea');
      if (!field || field.id === 'unidade-editavel') continue;
      if (field.tagName === 'SELECT') {
        let opt = Array.from(field.options).find(o => (o.text || o.value || '').trim().toLowerCase() === value.toLowerCase());
        if (!opt) {
          opt = doc.createElement('option');
          opt.value = value;
          opt.textContent = value;
          field.appendChild(opt);
        }
        field.value = opt.value;
        opt.selected = true;
        field.disabled = true;
        field.setAttribute('data-parent-unit-reference', '1');
      } else {
        field.value = value;
        field.readOnly = true;
        field.setAttribute('data-parent-unit-reference', '1');
      }
      field.style.pointerEvents = 'none';
      field.style.opacity = '0.86';
      field.style.background = 'rgba(17,31,53,.55)';
      field.style.borderColor = 'rgba(168,204,58,.35)';
      field.style.color = '#cdd9ee';
      let hint = fieldWrap.querySelector('.parent-unit-reference-hint');
      if (!hint) {
        hint = doc.createElement('div');
        hint.className = 'parent-unit-reference-hint';
        hint.style.cssText = 'margin-top:6px;color:#5a7499;font-size:11px;line-height:1.35;';
        fieldWrap.appendChild(hint);
      }
      hint.textContent = 'Unidade definida automaticamente pela subaba.';
      try { field.dispatchEvent(new Event('change', { bubbles: true })); } catch(e) {}
      return;
    }
  }

  function clearCreateActionForm() {
    const frame = document.getElementById('frame-acoes');
    const doc = getFrameDocument(frame);
    if (!doc) return;

    doc.querySelectorAll('input, textarea, select, [contenteditable="true"]').forEach(el => {
      const tag = (el.tagName || '').toLowerCase();
      if (tag === 'input') {
        const type = (el.getAttribute('type') || 'text').toLowerCase();
        if (type === 'checkbox' || type === 'radio') el.checked = false;
        else if (type !== 'button' && type !== 'submit' && type !== 'reset' && type !== 'file') el.value = '';
      } else if (tag === 'textarea') {
        el.value = '';
        el.textContent = '';
      } else if (tag === 'select') {
        el.selectedIndex = 0;
      } else if (el.isContentEditable) {
        el.innerHTML = '';
      }
      try { el.dispatchEvent(new Event('input', { bubbles: true })); } catch(e) {}
      try { el.dispatchEvent(new Event('change', { bubbles: true })); } catch(e) {}
    });
    try {
      if (doc.defaultView && typeof doc.defaultView.syncAcao === 'function') doc.defaultView.syncAcao();
      if (doc.defaultView && typeof doc.defaultView.updateAll === 'function') doc.defaultView.updateAll();
    } catch(e) {}
    resizeFrames();

  function deleteSavedAction(index) {
    if (!index || index === 'create') return;
    const frame = document.querySelector('#pane-acoes iframe.reset-frame[data-action-index="' + index + '"]');
    const areaKey = frame ? frame.dataset.areaKey : '';
    const pillarKey = frame ? frame.dataset.pillarKey : '';
    const unitKey = frame ? frame.dataset.unitKey : '';
    const unitTab = document.querySelector('#pillar-subtabs-host .reset-unit-tab[data-action-index="' + index + '"]');
    if (unitTab) unitTab.remove();
    if (frame) frame.remove();

    const area = actionAreas[areaKey];
    if (area) {
      const pillar = area.pillars ? area.pillars[pillarKey] : null;
      if (pillar) {
        if (unitKey && pillar.units) delete pillar.units[unitKey];
        const remainingUnits = pillar.unitnav ? Array.from(pillar.unitnav.querySelectorAll('.reset-unit-tab')) : [];
        if (remainingUnits.length) {
          pillar.firstIndex = remainingUnits[0].dataset.actionIndex;
          area.firstIndex = area.firstIndex === index ? pillar.firstIndex : area.firstIndex;
          activateArea(areaKey, pillarKey, pillar.firstIndex);
          injectCreateActionButtons();
          resizeFrames();
          return;
        }
        if (pillar.tab) pillar.tab.remove();
        if (pillar.unitnav) pillar.unitnav.remove();
        delete area.pillars[pillarKey];
      }

      const remainingPillars = area.subnav ? Array.from(area.subnav.querySelectorAll('.reset-pillar-tab')) : [];
      if (remainingPillars.length) {
        const nextPillarKey = remainingPillars[0].dataset.pillarKey;
        const nextPillar = area.pillars[nextPillarKey];
        area.firstIndex = nextPillar ? nextPillar.firstIndex : remainingPillars[0].dataset.actionIndex;
        activateArea(areaKey, nextPillarKey, area.firstIndex);
      } else {
        if (area.tab) area.tab.remove();
        if (area.subnav) area.subnav.remove();
        delete actionAreas[areaKey];
        currentAreaKey = null;
        currentPillarKey = null;
        showActionTab('create');
      }
    } else {
      showActionTab('create');
    }
    injectCreateActionButtons();
    resizeFrames();
  }


  function serializeActionDocument(doc) {
    const cloned = doc.documentElement.cloneNode(true);
    const originalFields = doc.querySelectorAll('input, textarea, select');
    const clonedFields = cloned.querySelectorAll('input, textarea, select');

    originalFields.forEach((field, i) => {
      const clone = clonedFields[i];
      if (!clone) return;
      const tag = field.tagName.toLowerCase();
      if (tag === 'textarea') {
        clone.textContent = field.value || '';
        clone.setAttribute('value', field.value || '');
      } else if (tag === 'select') {
        Array.from(clone.options).forEach((opt, idx) => {
          if (idx === field.selectedIndex) opt.setAttribute('selected', 'selected');
          else opt.removeAttribute('selected');
        });
      } else if (tag === 'input') {
        const type = (field.getAttribute('type') || '').toLowerCase();
        if (type === 'checkbox' || type === 'radio') {
          if (field.checked) clone.setAttribute('checked', 'checked');
          else clone.removeAttribute('checked');
        } else {
          clone.setAttribute('value', field.value || '');
        }
      }
    });

    const editableOriginal = doc.querySelectorAll('[contenteditable="true"]');
    const editableCloned = cloned.querySelectorAll('[contenteditable="true"]');
    editableOriginal.forEach((el, i) => { if (editableCloned[i]) editableCloned[i].innerHTML = el.innerHTML; });

    const injected = cloned.querySelector('#parent-save-new-action-wrap');
    if (injected) injected.remove();
    const deleteInjected = cloned.querySelector('#parent-delete-action-wrap');
    if (deleteInjected) deleteInjected.remove();
    return '<!DOCTYPE html>\n' + cloned.outerHTML;
  }

  /* ===== v10: hierarquia Área > Pilar > Unidade > Ação + campo AÇÃO dividido ===== */
  let currentUnitKey = null;

  function normalizeAcCode(n) {
    return 'AC-' + String(n).padStart(2, '0');
  }

  function getNextActionCode(areaKey, pillarKey, unitKey) {
    const area = actionAreas[areaKey];
    const pillar = area && area.pillars ? area.pillars[pillarKey] : null;
    const unit = pillar && pillar.units ? pillar.units[unitKey] : null;
    const count = unit && unit.actions ? Object.keys(unit.actions).length : 0;
    return normalizeAcCode(count + 1);
  }

  function findFieldByLabel(doc, labelText) {
    const target = normalizeKey(labelText);
    const labels = Array.from(doc.querySelectorAll('label, .lbl'));
    for (const label of labels) {
      const txt = normalizeKey((label.textContent || '').replace('*','').trim());
      if (txt === target) {
        const wrap = label.closest('.field') || label.parentElement;
        if (wrap) return { label, wrap, field: wrap.querySelector('input:not([type="hidden"]), textarea, select, [contenteditable="true"]') };
      }
    }
    return null;
  }

  function parseActionText(value) {
    const text = (value || '').toString().trim();
    const match = text.match(/^(AC-\d+)\s+(.+)$/i);
    return { code: match ? match[1].toUpperCase() : '', desc: match ? match[2] : text };
  }

  function transformActionField(doc, code) {
    if (!doc) return null;
    const found = findFieldByLabel(doc, 'Ação');
    if (!found || !found.wrap || !found.field) return null;
    let original = found.wrap.querySelector('[data-parent-original-action-field="1"]');
    if (!original) original = found.field;
    let split = found.wrap.querySelector('.parent-action-split-field');
    const parsed = parseActionText(original.value !== undefined ? original.value : original.textContent);
    const actionCode = (code || parsed.code || 'AC-01').toUpperCase();
    if (!split) {
      split = doc.createElement('div');
      split.className = 'parent-action-split-field';
      split.innerHTML = '<input class="parent-action-code" type="text" readonly><input class="parent-action-desc" type="text" placeholder="Descrição da ação">';
      original.setAttribute('data-parent-original-action-field', '1');
      original.style.display = 'none';
      original.parentNode.insertBefore(split, original);
    }
    const codeInput = split.querySelector('.parent-action-code');
    const descInput = split.querySelector('.parent-action-desc');
    codeInput.value = actionCode;
    const parsedDescClean = (parsed.desc || '').trim();
    const isDuplicateCodeDesc = /^AC-\d+$/i.test(parsedDescClean) || parsedDescClean.toUpperCase() === actionCode;
    if (!descInput.value && parsedDescClean && !isDuplicateCodeDesc) descInput.value = parsedDescClean;
    const sync = () => {
      const combined = (codeInput.value.trim() + (descInput.value.trim() ? ' ' + descInput.value.trim() : '')).trim();
      if (original.value !== undefined) original.value = combined;
      else original.textContent = combined;
      try { original.dispatchEvent(new Event('input', { bubbles:true })); } catch(e) {}
      try { original.dispatchEvent(new Event('change', { bubbles:true })); } catch(e) {}
    };
    if (!descInput.dataset.parentActionSyncBound) {
      descInput.addEventListener('input', sync);
      descInput.addEventListener('change', sync);
      descInput.dataset.parentActionSyncBound = '1';

<script id="v25-functional-context-tabs-fix">
/* v25 — Corrige clique das abas principais e abertura progressiva das subabas sem alterar layout/lógica existente. */
(function(){
  function qsa(sel){ return Array.from(document.querySelectorAll(sel)); }
  function getFrame(index){ return document.querySelector('#pane-acoes iframe.reset-frame[data-action-index="' + index + '"]'); }
  function resize(){ try { (window.resizeFrames || function(){})(); } catch(e){} }
  function isAreaTab(tab){
    return tab && tab.classList.contains('saved-action') && tab.dataset.areaKey && !tab.classList.contains('reset-pillar-tab') && !tab.classList.contains('reset-unit-tab') && !tab.classList.contains('reset-action-tab');
  }
  function setActiveTop(areaKey, create){
    qsa('#acoes-subtabs-wrap .reset-subtabs > .reset-subtab').forEach(tab => {
      const active = (create && tab.dataset.actionIndex === 'create') || (!create && isAreaTab(tab) && tab.dataset.areaKey === areaKey);
      tab.classList.toggle('active', !!active);
    });
  }
  function setVisible(areaKey, pillarKey, unitKey, actionIndex){
    const create = areaKey === null || areaKey === undefined || areaKey === 'create';
    setActiveTop(areaKey, create);

    qsa('#pillar-subtabs-host .reset-pillar-subtabs').forEach(nav => {
      nav.classList.toggle('active', !create && nav.dataset.areaKey === areaKey);
    });
    qsa('#pillar-subtabs-host .reset-pillar-tab').forEach(tab => {
      tab.classList.toggle('active', !create && !!pillarKey && tab.dataset.areaKey === areaKey && tab.dataset.pillarKey === pillarKey);
    });

    qsa('#pillar-subtabs-host .reset-unit-subtabs').forEach(nav => {
      nav.classList.toggle('active', !create && !!pillarKey && nav.dataset.areaKey === areaKey && nav.dataset.pillarKey === pillarKey);
    });
    qsa('#pillar-subtabs-host .reset-unit-tab').forEach(tab => {
      tab.classList.toggle('active', !create && !!unitKey && tab.dataset.areaKey === areaKey && tab.dataset.pillarKey === pillarKey && tab.dataset.unitKey === unitKey);
    });

    qsa('#pillar-subtabs-host .reset-action-subtabs').forEach(nav => {
      nav.classList.toggle('active', !create && !!unitKey && nav.dataset.areaKey === areaKey && nav.dataset.pillarKey === pillarKey && nav.dataset.unitKey === unitKey);
    });
    qsa('#pillar-subtabs-host .reset-action-tab').forEach(tab => {
      tab.classList.toggle('active', !create && !!actionIndex && tab.dataset.actionIndex === String(actionIndex));
    });

    qsa('#pane-acoes iframe.reset-frame').forEach(frame => {
      frame.classList.toggle('active-action-frame', !create && !!actionIndex && frame.dataset.actionIndex === String(actionIndex));
    });
    resize();
  }

  window.showActionTab = function(index){
    if (String(index) === 'create') {
      window.currentAreaKey = null;
      window.currentPillarKey = null;
      window.currentUnitKey = null;
      setVisible('create', null, null, null);
      qsa('#pane-acoes iframe.reset-frame').forEach(frame => frame.classList.toggle('active-action-frame', frame.dataset.actionIndex === 'create'));
      resize();
      return;
    }
    const frame = getFrame(index);
    if (frame) {
      window.currentAreaKey = frame.dataset.areaKey || window.currentAreaKey;
      window.currentPillarKey = frame.dataset.pillarKey || window.currentPillarKey;
      window.currentUnitKey = frame.dataset.unitKey || window.currentUnitKey;
    }
    setVisible(window.currentAreaKey, window.currentPillarKey, window.currentUnitKey, index);
  };

  window.activateArea = function(areaKey, pillarKey, unitKey, actionIndex){
    window.currentAreaKey = areaKey || null;
    window.currentPillarKey = pillarKey || null;
    window.currentUnitKey = unitKey || null;
    if (actionIndex) {
      window.showActionTab(actionIndex);
      return;
    }
    setVisible(window.currentAreaKey, window.currentPillarKey, window.currentUnitKey, null);
  };

  function bindContextTabs(){
    qsa('#acoes-subtabs-wrap .reset-subtabs > .reset-subtab.saved-action').forEach(tab => {
      tab.onclick = function(e){
        if (e) { e.preventDefault(); e.stopPropagation(); }
        window.activateArea(tab.dataset.areaKey);
        return false;
      };
    });
    qsa('#pillar-subtabs-host .reset-pillar-tab').forEach(tab => {
      tab.onclick = function(e){
        if (e) { e.preventDefault(); e.stopPropagation(); }
        window.activateArea(tab.dataset.areaKey, tab.dataset.pillarKey);
        return false;
      };
    });
    qsa('#pillar-subtabs-host .reset-unit-tab').forEach(tab => {
      tab.onclick = function(e){
        if (e) { e.preventDefault(); e.stopPropagation(); }
        window.activateArea(tab.dataset.areaKey, tab.dataset.pillarKey, tab.dataset.unitKey);
        return false;
      };
    });
    qsa('#pillar-subtabs-host .reset-action-tab').forEach(tab => {
      tab.onclick = function(e){
        if (e) { e.preventDefault(); e.stopPropagation(); }
        window.currentAreaKey = tab.dataset.areaKey;
        window.currentPillarKey = tab.dataset.pillarKey;
        window.currentUnitKey = tab.dataset.unitKey;
        window.showActionTab(tab.dataset.actionIndex);
        return false;
      };
    });
  }

  function boot(){
    bindContextTabs();
    if (document.querySelector('#pane-acoes.active')) {
      const activeArea = document.querySelector('#acoes-subtabs-wrap .reset-subtabs > .reset-subtab.saved-action.active');
      if (activeArea && activeArea.dataset.areaKey) window.activateArea(activeArea.dataset.areaKey);
    }
  }

  window.addEventListener('load', function(){ setTimeout(boot,100); setTimeout(bindContextTabs,800); setTimeout(bindContextTabs,2000); setTimeout(bindContextTabs,4500); });
  document.addEventListener('click', function(){ setTimeout(bindContextTabs,60); }, true);
})();
</script>

<script id="parent-v55-sync-status-cronograma-acoes">
/* v55 — Sincroniza o STATUS principal da ação: CRONOGRAMA → AÇÕES.
   Ajuste isolado: não altera layout, dados existentes, status das melhorias ou demais lógicas. */
(function(){
  function getDoc(frame){
    try { return frame && (frame.contentDocument || (frame.contentWindow && frame.contentWindow.document)); }
    catch(e){ return null; }
  }
  function safe(v){ return (v == null ? '' : String(v)).trim(); }
  function norm(v){
    return safe(v).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
  }
  function parseAC(text){
    var m = safe(text).match(/\b(AC-\d+)\b/i);
    return m ? m[1].toUpperCase() : '';
  }
  function readFieldValue(el){
    if (!el) return '';
    if (el.tagName === 'SELECT') {
      var opt = el.options[el.selectedIndex];
      return safe((opt && (opt.textContent || opt.value)) || el.value);
    }
    return safe(typeof el.value !== 'undefined' ? el.value : el.textContent);
  }
  function setSelectByTextOrValue(sel, value){
    if (!sel) return false;
    var target = norm(value);
    var found = null;
    Array.from(sel.options || []).forEach(function(opt){
      var optText = norm(opt.textContent || opt.value);
      var optVal = norm(opt.value);
      if (!found && (optText === target || optVal === target)) found = opt;
    });
    if (!found && value) {
      found = sel.ownerDocument.createElement('option');
      found.value = value;
      found.textContent = value;
      sel.appendChild(found);
    }
    if (found) {
      sel.value = found.value;
      found.selected = true;
      try { sel.dispatchEvent(new Event('input', { bubbles:true })); } catch(e) {}
      try { sel.dispatchEvent(new Event('change', { bubbles:true })); } catch(e) {}
      return true;
    }
    return false;
  }
  function findMainStatusField(doc){
    if (!doc) return null;
    var labels = Array.from(doc.querySelectorAll('label, .lbl'));
    // Campo STATUS principal da ação. Não usar STATUS GERAL.
    for (var i=0; i<labels.length; i++) {
      var txt = norm((labels[i].textContent || '').replace('*',''));
      if (txt === 'status') {
        var wrap = labels[i].closest('.field') || labels[i].parentElement;
        var field = wrap && wrap.querySelector('select, input');
        if (field) return field;
      }
    }
    return null;
  }
  function frameMatchesAction(frame, unidade, idac){
    if (!frame || frame.id === 'frame-acoes') return false;
    var fUnit = safe(frame.dataset.unitName || frame.dataset.unidade || '');
    var fAc = safe(frame.dataset.actionCode || frame.dataset.idac || '').toUpperCase();
    if (fAc && fAc === idac && (!unidade || !fUnit || norm(fUnit) === norm(unidade))) return true;

    var doc = getDoc(frame);
    if (!doc) return false;
    var codeText = readFieldValue(doc.querySelector('.parent-action-code')) || safe(frame.dataset.actionCode);
    if (!codeText) codeText = readFieldValue(doc.querySelector('[data-parent-original-action-field="1"], #acaoReset'));
    var docAc = parseAC(codeText);
    var unitText = '';
    var unitEl = doc.getElementById('unidade-editavel');
    if (unitEl) unitText = readFieldValue(unitEl);
    if (!unitText && typeof findUnitName === 'function') {
      try { unitText = findUnitName(doc); } catch(e) {}
    }
    return docAc === idac && (!unidade || !unitText || norm(unitText) === norm(unidade));
  }
  function syncStatusToActions(unidade, idac, status){
    if (!idac || !status) return;
    document.querySelectorAll('#pane-acoes iframe.reset-frame').forEach(function(frame){
      if (!frameMatchesAction(frame, unidade, idac)) return;
      var doc = getDoc(frame);
      if (!doc) return;
      var statusField = findMainStatusField(doc);
      if (!statusField) return;
      if (statusField.tagName === 'SELECT') setSelectByTextOrValue(statusField, status);
      else {
        statusField.value = status;
        try { statusField.dispatchEvent(new Event('input', { bubbles:true })); } catch(e) {}
        try { statusField.dispatchEvent(new Event('change', { bubbles:true })); } catch(e) {}
      }
      // mantém metadados atualizados para próximos sincronismos
      frame.dataset.actionCode = idac;
      if (unidade) frame.dataset.unitName = unidade;
    });
  }
  function getCronStatusContext(sel){
    var doc = sel.ownerDocument;
    var card = sel.closest('.action-card');
    if (!card) return null;
    var title = safe((card.querySelector('.action-title-text') || card.querySelector('.action-title') || {}).textContent);
    var idac = parseAC(title) || parseAC(sel.getAttribute('data-acaoid') || '');
    var panel = card.closest('.panel');
    var unidade = safe((panel && panel.querySelector('h2')) ? panel.querySelector('h2').textContent : '');
    var status = readFieldValue(sel);
    return { unidade:unidade, idac:idac, status:status };
  }
  function bindCronograma(){
    var frame = document.getElementById('frame-cronograma');
    var doc = getDoc(frame);
    if (!doc || doc.__v55StatusActionSyncBound) return;
    doc.__v55StatusActionSyncBound = true;
    doc.addEventListener('change', function(ev){
      var sel = ev.target && ev.target.closest ? ev.target.closest('select.action-status-select') : null;
      if (!sel) return;
      // Só status principal da ação; ignora status das melhorias por linha.
      if (!sel.closest('.action-header')) return;
      var ctx = getCronStatusContext(sel);
      if (!ctx || !ctx.idac) return;
      setTimeout(function(){ syncStatusToActions(ctx.unidade, ctx.idac, ctx.status); }, 30);
    }, true);
  }
  window.parentSyncCronActionStatusToAcoes = syncStatusToActions;
  window.addEventListener('load', function(){ setTimeout(bindCronograma,300); setTimeout(bindCronograma,1200); setTimeout(bindCronograma,2500); });
  document.addEventListener('click', function(){ setTimeout(bindCronograma,120); }, true);
  setInterval(bindCronograma, 2000);
})();
</script>

<script id="v74-change-marker-script">
(function(){
  const STORAGE_KEY = 'resetChangeMarkersV74';
  const FIELD_SELECTOR = [
    'select.status-select',
    'select.action-status-select',
    'select.obs-status-select',
    'select.oper-priority-select',
    'select[data-priority]',
    'select',
    'input[type="date"]',
    'input[type="text"]',
    'textarea'
  ].join(',');

  function readStore(){
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}') || {}; } catch(e){ return {}; }
  }
  function writeStore(store){
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(store)); } catch(e){}
  }
  function normText(v){ return String(v || '').trim().replace(/\s+/g,' ').slice(0,120); }
  function fieldKey(doc, el){
    const frameId = doc.defaultView && doc.defaultView.frameElement ? doc.defaultView.frameElement.id || 'frame' : 'main';
    const id = el.id || el.name || el.getAttribute('data-key') || '';
    const tr = el.closest && el.closest('tr');
    const trInfo = tr ? Array.from(tr.children).slice(0,4).map(td=>normText(td.textContent)).join('|') : '';
    const label = (el.closest('label') && normText(el.closest('label').textContent)) || '';
    const cellIndex = el.closest('td') && el.closest('tr') ? Array.from(el.closest('tr').children).indexOf(el.closest('td')) : '';
    return [frameId, id, label, trInfo, cellIndex, el.tagName, el.type || ''].join('::');
  }
  function isEligible(el){
    if (!el || el.dataset.resetMarkerIgnore === '1') return false;
    if (el.type === 'hidden' || el.type === 'file' || el.type === 'checkbox' || el.type === 'radio') return false;
    if (el.closest('.acoes-lock-overlay')) return false;
    if (el.closest('.reset-main-tabs-wrap')) return false;
    if (el.closest('.reset-subtabs-wrap')) return false;
    if (el.offsetParent === null && !el.closest('iframe')) return false;
    /* T27: excluir #section-projetos2 — wrapping/re-wrapping fecha dropdown dos selects */
    try { if (el.closest && el.closest('#section-projetos2')) return false; } catch(e){}
    return true;
  }
  function ensureWrapped(doc, el){
    if (!el.parentNode) return null;
    if (el.parentElement && el.parentElement.classList.contains('reset-change-host')) return el.parentElement;
    const tag = el.tagName;
    // Não envolver textareas grandes para evitar mexer no layout; coloca marcador depois.
    if (tag === 'TEXTAREA') return el.parentElement;
    const host = doc.createElement('span');
    host.className = 'reset-change-host';
    const width = el.style.width || '';
    if (width) host.style.width = width;
    el.parentNode.insertBefore(host, el);
    host.appendChild(el);
    return host;
  }
  function addMarker(doc, el){
    if (!isEligible(el) || el.dataset.resetMarkerReady === '1') return;
    el.dataset.resetMarkerReady = '1';
    const key = fieldKey(doc, el);
    el.dataset.resetMarkerKey = key;
    const store = readStore();
    const state = store[key];
    const host = ensureWrapped(doc, el) || el.parentElement;
    if (!host) return;
    let marker = host.querySelector(':scope > .reset-change-marker[data-for="'+CSS.escape(key)+'"]');
    if (!marker) {
      marker = doc.createElement('span');
      marker.className = 'reset-change-marker';
      marker.setAttribute('data-for', key);
      marker.title = 'Alterado: clique para marcar como visualizado; clique novamente para limpar.';
      marker.addEventListener('click', function(ev){
        ev.preventDefault(); ev.stopPropagation();
        const st = readStore();
        const current = marker.getAttribute('data-state') || st[key] || '';
        let next = '';
        if (current === 'changed') next = 'seen';
        else if (current === 'seen') next = '';
        else next = 'changed';
        if (next) st[key] = next; else delete st[key];
        writeStore(st);
        renderMarker(marker, next);
      });
      host.appendChild(marker);
    }
    renderMarker(marker, state || '');
    const setChanged = function(){
      const st = readStore();
      st[key] = 'changed';
      writeStore(st);
      renderMarker(marker, 'changed');
    };
    el.addEventListener('change', setChanged, true);
    if (el.tagName === 'TEXTAREA' || (el.tagName === 'INPUT' && el.type !== 'date')) {
      el.addEventListener('input', debounce(setChanged, 700), true);
    }
  }
  function renderMarker(marker, state){
    marker.setAttribute('data-state', state || '');
    marker.style.display = state ? 'inline-flex' : 'none';
  }
  function debounce(fn, wait){
    let t; return function(){ clearTimeout(t); t=setTimeout(fn, wait); };
  }
  function instrumentDoc(doc){
    if (!doc || !doc.body) return;
    if (!doc.getElementById('v74-change-marker-style-clone')) {
      const style = doc.createElement('style');
      style.id = 'v74-change-marker-style-clone';
      style.textContent = document.getElementById('v74-change-marker-style').textContent;
      doc.head && doc.head.appendChild(style);
    }
    doc.querySelectorAll(FIELD_SELECTOR).forEach(el => addMarker(doc, el));
    if (!doc.__resetMarkerObserverV74) {
      doc.__resetMarkerObserverV74 = new MutationObserver(debounce(()=>{
        doc.querySelectorAll(FIELD_SELECTOR).forEach(el => addMarker(doc, el));
      }, 120));
      doc.__resetMarkerObserverV74.observe(doc.body, {childList:true, subtree:true});
    }
  }
  function instrumentAll(){
    instrumentDoc(document);
    document.querySelectorAll('iframe').forEach(frame=>{
      try { if (frame.contentDocument) instrumentDoc(frame.contentDocument); } catch(e){}
    });
  }
  window.addEventListener('load', function(){
    setTimeout(instrumentAll, 250);
    setTimeout(instrumentAll, 1000);
    setTimeout(instrumentAll, 2500);
  });
  document.addEventListener('click', function(){ setTimeout(instrumentAll, 150); }, true);
  setInterval(instrumentAll, 2500);
})();
</script>

<script id="v18-captura-salvar-sem-duplicidade">
(function(){
  'use strict';
  if (window.__v18CapturaSalvarSemDuplicidade) return;
  window.__v18CapturaSalvarSemDuplicidade = true;

  function s(v){ return String(v == null ? '' : v).trim(); }
  function slug(v){ return s(v).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'') || 'sem-nome'; }
  function fake(v){
    var c=s(v).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase();
    return !c || c==='-' || c==='—' || c==='AREA DE ACAO' || c==='PILAR' || c==='UNIDADE' || c.indexOf('EX.:')===0 || c.indexOf('EX:')===0;
  }
  function docOf(frame){ try { return frame && (frame.contentDocument || frame.contentWindow.document); } catch(e){ return null; } }
  function read(el){ if(!el)return ''; if(typeof el.value!=='undefined')return s(el.value); return s(el.textContent); }

  function valoresCriarAcao(){
    var doc=docOf(document.getElementById('frame-acoes'));
    if(!doc)return null;
    return {
      doc:doc,
      area:read(doc.getElementById('titulo-editavel')),
      pilar:read(doc.getElementById('subtitulo-editavel')),
      unidade:read(doc.getElementById('unidade-editavel'))
    };
  }

  function limparAbasVazias(){
    document.querySelectorAll('#acoes-subtabs-wrap .reset-subtabs > .reset-subtab.saved-action').forEach(function(tab){
      if(!s(tab.textContent)) tab.remove();
    });
    document.querySelectorAll('#pillar-subtabs-host nav').forEach(function(nav){
      if(!nav.querySelector('button')) nav.remove();
    });
  }

  function proximoCodigo(areaKey,pillarKey,unitKey){
    var max=0;
    try{
      var area=actionAreas&&actionAreas[areaKey];
      var pillar=area&&area.pillars&&area.pillars[pillarKey];
      var unit=pillar&&pillar.units&&pillar.units[unitKey];
      if(unit&&unit.actions)Object.values(unit.actions).forEach(function(a){
        var m=String(a.code||'').match(/AC-(\d+)/i); if(m)max=Math.max(max,parseInt(m[1],10)||0);
      });
    }catch(e){}
    try{
      /* T24A: sem filtro de área/pilar — conta todos os AC-## da unidade para evitar duplicata */
      var cw=document.getElementById('frame-cronograma').contentWindow;
      Object.entries(cw.UNITS_DATA||{}).forEach(function(pair){
        if(slug(pair[0])!==unitKey)return;
        (Array.isArray(pair[1])?pair[1]:[]).forEach(function(a){
          var m=String(a.idac||'').match(/AC-(\d+)/i); if(m)max=Math.max(max,parseInt(m[1],10)||0);
        });
      });
    }catch(e){}
    try{
      /* T24A: também verifica const UNITS_DATA (via eval) para persistência entre recargas */
      var _cw2=document.getElementById('frame-cronograma').contentWindow;
      var _ud=_cw2.eval('typeof UNITS_DATA!=="undefined"?UNITS_DATA:null');
      Object.entries(_ud||{}).forEach(function(pair){
        if(slug(pair[0])!==unitKey)return;
        (Array.isArray(pair[1])?pair[1]:[]).forEach(function(a){
          var m=String(a.idac||'').match(/AC-(\d+)/i); if(m)max=Math.max(max,parseInt(m[1],10)||0);
        });
      });
    }catch(e){}
    return 'AC-'+String(max+1).padStart(2,'0');
  }

  function lerMelhorias(doc){
    var out=[];
    Array.from(doc.querySelectorAll('tr.melhoria-item, tr[data-melhoria-row]')).forEach(function(row,idx){
      var td=row.querySelector('td');
      var idm=(s(td&&td.textContent).match(/M\d+/i)||['M'+String(idx+1).padStart(2,'0')])[0].toUpperCase();
      var field=row.querySelector('.melhoria-entrega-input, textarea[id$="_desc"], textarea');
      var desc=read(field);
      if(desc)out.push({idm:idm,desc:desc,status:'Não iniciada'});
    });
    if(!out.length)out.push({idm:'M01',desc:'Melhoria a definir',status:'Não iniciada'});
    return out;
  }

  function ensureArea(areaName, areaKey, firstIndex){
    var area=actionAreas[areaKey];
    if(area)return area;
    var tab=document.createElement('button');
    tab.className='reset-subtab saved-action'; tab.type='button'; tab.dataset.areaKey=areaKey; tab.textContent=areaName;
    tab.onclick=function(){activateArea(areaKey);};
    document.querySelector('#acoes-subtabs-wrap .reset-subtabs').appendChild(tab);
    var subnav=document.createElement('nav');
    subnav.className='reset-pillar-subtabs'; subnav.dataset.areaKey=areaKey; subnav.setAttribute('aria-label','Pilares de '+areaName);
    document.getElementById('pillar-subtabs-host').appendChild(subnav);
    return actionAreas[areaKey]={name:areaName,tab:tab,subnav:subnav,firstIndex:firstIndex||'',pillars:{}};
  }

  function ensurePillar(area, areaKey, pilarName, pillarKey, firstIndex){
    var pillar=area.pillars[pillarKey]; if(pillar)return pillar;
    var tab=document.createElement('button');
    tab.className='reset-subtab reset-pillar-tab'; tab.type='button'; tab.dataset.areaKey=areaKey; tab.dataset.pillarKey=pillarKey; tab.textContent=pilarName;
    tab.onclick=function(){activateArea(areaKey,pillarKey);}; area.subnav.appendChild(tab);
    var unitnav=document.createElement('nav');
    unitnav.className='reset-unit-subtabs'; unitnav.dataset.areaKey=areaKey; unitnav.dataset.pillarKey=pillarKey; unitnav.setAttribute('aria-label','Unidades de '+pilarName);
    document.getElementById('pillar-subtabs-host').appendChild(unitnav);
    return area.pillars[pillarKey]={name:pilarName,tab:tab,unitnav:unitnav,firstIndex:firstIndex||'',units:{}};
  }

  function ensureUnit(pillar, areaKey, pillarKey, unitName, unitKey, firstIndex){
    var unit=pillar.units[unitKey]; if(unit)return unit;
    var tab=document.createElement('button');
    tab.className='reset-subtab reset-unit-tab'; tab.type='button'; tab.dataset.areaKey=areaKey; tab.dataset.pillarKey=pillarKey; tab.dataset.unitKey=unitKey; tab.textContent=unitName;
    tab.onclick=function(){activateArea(areaKey,pillarKey,unitKey);}; pillar.unitnav.appendChild(tab);
    var actionnav=document.createElement('nav');
    actionnav.className='reset-action-subtabs'; actionnav.dataset.areaKey=areaKey; actionnav.dataset.pillarKey=pillarKey; actionnav.dataset.unitKey=unitKey; actionnav.setAttribute('aria-label','Ações de '+unitName);
    document.getElementById('pillar-subtabs-host').appendChild(actionnav);
    return pillar.units[unitKey]={name:unitName,tab:tab,actionnav:actionnav,firstIndex:firstIndex||'',actions:{}};
  }

  function renderCronogramaForcado(){
    var frame=document.getElementById('frame-cronograma');
    var cw=frame&&frame.contentWindow, doc=docOf(frame);
    if(!cw||!doc||!cw.UNITS_DATA)return;
    try{
      var container=doc.getElementById('unit-buttons');
      var section=doc.getElementById('section-unidades');
      if(!container||!section)return;

      if(!cw.unitMap)cw.unitMap={};
      Object.keys(cw.unitMap).forEach(function(k){delete cw.unitMap[k];});
      container.innerHTML='';

      Object.keys(cw.UNITS_DATA).forEach(function(unidade){
        var actions=Array.isArray(cw.UNITS_DATA[unidade])?cw.UNITS_DATA[unidade]:[];
        if(!actions.length)return;
        var key='unit-'+slug(unidade);
        cw.unitMap[unidade]={key:key,cor:'#a8cc3a'};

        var box=doc.createElement('div');
        box.className='unit-box';
        var btn=doc.createElement('button');
        btn.className='unit-btn';
        btn.id='btn-'+key;
        btn.type='button';
        btn.textContent=unidade;
        var stats=doc.createElement('div');
        stats.className='unit-stats';
        var qtdMel=actions.reduce(function(t,a){return t+((a.melhorias||[]).length);},0);
        stats.innerHTML='<strong>'+actions.length+'</strong> ações · <strong>'+qtdMel+'</strong> melhorias · <strong>0</strong> concluídas <strong>(0%)</strong>';
        box.appendChild(btn); box.appendChild(stats); container.appendChild(box);

        var panel=doc.getElementById(key);
        if(!panel){
          panel=doc.createElement('div');
          panel.className='panel hidden';
          panel.id=key;
          panel.innerHTML='<h2 id="'+key+'-title"></h2><p id="'+key+'-info"></p><div class="action-list" id="'+key+'-actions"></div>';
          section.appendChild(panel);
        }
        var h=doc.getElementById(key+'-title'), p=doc.getElementById(key+'-info'), list=doc.getElementById(key+'-actions');
        if(h)h.textContent=unidade;
        if(p)p.textContent=actions.length+' ações · '+qtdMel+' melhorias associadas.';
        if(list){
          list.innerHTML='';
          actions.forEach(function(a){
            var b=doc.createElement('button');
            b.className='action-btn';
            b.type='button';
            var titulo=s(a.titulo||a.nome||'Nova ação').replace(/^AC-\d+\s*[—-]?\s*/i,'');
            b.innerHTML='<span class="action-btn-title"><strong>'+s(a.idac)+'</strong> — '+titulo+'</span><span class="action-meta-side"><small>'+s(a.area||'')+'</small><span class="pill">'+(a.melhorias||[]).length+' melhorias</span></span>';
            list.appendChild(b);
          });
        }
        btn.onclick=function(){
          Object.keys(cw.unitMap).forEach(function(u){
            var k=cw.unitMap[u].key;
            var pp=doc.getElementById(k); if(pp)pp.classList.add('hidden');
            var bb=doc.getElementById('btn-'+k); if(bb)bb.classList.remove('active');
          });
          panel.classList.remove('hidden');
          btn.classList.add('active');
        };
      });

      var first=container.querySelector('.unit-btn');
      if(first)first.click();

      /* T34: contadores direto de cw.UNITS_DATA (const UNITS_DATA != cw.UNITS_DATA) */
      try{
        var _sumA=0,_sumM=0;
        Object.values(cw.UNITS_DATA||{}).forEach(function(acts){
          if(!Array.isArray(acts))return;
          _sumA+=acts.length;
          acts.forEach(function(a){_sumM+=(a.melhorias||[]).length;});
        });
        var _eA=doc.getElementById('summary-acoes-total');
        var _eM=doc.getElementById('summary-melhorias-total');
        if(_eA)_eA.textContent=_sumA;
        if(_eM)_eM.textContent=_sumM;
        /* T34: última previsão = maior data de termino/previsao em projetosExecucao.v1 */
        var _pjRaw='';try{_pjRaw=cw.localStorage.getItem('reset.projetosExecucao.v1')||'';}catch(_ex){}
        var _pjData={};try{_pjData=_pjRaw?JSON.parse(_pjRaw):{};}catch(_ex){}
        var _maxDt=null;
        Object.values(_pjData||{}).forEach(function(arr){
          if(!Array.isArray(arr))return;
          arr.forEach(function(p){
            var d=p.termino||p.previsao||'';
            if(!d||d.length<8)return;
            var dt=new Date(d.length===10?d+'T00:00':d);
            if(!isNaN(dt)&&(!_maxDt||dt>_maxDt))_maxDt=dt;
          });
        });
        var _eP=doc.getElementById('summary-previsao-final');
        if(_eP)_eP.textContent=_maxDt?(String(_maxDt.getDate()).padStart(2,'0')+'/'+String(_maxDt.getMonth()+1).padStart(2,'0')+'/'+_maxDt.getFullYear()):'--/--/----';
      }catch(e){}
      try{ if(typeof cw.renderProjetosExecucao==='function')cw.renderProjetosExecucao(); }catch(e){}
      try{ if(typeof cw.p2Render==='function')cw.p2Render(); }catch(e){}
    }catch(e){console.error('renderCronogramaForcado v18',e);}
  }

  function syncCron(payload){
    var frame=document.getElementById('frame-cronograma');
    var cw=frame&&frame.contentWindow;
    if(!cw)return false;
    if(!cw.UNITS_DATA)cw.UNITS_DATA={};
    if(!cw.UNITS_DATA[payload.unidade])cw.UNITS_DATA[payload.unidade]=[];
    var arr=cw.UNITS_DATA[payload.unidade];
    /* T24B: match por idac+área para não sobrescrever ação de área diferente com mesmo código */
    var action=arr.find(function(a){return s(a.idac).toUpperCase()===payload.idac && slug(a.area||a.areaAcao||'')===slug(payload.area||'');});
    if(!action){
      action={id:'acao'+(arr.length+1),idac:payload.idac,titulo:payload.titulo,nome:payload.idac+' — '+payload.titulo,area:payload.area,areaAcao:payload.area,pilar:payload.pilar,pillar:payload.pilar,status:'Não iniciada',inicio:'',previsao:'',prazo:'',meses:'',melhorias:payload.melhorias||[]};
      arr.push(action);
    }else{
      action.titulo=payload.titulo; action.nome=payload.idac+' — '+payload.titulo; action.area=payload.area; action.areaAcao=payload.area; action.pilar=payload.pilar; action.pillar=payload.pilar; action.melhorias=payload.melhorias||action.melhorias||[];
    }
    try{cw.localStorage.setItem('reset.units_data',JSON.stringify(cw.UNITS_DATA));}catch(e){}
    renderCronogramaForcado();
    return true;
  }

  function salvarUnico(){
    limparAbasVazias();
    var v=valoresCriarAcao(); if(!v)return;
    if(fake(v.area)||fake(v.pilar)||fake(v.unidade)){alert('Preencha Área de Ação, Pilar e Unidade.');return;}

    var areaKey=slug(v.area), pillarKey=slug(v.pilar), unitKey=slug(v.unidade);
    var code=proximoCodigo(areaKey,pillarKey,unitKey);

    if(!desc)desc='Nova ação';

    savedActionCounter+=1;
    var index='acao-'+savedActionCounter;
    var html=serializeActionDocument(v.doc);

    var area=ensureArea(v.area,areaKey,index);
    var pillar=ensurePillar(area,areaKey,v.pilar,pillarKey,index);
    var unit=ensureUnit(pillar,areaKey,pillarKey,v.unidade,unitKey,index);

    actionTab.dataset.areaKey=areaKey;
    actionTab.dataset.pillarKey=pillarKey;
    actionTab.dataset.unitKey=unitKey;
    actionTab.textContent=code;
    actionTab.onclick=function(){currentAreaKey=areaKey;currentPillarKey=pillarKey;currentUnitKey=unitKey;showActionTab(index);};
    unit.actionnav.appendChild(actionTab);
    unit.actions[index]={index:index,code:code,description:desc,tab:actionTab};

    if(!unit.firstIndex)unit.firstIndex=index;
    if(!pillar.firstIndex)pillar.firstIndex=index;
    if(!area.firstIndex)area.firstIndex=index;

    var fr=document.createElement('iframe');
    fr.className='reset-frame';
    fr.dataset.actionIndex=index;
    fr.dataset.actionCode=code;
    fr.dataset.areaKey=areaKey;
    fr.dataset.pillarKey=pillarKey;
    fr.dataset.unitKey=unitKey;
    fr.dataset.areaName=v.area;
    fr.dataset.pillarName=v.pilar;
    fr.dataset.unitName=v.unidade;
    fr.title='Ação — '+v.area+' / '+v.pilar+' / '+v.unidade+' / '+code;
    fr.srcdoc=html;
    fr.addEventListener('load',function(){
      try{
        injectActionFrameFormatting(fr);
        var d=docOf(fr);
        if(d){applyUnitReference(d,v.unidade);transformActionField(d,code);}
        injectDeleteButtonIntoSavedFrame(fr);
        resizeFrames();
      }catch(e){}
    });
    document.getElementById('pane-acoes').appendChild(fr);

    syncCron({area:v.area,pilar:v.pilar,unidade:v.unidade,idac:code,titulo:desc,melhorias:lerMelhorias(v.doc)});
    limparAbasVazias();
    currentAreaKey=areaKey; currentPillarKey=pillarKey; currentUnitKey=unitKey;
    showActionTab(index);
  }

  window.saveNewActionFromCreateFrame=salvarUnico;

  function bloquearSalvarAntigo(){
    var doc=docOf(document.getElementById('frame-acoes')); if(!doc || doc.__v18CaptureBound)return;

      if(!btn || !/SALVAR\s+NOVA\s+AÇÃO/i.test(btn.textContent||''))return;
      e.preventDefault();
      e.stopPropagation();
      e.stopImmediatePropagation();
      salvarUnico();
      return false;
    }, true);

    Array.from(doc.querySelectorAll('button')).forEach(function(btn){
      if(/SALVAR\s+NOVA\s+AÇÃO/i.test(btn.textContent||'')){

<script id="v18-fix-bloqueio-abas-fantasma">
(function(){
  if (window.__fixBloqueioAbasFantasma) return;
  window.__fixBloqueioAbasFantasma = true;

  function cleanText(v){
    return String(v == null ? '' : v)
      .replace(/\u00a0/g,' ')
      .replace(/\s+/g,' ')
      .trim()
      .toUpperCase();
  }

  function isBlank(v){ return !cleanText(v); }

  function badTab(el){
    if (!el || !el.classList) return false;

    if (el.classList.contains('saved-action')) {
      return isBlank(el.textContent) || isBlank(el.dataset.areaKey);
    }

    if (el.classList.contains('reset-pillar-tab')) {
      return isBlank(el.textContent) || isBlank(el.dataset.areaKey) || isBlank(el.dataset.pillarKey);
    }

    if (el.classList.contains('reset-unit-tab')) {
      return isBlank(el.textContent) || isBlank(el.dataset.areaKey) || isBlank(el.dataset.pillarKey) || isBlank(el.dataset.unitKey);
    }

    if (el.classList.contains('reset-action-tab')) {
      return isBlank(el.textContent) || isBlank(el.dataset.areaKey) || isBlank(el.dataset.pillarKey) || isBlank(el.dataset.unitKey);
    }

    return false;
  }

  function badNav(el){
    if (!el || !el.classList) return false;

    if (el.classList.contains('reset-pillar-subtabs')) {
      return isBlank(el.dataset.areaKey);
    }

    if (el.classList.contains('reset-unit-subtabs')) {
      return isBlank(el.dataset.areaKey) || isBlank(el.dataset.pillarKey);
    }

    if (el.classList.contains('reset-action-subtabs')) {
      return isBlank(el.dataset.areaKey) || isBlank(el.dataset.pillarKey) || isBlank(el.dataset.unitKey);
    }

    return false;
  }

  function limparAbasFantasma(){
    document.querySelectorAll('.reset-subtab.saved-action,.reset-pillar-tab,.reset-unit-tab,.reset-action-tab').forEach(function(el){
      if (badTab(el)) el.remove();
    });

    document.querySelectorAll('.reset-pillar-subtabs,.reset-unit-subtabs,.reset-action-subtabs').forEach(function(el){
      if (badNav(el)) el.remove();
      else if (!el.querySelector('button') && !el.classList.contains('active')) el.remove();
    });

    if (window.actionAreas && typeof window.actionAreas === 'object') {
      Object.keys(window.actionAreas).forEach(function(areaKey){
        var area = window.actionAreas[areaKey];
        if (isBlank(areaKey) || !area || isBlank(area.name)) {
          delete window.actionAreas[areaKey];
          return;
        }

        if (area.pillars && typeof area.pillars === 'object') {
          Object.keys(area.pillars).forEach(function(pillarKey){
            var pillar = area.pillars[pillarKey];
            if (isBlank(pillarKey) || !pillar || isBlank(pillar.name)) {
              delete area.pillars[pillarKey];
              return;
            }

            if (pillar.units && typeof pillar.units === 'object') {
              Object.keys(pillar.units).forEach(function(unitKey){
                var unit = pillar.units[unitKey];
                if (isBlank(unitKey) || !unit || isBlank(unit.name)) {
                  delete pillar.units[unitKey];
                  return;
                }

                if (unit.actions && typeof unit.actions === 'object') {
                  Object.keys(unit.actions).forEach(function(actionKey){
                    var ac = unit.actions[actionKey];
                    if (!ac || isBlank(ac.code || actionKey)) delete unit.actions[actionKey];
                  });
                }
              });
            }
          });
        }
      });
    }
  }

  var originalAppendChild = Element.prototype.appendChild;
  Element.prototype.appendChild = function(child){
    if (badTab(child) || badNav(child)) {
      return child;
    }
    var ret = originalAppendChild.call(this, child);
    setTimeout(limparAbasFantasma, 0);
    return ret;
  };

  var originalInsertBefore = Element.prototype.insertBefore;
  Element.prototype.insertBefore = function(newNode, referenceNode){
    if (badTab(newNode) || badNav(newNode)) {
      return newNode;
    }
    var ret = originalInsertBefore.call(this, newNode, referenceNode);
    setTimeout(limparAbasFantasma, 0);
    return ret;
  };

  function envolverSalvamento(){
    if (window.__fixSaveWrapped || typeof window.saveNewActionFromCreateFrame !== 'function') return;
    window.__fixSaveWrapped = true;
    var originalSave = window.saveNewActionFromCreateFrame;
    window.saveNewActionFromCreateFrame = function(){
      var r = originalSave.apply(this, arguments);
      setTimeout(limparAbasFantasma, 0);
      setTimeout(limparAbasFantasma, 80);
      setTimeout(limparAbasFantasma, 300);
      return r;
    };
  }

  document.addEventListener('click', function(){
    setTimeout(limparAbasFantasma, 0);
    setTimeout(limparAbasFantasma, 150);
  }, true);

  window.addEventListener('load', function(){
    envolverSalvamento();
    limparAbasFantasma();
    setTimeout(limparAbasFantasma, 300);
    setTimeout(limparAbasFantasma, 1000);
  });

  setInterval(function(){
    envolverSalvamento();
    limparAbasFantasma();
  }, 500);
})();
</script>


<script id="v18-fix-cronograma-acao-abre-melhorias">

  /* V12: desativado. Este listener antigo capturava clique em .action-btn antes do toggle novo,
     recriava/removia detalhes e impedia o recolher. A aba Unidades passa a usar apenas v18Toggle,

  return;

  function s(v){ return String(v == null ? '' : v).trim(); }
  function esc(v){
    return s(v).replace(/[&<>"']/g,function(m){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];
    });
  }

  function slug(v){
    return s(v).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase()
      .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
  }

  function cron(){

  function injectStyle(doc){

      }
    `;
    doc.head.appendChild(st);
  }

  function getUnidadeByPanelId(cw, panelId){
    if(!cw || !cw.UNITS_DATA) return '';
    var want = String(panelId || '').replace(/^unit-/, '');
    return Object.keys(cw.UNITS_DATA).find(function(u){ return slug(u) === want; }) || '';
  }

  function renderDetalhe(doc, cw, btn){
    var list = btn.closest('.action-list');
    if(!list) return;

    var panel = list.closest('.panel');
    var unidade = getUnidadeByPanelId(cw, panel && panel.id);
    var actions = (cw.UNITS_DATA && cw.UNITS_DATA[unidade]) || [];
    var idx = Array.from(list.querySelectorAll('.action-btn')).indexOf(btn);
    var acao = actions[idx];
    if(!acao) return;

    list.querySelectorAll('.action-btn').forEach(function(b){ b.classList.remove('active-action-open'); });
    btn.classList.add('active-action-open');

    list.querySelectorAll('.acao-melhorias-detalhe').forEach(function(d){ d.remove(); });

    var detalhe = doc.createElement('div');
    detalhe.className = 'acao-melhorias-detalhe';

    var melhorias = Array.isArray(acao.melhorias) ? acao.melhorias : [];
    var html = '<h3>'+esc(acao.idac || '')+' — Melhorias vinculadas</h3>';

    if(!melhorias.length){
      html += '<div class="acao-melhorias-vazio">Nenhuma melhoria vinculada a esta ação.</div>';
    }else{
      html += '<table class="acao-melhorias-table"><thead><tr><th>ID</th><th>Melhoria / Entrega</th><th>Status</th><th>Início</th><th>Previsão</th><th>Conclusão</th></tr></thead><tbody>';
      melhorias.forEach(function(m, i){
        var id = esc(m.idm || m.id || ('M' + String(i+1).padStart(2,'0')));
        var desc = esc(m.desc || m.descricao || m.entrega || m.melhoria || 'Melhoria a definir');
        var status = esc(m.status || '-');
        html += '<tr>'
          + '<td class="mid">'+id+'</td>'
          + '<td>'+desc+'</td>'
          + '<td><span class="status-pill">'+status+'</span></td>'
          + '<td>'+esc(m.inicio || '')+'</td>'
          + '<td>'+esc(m.previsao || '')+'</td>'
          + '<td>'+esc(m.conclusao || '')+'</td>'
          + '</tr>';
      });
      html += '</tbody></table>';
    }

    detalhe.innerHTML = html;
    btn.insertAdjacentElement('afterend', detalhe);
  }

  function bind(){
    var c = cron();
    var doc = c.doc, cw = c.win;
    if(!doc || !cw || doc.__acaoMelhoriasBound) {
      if(doc) injectStyle(doc);
      return;
    }

    doc.__acaoMelhoriasBound = true;
    injectStyle(doc);

    doc.addEventListener('click', function(e){
      var btn = e.target && e.target.closest ? e.target.closest('.action-btn') : null;
      if(!btn) return;
      e.preventDefault();
      e.stopPropagation();
      renderDetalhe(doc, cw, btn);
    }, true);
  }

  window.addEventListener('load', function(){
    setTimeout(bind, 300);
    setTimeout(bind, 1000);
  });

  var frame = document.getElementById('frame-cronograma');
  if(frame){
    frame.addEventListener('load', function(){
      setTimeout(bind, 200);
      setTimeout(bind, 800);
    });
  }

  setInterval(bind, 800);
})();
</script>

  function buildActionCard(doc, acao, unidade){
    var melhorias=Array.isArray(acao.melhorias)?acao.melhorias:[];

    function pSlug(v){
      return s(v).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase()
        .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');
    }
    function pKey(m){
      return [unidade||'', acao && acao.idac, m && (m.idm||m.id)].map(pSlug).join('__');
    }
    function getProjetos(m){
      try{
        var raw=localStorage.getItem('reset.projetosExecucao.v1');
        var data=raw?JSON.parse(raw):{};
        var list=data[pKey(m)];
        return Array.isArray(list)?list:[];
      }catch(e){ return []; }
    }
    function fmtData(v){
      v=s(v);
      if(!v) return '';
      if(/^\d{4}-\d{2}-\d{2}$/.test(v)) return v.slice(8,10)+'/'+v.slice(5,7)+'/'+v.slice(2,4);
      return v;
    }
    function statusMelhoria(m, ps){
      if(!ps.length) return m.status || 'Não iniciada';
      var done=ps.filter(function(p){
        var st=s(p.status).toLowerCase();
        return p.feito || (st.includes('conclu') && !st.includes('nao') && !st.includes('não'));
      }).length;
      if(done === ps.length) return 'Concluída';
      if(ps.some(function(p){ return s(p.status).toLowerCase().includes('andamento'); })) return 'Em andamento';
      if(ps.some(function(p){ return s(p.status).toLowerCase().includes('pend'); })) return 'Com pendência';
      return ps[0].status || 'Não iniciada';
    }
    function datasMelhoria(m, ps){
      var inis=ps.map(function(p){return p.inicio||'';}).filter(Boolean).sort();
      var fins=ps.map(function(p){return p.termino||p.previsao||'';}).filter(Boolean).sort();
      return {
        inicio: fmtData(inis[0] || m.inicio || ''),
        previsao: fmtData(fins[fins.length-1] || m.previsao || m.termino || '')
      };
    }

    var html='<div class="action-card-ref">'
      +'<h3>'+esc(acao.idac||'')+' — '+esc((acao.titulo||acao.nome||'Nova ação').replace(/^AC-\\d+\\s*[—-]?\\s*/i,''))+'</h3>'
      +'<div class="melhorias-title-ref">Melhorias vinculadas ('+melhorias.length+')</div>';

    if(!melhorias.length){
      html+='<div style="color:var(--muted);font-style:italic">Nenhuma melhoria vinculada.</div>';
    }else{
      html+='<table class="melhorias-table-ref"><thead><tr>'
        +'<th>ID</th><th style=\"width:50%\">Descrição</th><th>Início</th><th>Previsão</th>'
        +'</tr></thead><tbody>';
      melhorias.forEach(function(m,i){
        var id=m.idm||m.id||('M'+String(i+1).padStart(2,'0'));
        var ps=getProjetos(m);
        var dt=datasMelhoria(m, ps);
        var status=statusMelhoria(m, ps);
        var done=s(status).toLowerCase().includes('conclu') || s(status).toLowerCase().includes('aprov');
        html+='<tr class="'+(done?'done':'')+'">'
          +'<td class="id">'+esc(id)+'</td>'
          +'<td>'+esc(m.desc||m.descricao||m.entrega||m.melhoria||'')+'</td>'
          +'<td>'+esc(dt.inicio||'')+'</td>'
          +'<td>'+esc(dt.previsao||'')+'</td>'
          +'</tr>';
      });
      html+='</tbody></table>';
    }
    html+='</div>';
    return html;
  }

  var _unidadesHash='';
  function renderUnidadesLayout(){
    var c=frameCron(), doc=c.doc, cw=c.win;

    var hash=Object.keys(cw.UNITS_DATA).sort().map(function(k){
      return k+':'+(Array.isArray(cw.UNITS_DATA[k])?cw.UNITS_DATA[k].length:0)+':'+JSON.stringify(cw.UNITS_DATA[k]);
    }).join('|')+'|P:'+projRaw+'|A:'+p2acRaw;
    if(!hash||hash===_unidadesHash) return;

    Object.keys(cw.UNITS_DATA).forEach(function(unidade){
      var actions=Array.isArray(cw.UNITS_DATA[unidade])?cw.UNITS_DATA[unidade]:[];
      if(!actions.length) return;

      var key='unit-'+slug(unidade);

      var totalMel=actions.reduce(function(t,a){return t+((a.melhorias||[]).length);},0);
      var box=doc.createElement('div'); box.className='unit-box';
      var btn=doc.createElement('button'); btn.className='unit-btn'; btn.id='btn-'+key; btn.type='button'; btn.textContent=unidade;
      var stats=doc.createElement('div'); stats.className='unit-stats';
      stats.innerHTML='<strong>'+actions.length+'</strong> ações · <strong>'+totalMel+'</strong> melhorias · <strong>0</strong> concluídas <strong>(0%)</strong>';
      box.appendChild(btn); box.appendChild(stats); container.appendChild(box);

      var old=doc.getElementById(key);
      if(old) old.remove();

      var panel=doc.createElement('div');

      panel.innerHTML='<h2>'+esc(unidade)+'</h2><p>'+actions.length+' ações · '+totalMel+' melhorias associadas.</p><div class="action-list"></div>';
      section.appendChild(panel);

      var list=panel.querySelector('.action-list');

      actions.forEach(function(a){
        var cardId=key+'-'+slug(a.idac||'ac');
        var _area=esc(a.area||a.areaAcao||'');
        var _pilar=esc(a.pillar||a.pilar||'');
        var _titulo=esc((a.titulo||a.nome||'').replace(/^AC-\d+\s*[—-]?\s*/i,''));
        var _mels=(a.melhorias||[]).length;
        var _ak=[unidade||'', a && a.idac].map(slug).join('__');
        var _statusAcao='Não iniciada';
        try{ _statusAcao=localStorage.getItem('reset.p2ac.'+_ak+'.status') || a.status || 'Não iniciada'; }catch(e){ _statusAcao=a.status || 'Não iniciada'; }
        /* T33: porcentagem calculada a partir de projetosExecucao.v1 */
        var _pctAcao=0;
        try{
          var _pjRaw=localStorage.getItem('reset.projetosExecucao.v1');
          var _pjData=_pjRaw?JSON.parse(_pjRaw):{};
          var _pjPrefix=_ak+'__';
          var _pjTotal=0; var _pjConc=0;
          Object.keys(_pjData).forEach(function(k){
            if(k===_ak||k.indexOf(_pjPrefix)===0){
              var arr=_pjData[k]; if(Array.isArray(arr)){
                _pjTotal+=arr.length;
                _pjConc+=arr.filter(function(p){return !!p.feito;}).length;
              }
            }
          });
          if(_pjTotal>0) _pctAcao=Math.round(_pjConc/_pjTotal*100);
        }catch(e){}

        /* Botão */
        var b=doc.createElement('button');
        b.className='action-btn'; b.type='button';
        b.innerHTML=
          '<span style="display:flex;align-items:center;gap:8px;flex:1;min-width:0;overflow:hidden;">'
          +'<span class="v18-action-caret">▸</span>'
          +'<strong style="font-family:var(--font-mono);color:#a8cc3a;white-space:nowrap;">'+esc(a.idac)+'</strong>'
          +'<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+_titulo+'</span>'
          +'</span>'
          +'<span style="display:flex;align-items:center;gap:6px;flex-shrink:0;">'
          +(_area?'<span style="font-family:var(--font-mono);font-size:10px;color:#5a7499;text-transform:uppercase;">'+_area+'</span>':'')
          +(_pilar?'<span style="font-family:var(--font-mono);font-size:10px;color:#a78bfa;border:1px solid rgba(167,139,250,.4);border-radius:5px;padding:1px 6px;">'+_pilar+'</span>':'')
          +'<span style="font-family:var(--font-mono);font-size:10px;color:#fb923c;border:1px solid rgba(251,146,60,.5);border-radius:7px;padding:2px 8px;text-transform:uppercase;white-space:nowrap;">'+esc(_statusAcao)+'</span>'
          +(_pctAcao>0?'<span style="font-family:var(--font-mono);font-size:10px;color:#a8cc3a;border:1px solid rgba(168,204,58,.4);border-radius:7px;padding:2px 8px;white-space:nowrap;">'+_pctAcao+'%</span>':'')
          +'<span class="pill">'+_mels+' melhorias</span>'
          +'</span>';

        /* Toggle: mesma lógica visual da aba Projetos em Execução: abre/recolhe ao clicar na linha */
        (function(cid,btnRef){ btnRef.setAttribute('title','Clique para abrir ou fechar as melhorias desta ação'); btnRef.onclick=function(ev){ if(ev){ev.preventDefault();ev.stopPropagation();} var w=frameCron().win; if(w&&w.v18Toggle) return w.v18Toggle(cid,btnRef); return false; }; })(cardId,b);
        list.appendChild(b);

        /* Card de detalhes (oculto por padrão) */
        var card=doc.createElement('div');
        card.id=cardId; card.className='action-card-v18 hidden';
        card.innerHTML=buildActionCard(doc,a,unidade);
        list.appendChild(card);
      });

      btn.onclick=function(){
        var isActive=btn.classList.contains('active');
        Object.keys(cw.unitMap).forEach(function(u){
          var k=cw.unitMap[u].key;
          var p=doc.getElementById(k); if(p) p.classList.add('hidden');
          var bb=doc.getElementById('btn-'+k); if(bb) bb.classList.remove('active');
        });
        if(!isActive){ panel.classList.remove('hidden'); btn.classList.add('active'); }
      };
    });
  }

  function renderProjetosLayout(){
    /* V7 — correção pontual: não criar tabela paralela em PROJETOS EM EXECUÇÃO.
       A tabela paralela (.p2-ref-wrap) escondia o #p2-host, então o P01 era salvo,
       mas não aparecia abaixo da melhoria. Mantém a renderização original p2Render(). */
    var c=frameCron(), doc=c.doc, cw=c.win;
    if(!doc||!cw) return;
    /* Guard T25: não chamar p2Render se um <select> em #section-projetos2 estiver focado
       (dropdown aberto). Isso evita que cliques na página externa fechem o dropdown. */
    try{
      var ae=doc.activeElement;
      if(ae && ae.tagName==='SELECT' && ae.closest && ae.closest('#section-projetos2')) return;
    }catch(e){}
    var section=doc.getElementById('section-projetos2');
    if(!section) return;
    var old=section.querySelector('.p2-ref-wrap');
    if(old) old.remove();
    var host=section.querySelector('#p2-host');
    if(host) host.style.display='';
    try { if (typeof cw.p2Render === 'function') cw.p2Render(); } catch(e) {}
  }


  function aplicar(){
    renderUnidadesLayout();
    renderProjetosLayout();
  }

  window.addEventListener('load',function(){
    setTimeout(aplicar,500);
    setTimeout(aplicar,1200);

  var f=document.getElementById('frame-cronograma');
  if(f) f.addEventListener('load',function(){

  document.addEventListener('click',function(){

  /* T21: expõe aplicar() globalmente para v44 chamar após Atualizar Ação (click dentro de iframe não propaga) */
  window.__cronAplicar = function(){
    var _cron = document.getElementById('frame-cronograma');
    var _cw = _cron && _cron.contentWindow;
    if(_cw){
      try{
        /* T23: sync cw.UNITS_DATA ← const UNITS_DATA (via eval) para renderUnidadesLayout ver dados atualizados.
           Feito apenas aqui (não dentro de renderUnidadesLayout) para não reconstruir DOM em todo click. */
        var _fresh = _cw.eval('typeof UNITS_DATA !== \'undefined\' ? UNITS_DATA : null');
        if(_fresh && typeof _fresh === 'object' && Object.keys(_fresh).length){
          if(!_cw.UNITS_DATA) _cw.UNITS_DATA = {};
          Object.keys(_fresh).forEach(function(u){ _cw.UNITS_DATA[u] = _fresh[u]; });
          Object.keys(_cw.UNITS_DATA).forEach(function(u){ if(!_fresh[u]) delete _cw.UNITS_DATA[u]; });
        }
      }catch(e){}
    }
    _unidadesHash='';
    renderUnidadesLayout();
    renderProjetosLayout();
  };

  // V22: removido setInterval de estilo antigo; causava reflow/tremor e conflitava com o grid final.
})();

<script id="v18-v3-limpeza-exclusao-total">
(function(){
