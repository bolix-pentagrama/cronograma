&lt;script&gt;
/* ===== AJUSTE FINAL — PRAZO, % ATRASO E ALERTA TOPO ===== */
(function () {
  function parseDataFinal(valor) {
    if (!valor) return null;
    valor = String(valor).trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(valor)) {
      const [ano, mes, dia] = valor.split(&#x27;-&#x27;).map(Number);
      return new Date(ano, mes - 1, dia);
    }
    if (/^\d{2}\/\d{2}\/\d{4}$/.test(valor)) {
      const [dia, mes, ano] = valor.split(&#x27;/&#x27;).map(Number);
      return new Date(ano, mes - 1, dia);
    }
    return null;
  }
  function getRowsPrazo() { return Array.from(document.querySelectorAll(&#x27;.melhorias-table-pro tr.melhoria-item&#x27;)); }
  window.atualizarPrazoFinal = function atualizarPrazoFinal() {
    let noPrazo = 0, atrasados = 0, semConclusao = 0, semPrevisao = 0;
    getRowsPrazo().forEach(function (row) {
      const cells = row.querySelectorAll(&#x27;td&#x27;);
      const previsaoInput = cells[4] &amp;&amp; cells[4].querySelector(&#x27;input[type=&quot;date&quot;]&#x27;);
      const conclusaoInput = cells[5] &amp;&amp; cells[5].querySelector(&#x27;input[type=&quot;date&quot;]&#x27;);
      const dot = row.querySelector(&#x27;.prazo-dot&#x27;);
      if (!dot) return;
      const previsao = parseDataFinal(previsaoInput &amp;&amp; previsaoInput.value);
      const conclusao = parseDataFinal(conclusaoInput &amp;&amp; conclusaoInput.value);
      dot.classList.remove(&#x27;prazo-ok&#x27;,&#x27;prazo-atrasado&#x27;,&#x27;prazo-pendente&#x27;);
      if (!conclusao) { semConclusao++; dot.classList.add(&#x27;prazo-pendente&#x27;); dot.title = &#x27;Aguardando conclusão&#x27;; return; }
      if (!previsao) { semPrevisao++; dot.classList.add(&#x27;prazo-pendente&#x27;); dot.title = &#x27;Conclusão informada, mas sem previsão&#x27;; return; }
      if (conclusao &lt;= previsao) { noPrazo++; dot.classList.add(&#x27;prazo-ok&#x27;); dot.title = &#x27;Dentro do prazo&#x27;; }
      else { atrasados++; dot.classList.add(&#x27;prazo-atrasado&#x27;); dot.title = &#x27;Atrasado&#x27;; }
    });
    const total = getRowsPrazo().length;
    const avaliados = noPrazo + atrasados;
    const pctAtraso = avaliados ? Math.round((atrasados / avaliados) * 100) : 0;
    const box = document.getElementById(&#x27;alertaPrazoTopo&#x27;);
    const texto = document.getElementById(&#x27;alertaPrazoTexto&#x27;);
    const pct = document.getElementById(&#x27;alertaPrazoPct&#x27;);
    if (box &amp;&amp; texto &amp;&amp; pct) {
      box.classList.remove(&#x27;ok&#x27;,&#x27;warn&#x27;,&#x27;crit&#x27;);
      pct.textContent = pctAtraso + &#x27;%&#x27;;
      if (!avaliados) { box.classList.add(&#x27;ok&#x27;); texto.textContent = &#x27;Aguardando conclusões para medir atraso. &#x27; + semConclusao + &#x27;/&#x27; + total + &#x27; item(ns) ainda sem conclusão.&#x27;; }
      else if (atrasados === 0) { box.classList.add(&#x27;ok&#x27;); texto.textContent = &#x27;Nenhum item atrasado. &#x27; + noPrazo + &#x27; dentro do prazo; &#x27; + semConclusao + &#x27; sem conclusão.&#x27;; }
      else if (pctAtraso &lt;= 30) { box.classList.add(&#x27;warn&#x27;); texto.textContent = atrasados + &#x27; item(ns) atrasado(s) de &#x27; + avaliados + &#x27; avaliado(s). &#x27; + noPrazo + &#x27; dentro do prazo; &#x27; + semConclusao + &#x27; sem conclusão.&#x27;; }
      else { box.classList.add(&#x27;crit&#x27;); texto.textContent = &#x27;Risco de prazo: &#x27; + atrasados + &#x27; item(ns) atrasado(s) de &#x27; + avaliados + &#x27; avaliado(s). Replanejar responsáveis e próximos marcos.&#x27;; }
    }
  };
  document.addEventListener(&#x27;input&#x27;, function(ev){ if (ev.target &amp;&amp; ev.target.matches(&#x27;.melhorias-table-pro input[type=&quot;date&quot;]&#x27;)) window.atualizarPrazoFinal(); });

  // AC-03 v5: previsão calculada pelo início + prazo em dias, mas continua editável.
  function ac03AddDaysIso(startIso, days){

      var prazo = row.querySelector(&#x27;#m&#x27;+n+&#x27;_prazo&#x27;) || row.querySelector(&#x27;input[id$=&quot;_prazo&quot;]&#x27;);

      var conclusao = row.querySelector(&#x27;#m&#x27;+n+&#x27;_conclusao&#x27;) || row.querySelector(&#x27;input[id$=&quot;_conclusao&quot;]&#x27;);
      var dot = row.querySelector(&#x27;#m&#x27;+n+&#x27;_prazoStatus&#x27;) || row.querySelector(&#x27;.prazo-dot&#x27;);
      var dtInicio = parseDate(inicio &amp;&amp; inicio.value);
      var dias = prazo &amp;&amp; prazo.value !== &#x27;&#x27; ? Number(prazo.value) : NaN;
      var dtPrev = parseDate(previsao &amp;&amp; previsao.value);
      var dtConc = parseDate(conclusao &amp;&amp; conclusao.value);
      if(!dtPrev &amp;&amp; dtInicio &amp;&amp; !isNaN(dias)){
        dtPrev = addDays(dtInicio, dias);
        if(previsao){ previsao.value = isoDate(dtPrev); previsao.dataset.auto = &#x27;1&#x27;; }
      }
      if(dtPrev){
        var ref = dtConc || new Date();
        ref = new Date(ref.getFullYear(), ref.getMonth(), ref.getDate());
        if(ref.getTime() &lt;= dtPrev.getTime()){ setDot(dot,&#x27;prazo-ok&#x27;); noPrazo++; }
        else { setDot(dot,&#x27;prazo-atrasado&#x27;); atrasadas++; }
      } else { setDot(dot,&#x27;prazo-pendente&#x27;); semDatas++; }
      var av = valHidden(row, &#x27;.m-status&#x27;);
      if(av === &#x27;approved&#x27;) aprovados++; else if(av === &#x27;rejected&#x27;) reprovados++; else if(av === &#x27;partial&#x27;) parciais++; else pendentes++;
      var ef = valHidden(row, &#x27;.eficaz-status&#x27;);
      if(ef === &#x27;yes&#x27;) eficazSim++; else if(ef === &#x27;no&#x27;) eficazNao++; else if(ef === &#x27;partial&#x27;) eficazParcial++; else eficazPendente++;
    });
    var pctAtraso = total ? Math.round((atrasadas/total)*100) : 0;
    var pctImpl = total ? Math.round(((aprovados + parciais*0.5)/total)*100) : 0;
    var pctEfi = total ? Math.round(((eficazSim + eficazParcial*0.5)/total)*100) : 0;
    function setText(ids, value){ ids.forEach(function(id){ var el = document.getElementById(id); if(el){ if(&#x27;value&#x27; in el) el.value = value; else el.textContent = value; } }); }
    setText([&#x27;melAprovados&#x27;,&#x27;qtdAprovados&#x27;,&#x27;aprovadosCount&#x27;], aprovados);
    setText([&#x27;melReprovados&#x27;,&#x27;qtdReprovados&#x27;,&#x27;reprovadosCount&#x27;], reprovados);
    setText([&#x27;melParciais&#x27;,&#x27;qtdParciais&#x27;,&#x27;parciaisCount&#x27;], parciais);
    setText([&#x27;melPendentes&#x27;,&#x27;qtdPendentes&#x27;,&#x27;pendentesCount&#x27;], pendentes);
    setText([&#x27;melPontuacao&#x27;,&#x27;pontuacaoMelhorias&#x27;], pctImpl + &#x27;%&#x27;);
    document.querySelectorAll(&#x27;.pro-fill.impl&#x27;).forEach(function(el){ el.style.width = pctImpl + &#x27;%&#x27;; });
    document.querySelectorAll(&#x27;.pro-fill.efi&#x27;).forEach(function(el){ el.style.width = pctEfi + &#x27;%&#x27;; });
    document.querySelectorAll(&#x27;.pro-kpi strong&#x27;).forEach(function(el){
      var label = (el.parentElement ? el.parentElement.textContent : &#x27;&#x27;).toLowerCase();
      if(label.indexOf(&#x27;implant&#x27;) &gt;= 0 || label.indexOf(&#x27;progresso&#x27;) &gt;= 0) el.textContent = pctImpl + &#x27;%&#x27;;
      if(label.indexOf(&#x27;efic&#x27;) &gt;= 0) el.textContent = pctEfi + &#x27;%&#x27;;
      if(label.indexOf(&#x27;prazo&#x27;) &gt;= 0 || label.indexOf(&#x27;atras&#x27;) &gt;= 0) el.textContent = pctAtraso + &#x27;%&#x27;;
    });
    var prazoLine = document.querySelector(&#x27;.pro-prazo&#x27;);
    if(prazoLine) prazoLine.innerHTML = &#x27;&lt;strong&gt;PRAZO&lt;/strong&gt; &#x27;+pctAtraso+&#x27;% atrasado(s) · &#x27;+noPrazo+&#x27; no prazo · &#x27;+atrasadas+&#x27; atrasada(s) · &#x27;+semDatas+&#x27; sem datas.&#x27;;
    return {total:total, aprovados:aprovados, reprovados:reprovados, parciais:parciais, pendentes:pendentes, eficacia:pctEfi, implantacao:pctImpl, atraso:pctAtraso};
  };

  document.addEventListener(&#x27;input&#x27;, function(e){
    if(e.target &amp;&amp; /^m\d+_(inicio|prazo)$/.test(e.target.id || &#x27;&#x27;)){
      var m = e.target.id.match(/^m(\d+)_(inicio|prazo)$/);
      var n = m &amp;&amp; m[1];
      var inicio = document.getElementById(&#x27;m&#x27;+n+&#x27;_inicio&#x27;);
      var prazo = document.getElementById(&#x27;m&#x27;+n+&#x27;_prazo&#x27;);
      var previsao = document.getElementById(&#x27;m&#x27;+n+&#x27;_previsao&#x27;);
      if(inicio &amp;&amp; prazo &amp;&amp; previsao){
        var d = parseDate(inicio.value);
        var dias = prazo.value !== &#x27;&#x27; ? Number(prazo.value) : NaN;
        if(d &amp;&amp; !isNaN(dias) &amp;&amp; (!previsao.value || previsao.dataset.auto === &#x27;1&#x27; || previsao.dataset.manual !== &#x27;1&#x27;)){
          previsao.value = isoDate(addDays(d,dias));
          previsao.dataset.auto = &#x27;1&#x27;; previsao.dataset.manual = &#x27;0&#x27;;
        }
      }
      calcMelhoriasPro();
    }
  });
  document.addEventListener(&#x27;change&#x27;, function(e){
    if(e.target &amp;&amp; /^m\d+_previsao$/.test(e.target.id || &#x27;&#x27;)){ e.target.dataset.manual = &#x27;1&#x27;; e.target.dataset.auto = &#x27;0&#x27;; calcMelhoriasPro(); }
    if(e.target &amp;&amp; e.target.closest &amp;&amp; e.target.closest(&#x27;.melhorias-table-pro&#x27;)) calcMelhoriasPro();
  });
  document.addEventListener(&#x27;DOMContentLoaded&#x27;, function(){ calcMelhoriasPro(); });
})();

"></iframe>

</div>
<script>
  const ACOES_PASSWORD = '3132';
  let acoesUnlocked = sessionStorage.getItem('reset_acoes_unlocked') === '1';

  function openAcoesLock() {
    const overlay = document.getElementById('acoes-lock-overlay');
    const input = document.getElementById('acoes-lock-password');
    const error = document.getElementById('acoes-lock-error');
    if (error) error.textContent = '';
    if (input) input.value = '';
    if (overlay) {
      overlay.classList.add('active');
      overlay.setAttribute('aria-hidden', 'false');
    }
    setTimeout(() => input && input.focus(), 60);
  }

  function closeAcoesLock() {
    const overlay = document.getElementById('acoes-lock-overlay');
    if (overlay) {
      overlay.classList.remove('active');
      overlay.setAttribute('aria-hidden', 'true');
    }
  }

  function confirmAcoesPassword() {
    const input = document.getElementById('acoes-lock-password');
    const error = document.getElementById('acoes-lock-error');
    if ((input && input.value) === ACOES_PASSWORD) {
      acoesUnlocked = true;
      sessionStorage.setItem('reset_acoes_unlocked', '1');
      closeAcoesLock();
      showMainPane('acoes', true);
    } else {
      if (error) error.textContent = 'Senha incorreta.';
      if (input) { input.select(); input.focus(); }
    }
  }

  document.addEventListener('keydown', function(e){
    const overlay = document.getElementById('acoes-lock-overlay');
    if (!overlay || !overlay.classList.contains('active')) return;
    if (e.key === 'Enter') confirmAcoesPassword();
    if (e.key === 'Escape') closeAcoesLock();
  });

  function showMainPane(name, authorized = false) {
    if (name === 'acoes' && !acoesUnlocked && !authorized) {
      openAcoesLock();
      return;
    }
    const isCronograma = name === 'cronograma';
    document.getElementById('pane-cronograma').classList.toggle('active', isCronograma);
    document.getElementById('pane-acoes').classList.toggle('active', !isCronograma);
    document.getElementById('btn-cronograma').classList.toggle('active', isCronograma);
    document.getElementById('btn-acoes').classList.toggle('active', !isCronograma);
    document.getElementById('acoes-subtabs-wrap').classList.toggle('active', !isCronograma);
    setTimeout(resizeFrames, 120);
  }

  let savedActionCounter = 0;
  const actionAreas = {};
  let currentAreaKey = null;
  let currentPillarKey = null;

  function getFrameDocument(frame) {
    try { return frame.contentDocument || frame.contentWindow.document; }
    catch (e) { return null; }
  }

  function showActionTab(index) {
    if (String(index) === 'create') { currentAreaKey = null; currentPillarKey = null; }
    const isCreate = String(index) === 'create';
    const activeFrame = document.querySelector('#pane-acoes iframe.reset-frame[data-action-index="' + index + '"]');
    if (!isCreate && activeFrame) {
      currentAreaKey = activeFrame.dataset.areaKey || currentAreaKey;
      currentPillarKey = activeFrame.dataset.pillarKey || currentPillarKey;
    }
    document.querySelectorAll('#acoes-subtabs-wrap .reset-subtab').forEach(tab => {
      tab.classList.toggle('active', tab.dataset.actionIndex === String(index) || (!isCreate && tab.dataset.areaKey && tab.dataset.areaKey === currentAreaKey && !tab.classList.contains('reset-pillar-tab') && !tab.classList.contains('reset-unit-tab')));
    });
    document.querySelectorAll('#pillar-subtabs-host .reset-pillar-subtabs').forEach(nav => {
      nav.classList.toggle('active', !isCreate && nav.dataset.areaKey === currentAreaKey);
    });
    document.querySelectorAll('#pillar-subtabs-host .reset-pillar-tab').forEach(tab => {
      tab.classList.toggle('active', !isCreate && tab.dataset.areaKey === currentAreaKey && tab.dataset.pillarKey === currentPillarKey);
    });
    document.querySelectorAll('#pillar-subtabs-host .reset-unit-subtabs').forEach(nav => {
      nav.classList.toggle('active', !isCreate && nav.dataset.areaKey === currentAreaKey && nav.dataset.pillarKey === currentPillarKey);
    });
    document.querySelectorAll('#pillar-subtabs-host .reset-unit-tab').forEach(tab => {
      tab.classList.toggle('active', tab.dataset.actionIndex === String(index));
    });
    document.querySelectorAll('#pane-acoes iframe.reset-frame').forEach(frame => {
      frame.classList.toggle('active-action-frame', frame.dataset.actionIndex === String(index));
    });
    setTimeout(resizeFrames, 120);
  }


  function normalizeKey(value) {
    return (value || '').toString().normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || 'sem-nome';
  }

  function activateArea(areaKey, pillarKey, unitIndex) {
    currentAreaKey = areaKey;
    const area = actionAreas[areaKey];
    if (!area) return;
    let target = unitIndex || area.firstIndex;
    let targetPillarKey = pillarKey;
    if (targetPillarKey && area.pillars && area.pillars[targetPillarKey]) {
      const pillar = area.pillars[targetPillarKey];
      target = unitIndex || pillar.firstIndex || target;
    } else if (target) {
      const frame = document.querySelector('#pane-acoes iframe.reset-frame[data-action-index="' + target + '"]');
      targetPillarKey = frame ? frame.dataset.pillarKey : null;
    }
    currentPillarKey = targetPillarKey || currentPillarKey;
    showActionTab(target);
  }


  function findActionName(doc) {
    const title = doc.getElementById('titulo-editavel');
    if (title && title.textContent && title.textContent.trim()) return title.textContent.trim();
    const preferred = doc.getElementById('acaoReset');
    if (preferred && preferred.value && preferred.value.trim()) return preferred.value.trim();
    const firstText = doc.querySelector('input:not([type="hidden"]):not([type="file"]), textarea, [contenteditable="true"]');
    if (!firstText) return '';
    return ((firstText.value !== undefined ? firstText.value : firstText.textContent) || '').trim();
  }

  function findPillarName(doc) {
    const subtitle = doc.getElementById('subtitulo-editavel');
    if (subtitle && subtitle.textContent && subtitle.textContent.trim()) return subtitle.textContent.trim();
    return '';
  }


  function findUnitName(doc) {
    const unitEditable = doc.getElementById('unidade-editavel');
    if (unitEditable && unitEditable.textContent && unitEditable.textContent.trim()) return unitEditable.textContent.trim();
    const labels = Array.from(doc.querySelectorAll('label, .lbl'));
    for (const label of labels) {
      if ((label.textContent || '').trim().toLowerCase() === 'unidade') {
        const fieldWrap = label.closest('.field') || label.parentElement;
        if (fieldWrap) {
          const field = fieldWrap.querySelector('input, select, textarea, [contenteditable="true"]');
          if (field) {
            if (field.tagName === 'SELECT') {
              const opt = field.options[field.selectedIndex];
              return ((opt && opt.text) || field.value || '').trim();
            }
            return ((field.value !== undefined ? field.value : field.textContent) || '').trim();
          }
        }
      }
    }
    return '';
  }


  function applyUnitReference(doc, unitName) {
    const value = (unitName || '').toString().trim();
    if (!doc || !value) return;
    const labels = Array.from(doc.querySelectorAll('label.lbl, .lbl'));
    for (const label of labels) {
      const labelText = (label.textContent || '').trim().toLowerCase();
      if (label.id === 'parent-unit-label') continue;
      if (label.classList && label.classList.contains('parent-title-label')) continue;
      if (labelText !== 'unidade') continue;
      const fieldWrap = label.closest('.field') || label.parentElement;
      if (!fieldWrap) continue;
      const field = fieldWrap.querySelector('select, input, textarea');
      if (!field || field.id === 'unidade-editavel') continue;
      if (field.tagName === 'SELECT') {
        let opt = Array.from(field.options).find(o => (o.text || o.value || '').trim().toLowerCase() === value.toLowerCase());
        if (!opt) {
          opt = doc.createElement('option');
          opt.value = value;
          opt.textContent = value;
          field.appendChild(opt);
        }
        field.value = opt.value;
        opt.selected = true;
        field.disabled = true;
        field.setAttribute('data-parent-unit-reference', '1');
      } else {
        field.value = value;
        field.readOnly = true;
        field.setAttribute('data-parent-unit-reference', '1');
      }
      field.style.pointerEvents = 'none';
      field.style.opacity = '0.86';
      field.style.background = 'rgba(17,31,53,.55)';
      field.style.borderColor = 'rgba(168,204,58,.35)';
      field.style.color = '#cdd9ee';
      let hint = fieldWrap.querySelector('.parent-unit-reference-hint');
      if (!hint) {
        hint = doc.createElement('div');
        hint.className = 'parent-unit-reference-hint';
        hint.style.cssText = 'margin-top:6px;color:#5a7499;font-size:11px;line-height:1.35;';
        fieldWrap.appendChild(hint);
      }
      hint.textContent = 'Unidade definida automaticamente pela subaba.';
      try { field.dispatchEvent(new Event('change', { bubbles: true })); } catch(e) {}
      return;
    }
  }

  function clearCreateActionForm() {
    const frame = document.getElementById('frame-acoes');
    const doc = getFrameDocument(frame);
    if (!doc) return;

    doc.querySelectorAll('input, textarea, select, [contenteditable="true"]').forEach(el => {
      const tag = (el.tagName || '').toLowerCase();
      if (tag === 'input') {
        const type = (el.getAttribute('type') || 'text').toLowerCase();
        if (type === 'checkbox' || type === 'radio') el.checked = false;
        else if (type !== 'button' && type !== 'submit' && type !== 'reset' && type !== 'file') el.value = '';
      } else if (tag === 'textarea') {
        el.value = '';
        el.textContent = '';
      } else if (tag === 'select') {
        el.selectedIndex = 0;
      } else if (el.isContentEditable) {
        el.innerHTML = '';
      }
      try { el.dispatchEvent(new Event('input', { bubbles: true })); } catch(e) {}
      try { el.dispatchEvent(new Event('change', { bubbles: true })); } catch(e) {}
    });
    try {
      if (doc.defaultView && typeof doc.defaultView.syncAcao === 'function') doc.defaultView.syncAcao();
      if (doc.defaultView && typeof doc.defaultView.updateAll === 'function') doc.defaultView.updateAll();
    } catch(e) {}
    resizeFrames();
  }

  function deleteSavedAction(index) {
    if (!index || index === 'create') return;
    const frame = document.querySelector('#pane-acoes iframe.reset-frame[data-action-index="' + index + '"]');
    const areaKey = frame ? frame.dataset.areaKey : '';
    const pillarKey = frame ? frame.dataset.pillarKey : '';
    const unitKey = frame ? frame.dataset.unitKey : '';
    const unitTab = document.querySelector('#pillar-subtabs-host .reset-unit-tab[data-action-index="' + index + '"]');
    if (unitTab) unitTab.remove();
    if (frame) frame.remove();

    const area = actionAreas[areaKey];
    if (area) {
      const pillar = area.pillars ? area.pillars[pillarKey] : null;
      if (pillar) {
        if (unitKey && pillar.units) delete pillar.units[unitKey];
        const remainingUnits = pillar.unitnav ? Array.from(pillar.unitnav.querySelectorAll('.reset-unit-tab')) : [];
        if (remainingUnits.length) {
          pillar.firstIndex = remainingUnits[0].dataset.actionIndex;
          area.firstIndex = area.firstIndex === index ? pillar.firstIndex : area.firstIndex;
          activateArea(areaKey, pillarKey, pillar.firstIndex);
          injectCreateActionButtons();
          resizeFrames();
          return;
        }
        if (pillar.tab) pillar.tab.remove();
        if (pillar.unitnav) pillar.unitnav.remove();
        delete area.pillars[pillarKey];
      }

      const remainingPillars = area.subnav ? Array.from(area.subnav.querySelectorAll('.reset-pillar-tab')) : [];
      if (remainingPillars.length) {
        const nextPillarKey = remainingPillars[0].dataset.pillarKey;
        const nextPillar = area.pillars[nextPillarKey];
        area.firstIndex = nextPillar ? nextPillar.firstIndex : remainingPillars[0].dataset.actionIndex;
        activateArea(areaKey, nextPillarKey, area.firstIndex);
      } else {
        if (area.tab) area.tab.remove();
        if (area.subnav) area.subnav.remove();
        delete actionAreas[areaKey];
        currentAreaKey = null;
        currentPillarKey = null;
        showActionTab('create');
      }
    } else {
      showActionTab('create');
    }
    injectCreateActionButtons();
    resizeFrames();
  }


  function serializeActionDocument(doc) {
    const cloned = doc.documentElement.cloneNode(true);
    const originalFields = doc.querySelectorAll('input, textarea, select');
    const clonedFields = cloned.querySelectorAll('input, textarea, select');

    originalFields.forEach((field, i) => {
      const clone = clonedFields[i];
      if (!clone) return;
      const tag = field.tagName.toLowerCase();
      if (tag === 'textarea') {
        clone.textContent = field.value || '';
        clone.setAttribute('value', field.value || '');
      } else if (tag === 'select') {
        Array.from(clone.options).forEach((opt, idx) => {
          if (idx === field.selectedIndex) opt.setAttribute('selected', 'selected');
          else opt.removeAttribute('selected');
        });
      } else if (tag === 'input') {
        const type = (field.getAttribute('type') || '').toLowerCase();
        if (type === 'checkbox' || type === 'radio') {
          if (field.checked) clone.setAttribute('checked', 'checked');
          else clone.removeAttribute('checked');
        } else {
          clone.setAttribute('value', field.value || '');
        }
      }
    });

    const editableOriginal = doc.querySelectorAll('[contenteditable="true"]');
    const editableCloned = cloned.querySelectorAll('[contenteditable="true"]');
    editableOriginal.forEach((el, i) => { if (editableCloned[i]) editableCloned[i].innerHTML = el.innerHTML; });

    const injected = cloned.querySelector('#parent-save-new-action-wrap');
    if (injected) injected.remove();
    const deleteInjected = cloned.querySelector('#parent-delete-action-wrap');
    if (deleteInjected) deleteInjected.remove();
    return '<!DOCTYPE html>\n' + cloned.outerHTML;
  }

  function saveNewActionFromCreateFrame() {
    const sourceFrame = document.getElementById('frame-acoes');
    const doc = getFrameDocument(sourceFrame);
    if (!doc) return;

    const areaName = findActionName(doc) || ('AÇÃO ' + (savedActionCounter + 1));
    const pillarName = findPillarName(doc) || areaName;
    const unitName = findUnitName(doc) || 'UNIDADE';
    applyUnitReference(doc, unitName);
    const areaKey = normalizeKey(areaName);
    const pillarKeyBase = normalizeKey(pillarName);
    const unitKeyBase = normalizeKey(unitName);
    savedActionCounter += 1;
    const index = 'acao-' + savedActionCounter;
    const html = serializeActionDocument(doc);

    let area = actionAreas[areaKey];
    if (!area) {
      const tab = document.createElement('button');
      tab.className = 'reset-subtab saved-action';
      tab.type = 'button';
      tab.dataset.areaKey = areaKey;
      tab.dataset.actionIndex = index;
      tab.textContent = areaName;
      tab.onclick = function() { activateArea(areaKey); };
      document.querySelector('#acoes-subtabs-wrap .reset-subtabs').appendChild(tab);

      const subnav = document.createElement('nav');
      subnav.className = 'reset-pillar-subtabs';
      subnav.dataset.areaKey = areaKey;
      subnav.setAttribute('aria-label', 'Pilares de ' + areaName);
      document.getElementById('pillar-subtabs-host').appendChild(subnav);

      area = actionAreas[areaKey] = { name: areaName, tab, subnav, firstIndex: index, pillars: {} };
    }

    let pillarKey = pillarKeyBase;
    let pillar = area.pillars[pillarKey];
    if (!pillar) {
      const pillarTab = document.createElement('button');
      pillarTab.className = 'reset-subtab reset-pillar-tab';
      pillarTab.type = 'button';
      pillarTab.dataset.areaKey = areaKey;
      pillarTab.dataset.pillarKey = pillarKey;
      pillarTab.dataset.actionIndex = index;
      pillarTab.textContent = pillarName;
      pillarTab.onclick = function() { activateArea(areaKey, pillarKey); };
      area.subnav.appendChild(pillarTab);

      const unitnav = document.createElement('nav');
      unitnav.className = 'reset-unit-subtabs';
      unitnav.dataset.areaKey = areaKey;
      unitnav.dataset.pillarKey = pillarKey;
      unitnav.setAttribute('aria-label', 'Unidades de ' + pillarName);
      document.getElementById('pillar-subtabs-host').appendChild(unitnav);

      pillar = area.pillars[pillarKey] = { name: pillarName, tab: pillarTab, unitnav, firstIndex: index, units: {} };
    }

    let unitKey = unitKeyBase;
    let suffix = 2;
    while (pillar.units[unitKey]) {
      unitKey = unitKeyBase + '-' + suffix;
      suffix += 1;
    }

    const unitTab = document.createElement('button');
    unitTab.className = 'reset-subtab reset-unit-tab';
    unitTab.type = 'button';
    unitTab.dataset.actionIndex = index;
    unitTab.dataset.areaKey = areaKey;
    unitTab.dataset.pillarKey = pillarKey;
    unitTab.dataset.unitKey = unitKey;
    unitTab.textContent = unitName;
    unitTab.onclick = function() { currentAreaKey = areaKey; currentPillarKey = pillarKey; showActionTab(index); };
    pillar.unitnav.appendChild(unitTab);
    pillar.units[unitKey] = { index, name: unitName, tab: unitTab };
    if (!pillar.firstIndex) pillar.firstIndex = index;
    if (!area.firstIndex) area.firstIndex = index;

    const frame = document.createElement('iframe');
    frame.className = 'reset-frame';
    frame.dataset.actionIndex = index;
    frame.dataset.areaKey = areaKey;
    frame.dataset.pillarKey = pillarKey;
    frame.dataset.unitKey = unitKey;

  let currentUnitKey = null;

  function normalizeAcCode(n) {
    return 'AC-' + String(n).padStart(2, '0');
  }

  function getNextActionCode(areaKey, pillarKey, unitKey) {
    const area = actionAreas[areaKey];
    const pillar = area && area.pillars ? area.pillars[pillarKey] : null;
    const unit = pillar && pillar.units ? pillar.units[unitKey] : null;
    const count = unit && unit.actions ? Object.keys(unit.actions).length : 0;
    return normalizeAcCode(count + 1);
  }

  function findFieldByLabel(doc, labelText) {
    const target = normalizeKey(labelText);
    const labels = Array.from(doc.querySelectorAll('label, .lbl'));
    for (const label of labels) {
      const txt = normalizeKey((label.textContent || '').replace('*','').trim());
      if (txt === target) {
        const wrap = label.closest('.field') || label.parentElement;
        if (wrap) return { label, wrap, field: wrap.querySelector('input:not([type="hidden"]), textarea, select, [contenteditable="true"]') };
      }
    }
    return null;
  }

  function parseActionText(value) {
    const text = (value || '').toString().trim();
    const match = text.match(/^(AC-\d+)\s+(.+)$/i);
    return { code: match ? match[1].toUpperCase() : '', desc: match ? match[2] : text };
  }

  function transformActionField(doc, code) {
    if (!doc) return null;
    const found = findFieldByLabel(doc, 'Ação');
    if (!found || !found.wrap || !found.field) return null;
    let original = found.wrap.querySelector('[data-parent-original-action-field="1"]');
    if (!original) original = found.field;
    let split = found.wrap.querySelector('.parent-action-split-field');
    const parsed = parseActionText(original.value !== undefined ? original.value : original.textContent);
    const actionCode = (code || parsed.code || 'AC-01').toUpperCase();
    if (!split) {
      split = doc.createElement('div');
      split.className = 'parent-action-split-field';
      split.innerHTML = '<input class="parent-action-code" type="text" readonly><input class="parent-action-desc" type="text" placeholder="Descrição da ação">';
      original.setAttribute('data-parent-original-action-field', '1');
      original.style.display = 'none';
      original.parentNode.insertBefore(split, original);
    }
    const codeInput = split.querySelector('.parent-action-code');
    const descInput = split.querySelector('.parent-action-desc');
    codeInput.value = actionCode;
    const parsedDescClean = (parsed.desc || '').trim();
    const isDuplicateCodeDesc = /^AC-\d+$/i.test(parsedDescClean) || parsedDescClean.toUpperCase() === actionCode;
    if (!descInput.value && parsedDescClean && !isDuplicateCodeDesc) descInput.value = parsedDescClean;
    const sync = () => {
      const combined = (codeInput.value.trim() + (descInput.value.trim() ? ' ' + descInput.value.trim() : '')).trim();
      if (original.value !== undefined) original.value = combined;
      else original.textContent = combined;
      try { original.dispatchEvent(new Event('input', { bubbles:true })); } catch(e) {}
      try { original.dispatchEvent(new Event('change', { bubbles:true })); } catch(e) {}
    };
    if (!descInput.dataset.parentActionSyncBound) {
      descInput.addEventListener('input', sync);
      descInput.addEventListener('change', sync);
      descInput.dataset.parentActionSyncBound = '1';
    }
    sync();
    return { original, split, codeInput, descInput, sync };
  }

    const split = transformActionField(doc, actionCode);

(function(){

    const t = norm(value);

    if (t.includes('pendenc')) return 'status-compendencias';
    if (t.includes('conclu')) return 'status-concluida';
    if (t.includes('andamento') || t.includes('preenchimento')) return 'status-emandamento';

    else if (currentNorm.includes('conclu')) target = 'Concluída';

<script>
/* v23 — Subabas contextuais/progressivas: Área -> Pilar -> Unidade -> AC. Não exibe toda a árvore fixa. */
(function(){
  const BOLIX_PURPLE = '#503294';
  function qsa(sel){ return Array.from(document.querySelectorAll(sel)); }
  function hideAllActionFrames(){
    qsa('#pane-acoes iframe.reset-frame').forEach(frame => frame.classList.remove('active-action-frame'));
  }
  function paintContextTabs(selectedIndex){
    const isCreate = String(selectedIndex || '') === 'create';
    qsa('#acoes-subtabs-wrap .reset-subtab').forEach(tab => {
      const isArea = tab.dataset.areaKey && !tab.classList.contains('reset-pillar-tab') && !tab.classList.contains('reset-unit-tab') && !tab.classList.contains('reset-action-tab');
      tab.classList.toggle('active', (isCreate && tab.dataset.actionIndex === 'create') || (!isCreate && isArea && tab.dataset.areaKey === window.currentAreaKey));
    });
    qsa('#pillar-subtabs-host .reset-pillar-subtabs').forEach(nav => {
      nav.classList.toggle('active', !isCreate && !!window.currentAreaKey && nav.dataset.areaKey === window.currentAreaKey);
    });
    qsa('#pillar-subtabs-host .reset-pillar-tab').forEach(tab => {
      tab.classList.toggle('active', !isCreate && !!window.currentPillarKey && tab.dataset.areaKey === window.currentAreaKey && tab.dataset.pillarKey === window.currentPillarKey);
    });
    qsa('#pillar-subtabs-host .reset-unit-subtabs').forEach(nav => {
      nav.classList.toggle('active', !isCreate && !!window.currentPillarKey && nav.dataset.areaKey === window.currentAreaKey && nav.dataset.pillarKey === window.currentPillarKey);
    });
    qsa('#pillar-subtabs-host .reset-unit-tab').forEach(tab => {
      tab.classList.toggle('active', !isCreate && !!window.currentUnitKey && tab.dataset.areaKey === window.currentAreaKey && tab.dataset.pillarKey === window.currentPillarKey && tab.dataset.unitKey === window.currentUnitKey);
    });
    qsa('#pillar-subtabs-host .reset-action-subtabs').forEach(nav => {
      nav.classList.toggle('active', !isCreate && !!window.currentUnitKey && nav.dataset.areaKey === window.currentAreaKey && nav.dataset.pillarKey === window.currentPillarKey && nav.dataset.unitKey === window.currentUnitKey);
    });
    qsa('#pillar-subtabs-host .reset-action-tab').forEach(tab => {
      tab.classList.toggle('active', !isCreate && !!selectedIndex && tab.dataset.actionIndex === String(selectedIndex));
    });
  }

  window.showActionTab = function(index) {
    const isCreate = String(index) === 'create';
    if (isCreate) {
      window.currentAreaKey = null;
      window.currentPillarKey = null;
      window.currentUnitKey = null;
      paintContextTabs('create');
      qsa('#pane-acoes iframe.reset-frame').forEach(frame => frame.classList.toggle('active-action-frame', frame.dataset.actionIndex === 'create'));
      setTimeout(window.resizeFrames || function(){}, 120);
      return;
    }
    const activeFrame = document.querySelector('#pane-acoes iframe.reset-frame[data-action-index="' + index + '"]');
    if (activeFrame) {
      window.currentAreaKey = activeFrame.dataset.areaKey || window.currentAreaKey;
      window.currentPillarKey = activeFrame.dataset.pillarKey || window.currentPillarKey;
      window.currentUnitKey = activeFrame.dataset.unitKey || window.currentUnitKey;
    }
    paintContextTabs(index);
    qsa('#pane-acoes iframe.reset-frame').forEach(frame => frame.classList.toggle('active-action-frame', frame.dataset.actionIndex === String(index)));
    setTimeout(window.resizeFrames || function(){}, 120);
  };

  window.activateArea = function(areaKey, pillarKey, unitKey, actionIndex) {
    window.currentAreaKey = areaKey || null;
    window.currentPillarKey = pillarKey || null;
    window.currentUnitKey = unitKey || null;
    if (actionIndex) {
      window.showActionTab(actionIndex);
      return;
    }
    hideAllActionFrames();
    paintContextTabs(null);
    setTimeout(window.resizeFrames || function(){}, 120);
  };

  function relinkTabs(){
    qsa('#acoes-subtabs-wrap .reset-subtab.saved-action').forEach(tab => {
      if (!tab.dataset.contextBound) {
        tab.addEventListener('click', function(e){
          e.preventDefault();
          e.stopPropagation();
          window.activateArea(tab.dataset.areaKey);
        }, true);
        tab.dataset.contextBound = '1';
      }
    });
    qsa('#pillar-subtabs-host .reset-pillar-tab').forEach(tab => {
      if (!tab.dataset.contextBound) {
        tab.addEventListener('click', function(e){
          e.preventDefault();
          e.stopPropagation();
          window.activateArea(tab.dataset.areaKey, tab.dataset.pillarKey);
        }, true);
        tab.dataset.contextBound = '1';
      }
    });
    qsa('#pillar-subtabs-host .reset-unit-tab').forEach(tab => {
      if (!tab.dataset.contextBound) {
        tab.addEventListener('click', function(e){
          e.preventDefault();
          e.stopPropagation();
          window.activateArea(tab.dataset.areaKey, tab.dataset.pillarKey, tab.dataset.unitKey);
        }, true);
        tab.dataset.contextBound = '1';
      }
    });
    qsa('#pillar-subtabs-host .reset-action-tab').forEach(tab => {
      if (!tab.dataset.contextBound) {
        tab.addEventListener('click', function(e){
          e.preventDefault();
          e.stopPropagation();
          window.currentAreaKey = tab.dataset.areaKey;
          window.currentPillarKey = tab.dataset.pillarKey;
          window.currentUnitKey = tab.dataset.unitKey;
          window.showActionTab(tab.dataset.actionIndex);
        }, true);
        tab.dataset.contextBound = '1';
      }
    });
  }

  function injectContextCSS(){
    if (document.getElementById('v23-context-tabs-style')) return;
    const style = document.createElement('style');
    style.id = 'v23-context-tabs-style';
    style.textContent = `
      /* Roxo Bolix apenas nas abas principais de Área. Subabas preservadas. */
      #acoes-subtabs-wrap .reset-subtabs > .reset-subtab.saved-action{
        color:${BOLIX_PURPLE} !important;
        font-weight:900 !important;
        text-shadow:none !important;
      }
      #pillar-subtabs-host .reset-pillar-tab{
        color:#cdd9ee !important;
        font-weight:800 !important;
        text-shadow:none !important;
      }
      #pillar-subtabs-host .reset-pillar-tab.active{
        color:var(--brand) !important;
      }
      #pillar-subtabs-host .reset-unit-tab{
        color:#ffffff !important;
        font-weight:800 !important;
        text-shadow:none !important;
      }
      #pillar-subtabs-host .reset-action-tab{
        color:#ffffff !important;
        font-weight:800 !important;
        text-shadow:none !important;
      }
      /* Evita que a árvore fique toda aberta visualmente. */
      #pillar-subtabs-host .reset-pillar-subtabs:not(.active),
      #pillar-subtabs-host .reset-unit-subtabs:not(.active),
      #pillar-subtabs-host .reset-action-subtabs:not(.active){
        display:none !important;
      }
      #pillar-subtabs-host .reset-pillar-subtabs.active,
      #pillar-subtabs-host .reset-unit-subtabs.active,
      #pillar-subtabs-host .reset-action-subtabs.active{
        display:flex !important;
      }
    `;
    document.head.appendChild(style);
  }

  function boot(){
    injectContextCSS();
    relinkTabs();
    // Em AÇÕES, começa no formulário limpo; as subabas aparecem progressivamente quando o usuário clica na área.
    if (document.getElementById('pane-acoes') && document.getElementById('pane-acoes').classList.contains('active')) {
      window.showActionTab('create');
    } else {
      paintContextTabs('create');
      hideAllActionFrames();
    }
  }
  window.addEventListener('load', function(){ setTimeout(boot, 100); setTimeout(boot, 800); setTimeout(boot, 1800); });
  document.addEventListener('click', function(){ setTimeout(function(){ injectContextCSS(); relinkTabs(); }, 60); }, true);
  document.addEventListener('DOMContentLoaded', boot);
})();
</script>

  function paint(index){

    qsa('#acoes-subtabs-wrap .reset-subtab').forEach(tab=>{
      const isArea = tab.dataset.areaKey && !tab.classList.contains('reset-pillar-tab') && !tab.classList.contains('reset-unit-tab') && !tab.classList.contains('reset-action-tab');

      tab.classList.toggle('active', !create && !!window.currentPillarKey && tab.dataset.areaKey === window.currentAreaKey && tab.dataset.pillarKey === window.currentPillarKey);
    });
    qsa('#pillar-subtabs-host .reset-unit-subtabs').forEach(nav=>{
      nav.classList.toggle('active', !create && !!window.currentPillarKey && nav.dataset.areaKey === window.currentAreaKey && nav.dataset.pillarKey === window.currentPillarKey);
    });
    qsa('#pillar-subtabs-host .reset-unit-tab').forEach(tab=>{

    });
    qsa('#pillar-subtabs-host .reset-action-subtabs').forEach(nav=>{
      nav.classList.toggle('active', !create && !!window.currentUnitKey && nav.dataset.areaKey === window.currentAreaKey && nav.dataset.pillarKey === window.currentPillarKey && nav.dataset.unitKey === window.currentUnitKey);
    });
    qsa('#pillar-subtabs-host .reset-action-tab').forEach(tab=>{
      tab.classList.toggle('active', !create && !!index && tab.dataset.actionIndex === String(index));
    });
    qsa('#pane-acoes iframe.reset-frame').forEach(frame=>{
      frame.classList.toggle('active-action-frame', frame.dataset.actionIndex === String(index));
    });
  }
  window.showActionTab = function(index){
    if (isCreateIndex(index)) {
      window.currentAreaKey = null; window.currentPillarKey = null; window.currentUnitKey = null;
      paint('create');
      setTimeout(window.resizeFrames || function(){},120);
      return;
    }
    const frame = getFrameByIndex(index);
    if (frame) {
      window.currentAreaKey = frame.dataset.areaKey || window.currentAreaKey;
      window.currentPillarKey = frame.dataset.pillarKey || window.currentPillarKey;
      window.currentUnitKey = frame.dataset.unitKey || window.currentUnitKey;
    }
    paint(index);
    setTimeout(window.resizeFrames || function(){},120);
  };
  window.activateArea = function(areaKey, pillarKey, unitKey, actionIndex){
    window.currentAreaKey = areaKey || null;
    const areas = window.actionAreas || {};
    const area = areas[window.currentAreaKey];
    if (!area) { paint('create'); return; }
    window.currentPillarKey = pillarKey || null;
    window.currentUnitKey = unitKey || null;
    let index = actionIndex || null;
    if (!window.currentPillarKey && area.pillars) {
      // Ao clicar na área, mostra só os pilares; não força abrir unidade/ação.
      paint(null); setTimeout(window.resizeFrames || function(){},120); return;
    }
    const pillar = area.pillars && area.pillars[window.currentPillarKey];
    if (pillar && !window.currentUnitKey) {
      paint(null); setTimeout(window.resizeFrames || function(){},120); return;
    }
    const unit = pillar && pillar.units && pillar.units[window.currentUnitKey];
    if (unit && !index) {
      paint(null); setTimeout(window.resizeFrames || function(){},120); return;
    }
    if (index) window.showActionTab(index); else paint(null);
  };
  function bind(){
    qsa('#acoes-subtabs-wrap .reset-subtab.saved-action').forEach(tab=>{
      tab.onclick = function(e){ if(e){e.preventDefault(); e.stopPropagation();} window.activateArea(tab.dataset.areaKey); return false; };

})();

<script id="v25-functional-context-tabs-fix">
/* v25 — Corrige clique das abas principais e abertura progressiva das subabas sem alterar layout/lógica existente. */
(function(){
  function qsa(sel){ return Array.from(document.querySelectorAll(sel)); }
  function getFrame(index){ return document.querySelector('#pane-acoes iframe.reset-frame[data-action-index="' + index + '"]'); }
  function resize(){ try { (window.resizeFrames || function(){})(); } catch(e){} }
  function isAreaTab(tab){
    return tab && tab.classList.contains('saved-action') && tab.dataset.areaKey && !tab.classList.contains('reset-pillar-tab') && !tab.classList.contains('reset-unit-tab') && !tab.classList.contains('reset-action-tab');
  }
  function setActiveTop(areaKey, create){
    qsa('#acoes-subtabs-wrap .reset-subtabs > .reset-subtab').forEach(tab => {
      const active = (create && tab.dataset.actionIndex === 'create') || (!create && isAreaTab(tab) && tab.dataset.areaKey === areaKey);
      tab.classList.toggle('active', !!active);
    });
  }
  function setVisible(areaKey, pillarKey, unitKey, actionIndex){
    const create = areaKey === null || areaKey === undefined || areaKey === 'create';
    setActiveTop(areaKey, create);

    qsa('#pillar-subtabs-host .reset-pillar-subtabs').forEach(nav => {
      nav.classList.toggle('active', !create && nav.dataset.areaKey === areaKey);
    });
    qsa('#pillar-subtabs-host .reset-pillar-tab').forEach(tab => {
      tab.classList.toggle('active', !create && !!pillarKey && tab.dataset.areaKey === areaKey && tab.dataset.pillarKey === pillarKey);
    });

    qsa('#pillar-subtabs-host .reset-unit-subtabs').forEach(nav => {
      nav.classList.toggle('active', !create && !!pillarKey && nav.dataset.areaKey === areaKey && nav.dataset.pillarKey === pillarKey);
    });
    qsa('#pillar-subtabs-host .reset-unit-tab').forEach(tab => {
      tab.classList.toggle('active', !create && !!unitKey && tab.dataset.areaKey === areaKey && tab.dataset.pillarKey === pillarKey && tab.dataset.unitKey === unitKey);
    });

    qsa('#pillar-subtabs-host .reset-action-subtabs').forEach(nav => {
      nav.classList.toggle('active', !create && !!unitKey && nav.dataset.areaKey === areaKey && nav.dataset.pillarKey === pillarKey && nav.dataset.unitKey === unitKey);
    });
    qsa('#pillar-subtabs-host .reset-action-tab').forEach(tab => {
      tab.classList.toggle('active', !create && !!actionIndex && tab.dataset.actionIndex === String(actionIndex));
    });

    qsa('#pane-acoes iframe.reset-frame').forEach(frame => {
      frame.classList.toggle('active-action-frame', !create && !!actionIndex && frame.dataset.actionIndex === String(actionIndex));
    });
    resize();
  }

  window.showActionTab = function(index){
    if (String(index) === 'create') {
      window.currentAreaKey = null;
      window.currentPillarKey = null;
      window.currentUnitKey = null;
      setVisible('create', null, null, null);
      qsa('#pane-acoes iframe.reset-frame').forEach(frame => frame.classList.toggle('active-action-frame', frame.dataset.actionIndex === 'create'));
      resize();
      return;
    }
    const frame = getFrame(index);
    if (frame) {
      window.currentAreaKey = frame.dataset.areaKey || window.currentAreaKey;
      window.currentPillarKey = frame.dataset.pillarKey || window.currentPillarKey;
      window.currentUnitKey = frame.dataset.unitKey || window.currentUnitKey;
    }
    setVisible(window.currentAreaKey, window.currentPillarKey, window.currentUnitKey, index);
  };

  window.activateArea = function(areaKey, pillarKey, unitKey, actionIndex){
    window.currentAreaKey = areaKey || null;
    window.currentPillarKey = pillarKey || null;
    window.currentUnitKey = unitKey || null;
    if (actionIndex) {
      window.showActionTab(actionIndex);
      return;
    }
    setVisible(window.currentAreaKey, window.currentPillarKey, window.currentUnitKey, null);
  };

  function bindContextTabs(){
    qsa('#acoes-subtabs-wrap .reset-subtabs > .reset-subtab.saved-action').forEach(tab => {
      tab.onclick = function(e){
        if (e) { e.preventDefault(); e.stopPropagation(); }
        window.activateArea(tab.dataset.areaKey);
        return false;
      };
    });
    qsa('#pillar-subtabs-host .reset-pillar-tab').forEach(tab => {
      tab.onclick = function(e){
        if (e) { e.preventDefault(); e.stopPropagation(); }
        window.activateArea(tab.dataset.areaKey, tab.dataset.pillarKey);
        return false;
      };
    });
    qsa('#pillar-subtabs-host .reset-unit-tab').forEach(tab => {
      tab.onclick = function(e){
        if (e) { e.preventDefault(); e.stopPropagation(); }
        window.activateArea(tab.dataset.areaKey, tab.dataset.pillarKey, tab.dataset.unitKey);
        return false;
      };
    });
    qsa('#pillar-subtabs-host .reset-action-tab').forEach(tab => {
      tab.onclick = function(e){
        if (e) { e.preventDefault(); e.stopPropagation(); }
        window.currentAreaKey = tab.dataset.areaKey;
        window.currentPillarKey = tab.dataset.pillarKey;
        window.currentUnitKey = tab.dataset.unitKey;
        window.showActionTab(tab.dataset.actionIndex);
        return false;
      };
    });
  }

  function boot(){
    bindContextTabs();

<script id="parent-v38-update-action-real">
/* v38 — ATUALIZAR AÇÃO real: preserva EXCLUIR, não altera layout, sincroniza correções/novas melhorias da AÇÃO para o CRONOGRAMA. */
(function(){
  function getDoc(frame){
    try { return frame && (frame.contentDocument || (frame.contentWindow && frame.contentWindow.document)); }
    catch(e){ return null; }
  }
  function safe(v){ return (v == null ? '' : String(v)).trim(); }
  function norm(v){ return safe(v).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'') || 'sem-nome'; }
  function readText(doc, sel){
    var el = doc && doc.querySelector(sel);
    if (!el) return '';
    return safe(el.value !== undefined ? el.value : el.textContent);
  }
  function parseAc(raw){
    raw = safe(raw);
    var m = raw.match(/^(AC-\d+)\s*[—-]?\s*(.*)$/i);
    return m ? { code: m[1].toUpperCase(), desc: safe(m[2]) } : { code:'', desc:raw };
  }
  function collectCurrentActionPayload(frame){
    var doc = getDoc(frame);
    if (!doc) return null;

    var code = safe(frame.dataset.actionCode || readText(doc, '.parent-action-code'));
    var desc = readText(doc, '.parent-action-desc');
    if (!code || !desc) {
      var parsed = parseAc(readText(doc, '[data-parent-original-action-field="1"]') || readText(doc, '#acaoReset'));
      code = code || parsed.code;
      desc = desc || parsed.desc;
    }
    code = (code || 'AC-01').toUpperCase();
    desc = desc || 'Nova ação';

    var area = readText(doc, '#titulo-editavel') || frame.dataset.areaName || frame.dataset.areaKey || 'SEM ÁREA';
    var pillar = readText(doc, '#subtitulo-editavel') || frame.dataset.pillarName || frame.dataset.pillarKey || 'SEM PILAR';
    var unidade = readText(doc, '#unidade-editavel') || frame.dataset.unitName || frame.dataset.unitKey || 'SEM UNIDADE';

    var status = '';
    try {
      var labels = Array.from(doc.querySelectorAll('label, .lbl')).filter(function(l){
        var t = safe(l.textContent).replace('*','').toLowerCase();
        return t === 'status' || t === 'status geral';
      });
      if (labels.length) {
        var wrap = labels[0].closest('.field') || labels[0].parentElement;
        var f = wrap && wrap.querySelector('select, input');
        if (f) status = safe(f.value || (f.options && f.options[f.selectedIndex] && f.options[f.selectedIndex].text));
      }
    } catch(e) {}

    var melhorias = [];
    doc.querySelectorAll('tr.melhoria-item').forEach(function(row, idx){
      var idm = safe(row.children && row.children[0] ? row.children[0].textContent : '') || ('M' + String(idx + 1).padStart(2,'0'));
      idm = idm.toUpperCase();
      var descEl = row.querySelector('.melhoria-entrega-input, textarea[id$="_desc"], textarea');
      var mdesc = descEl ? safe(descEl.value) : '';
      if (!mdesc) return;
      melhorias.push({ idm:idm, desc:mdesc });
    });

    return { area:area, pillar:pillar, pilar:pillar, unidade:unidade, idac:code, titulo:desc, status:status || 'Não iniciada', melhorias:melhorias };
  }

  function ensureCronUpdateBridge(){
    var frame = document.getElementById('frame-cronograma');
    var doc = getDoc(frame);
    if (!doc || doc.getElementById('parent-cron-update-bridge-v38')) return;
    var script = doc.createElement('script');
    script.id = 'parent-cron-update-bridge-v38';
    script.textContent = `
      (function(){
        function _safe(v){ return (v == null ? '' : String(v)).trim(); }
        function _norm(v){ return _safe(v).normalize('NFD').replace(/[\\u0300-\\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'') || 'sem-nome'; }
        function _acaoKey(unidade, idac){ return (unidade + '-' + idac).replace(/[^a-zA-Z0-9_-]/g, '-'); }
        function _ensurePanel(key){
          var panel = document.getElementById(key);
          if (panel) return panel;
          var section = document.getElementById('section-unidades');
          if (!section) return null;
          panel = document.createElement('div');
          panel.id = key;
          panel.className = 'panel hidden';
          panel.innerHTML = '<h2 id="' + key + '-title"></h2><p id="' + key + '-info"></p><div id="' + key + '-actions" class="action-list"></div>';
          section.appendChild(panel);
          return panel;
        }
        function _ensureUnit(unidade){
          unidade = _safe(unidade) || 'SEM UNIDADE';
          if (!window.UNITS_DATA) window.UNITS_DATA = {};
          if (!UNITS_DATA[unidade]) UNITS_DATA[unidade] = [];
          if (!window.unitMap) window.unitMap = {};
          if (!unitMap[unidade]) unitMap[unidade] = { key:_norm(unidade), cor:'#a8cc3a' };
          _ensurePanel(unitMap[unidade].key);
          return unidade;
        }
        var _old = window.parentAddOrUpdateActionFromActions;
        window.parentAddOrUpdateActionFromActions = function(payload){
          payload = payload || {};
          var result = null;
          try { if (typeof _old === 'function') result = _old(payload); } catch(e) {}

          var unidade = _ensureUnit(payload.unidade || (result && result.unidade));
          var idac = _safe(payload.idac || 'AC-01').toUpperCase();
          var actions = UNITS_DATA[unidade] || (UNITS_DATA[unidade] = []);
          var action = actions.find(function(a){ return String(a.idac || '').toUpperCase() === idac; });
          if (!action) {
            action = { id:_norm(idac), idac:idac, titulo:'Nova ação', nome:idac + ' — Nova ação', area:'', pillar:'', inicio:'', previsao:'', prazo:'', meses:'', status:'Não iniciada', melhorias:[] };
            actions.push(action);
          }

          var title = _safe(payload.titulo || action.titulo || action.nome || 'Nova ação').replace(/^AC-\\d+\\s*[—-]?\\s*/i,'');
          action.idac = idac;
          action.titulo = title;
          action.nome = idac + ' — ' + title;
          action.area = _safe(payload.area || action.area || '');
          action.pillar = _safe(payload.pillar || payload.pilar || action.pillar || '');
          action.status = _safe(payload.status || action.status || 'Não iniciada');
          action.inicio = action.inicio || '';
          action.previsao = action.previsao || '';
          action.prazo = action.prazo || '';
          action.meses = action.meses || '';
          action.melhorias = Array.isArray(action.melhorias) ? action.melhorias : [];

          (payload.melhorias || []).forEach(function(m, idx){
            var idm = _safe(m.idm || ('M' + String(idx + 1).padStart(2,'0'))).toUpperCase();
            var desc = _safe(m.desc || m.descricao || '');
            if (!desc) return;
            var existing = action.melhorias.find(function(x){ return String(x.idm || '').toUpperCase() === idm; });
            if (!existing) {
              action.melhorias.push({ idm:idm, desc:desc, inicio:'', prazo:'', meses:'', previsao:'', conclusao:'', status:'' });
            } else {
              existing.desc = desc;
              existing.inicio = existing.inicio || '';
              existing.prazo = existing.prazo || '';
              existing.meses = existing.meses || '';
              existing.previsao = existing.previsao || '';
              existing.conclusao = existing.conclusao || '';
              existing.status = existing.status || '';
            }
          });
          action.qtd_melhorias = action.melhorias.length;

          try { if (typeof atualizarTelaCompleta === 'function') atualizarTelaCompleta(); } catch(e) {}
          try { if (typeof renderUnitButtons === 'function') renderUnitButtons(); } catch(e) {}
          try { if (typeof showUnit === 'function') showUnit(unitMap[unidade].key, unidade); } catch(e) {}
          try { if (typeof atualizarResumoGeral === 'function') atualizarResumoGeral(); } catch(e) {}
          try { if (typeof atualizarTodasStats === 'function') atualizarTodasStats(); } catch(e) {}
          try { if (typeof atualizarTodosProgressos === 'function') atualizarTodosProgressos(); } catch(e) {}
          try { if (typeof renderCalendar === 'function') renderCalendar(); } catch(e) {}

          return result || { unidade:unidade, acaoId:_acaoKey(unidade, idac), actionKey:_acaoKey(unidade, idac) };
        };
      })();
    `;
    doc.body.appendChild(script);
  }

  function pushCurrentActionToCron(frame){

<script id="parent-v55-sync-status-cronograma-acoes">
/* v55 — Sincroniza o STATUS principal da ação: CRONOGRAMA → AÇÕES.
   Ajuste isolado: não altera layout, dados existentes, status das melhorias ou demais lógicas. */
(function(){
  function getDoc(frame){
    try { return frame && (frame.contentDocument || (frame.contentWindow && frame.contentWindow.document)); }
    catch(e){ return null; }
  }
  function safe(v){ return (v == null ? '' : String(v)).trim(); }
  function norm(v){
    return safe(v).normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
  }
  function parseAC(text){
    var m = safe(text).match(/\b(AC-\d+)\b/i);
    return m ? m[1].toUpperCase() : '';
  }
  function readFieldValue(el){
    if (!el) return '';
    if (el.tagName === 'SELECT') {
      var opt = el.options[el.selectedIndex];
      return safe((opt && (opt.textContent || opt.value)) || el.value);
    }
    return safe(typeof el.value !== 'undefined' ? el.value : el.textContent);
  }
  function setSelectByTextOrValue(sel, value){
    if (!sel) return false;
    var target = norm(value);
    var found = null;
    Array.from(sel.options || []).forEach(function(opt){
      var optText = norm(opt.textContent || opt.value);
      var optVal = norm(opt.value);
      if (!found && (optText === target || optVal === target)) found = opt;
    });
    if (!found && value) {
      found = sel.ownerDocument.createElement('option');
      found.value = value;
      found.textContent = value;
      sel.appendChild(found);
    }
    if (found) {
      sel.value = found.value;
      found.selected = true;
      try { sel.dispatchEvent(new Event('input', { bubbles:true })); } catch(e) {}
      try { sel.dispatchEvent(new Event('change', { bubbles:true })); } catch(e) {}
      return true;
    }
    return false;
  }
  function findMainStatusField(doc){
    if (!doc) return null;
    var labels = Array.from(doc.querySelectorAll('label, .lbl'));
    // Campo STATUS principal da ação. Não usar STATUS GERAL.
    for (var i=0; i<labels.length; i++) {
      var txt = norm((labels[i].textContent || '').replace('*',''));
      if (txt === 'status') {
        var wrap = labels[i].closest('.field') || labels[i].parentElement;
        var field = wrap && wrap.querySelector('select, input');
        if (field) return field;
      }
    }
    return null;
  }
  function frameMatchesAction(frame, unidade, idac){
    if (!frame || frame.id === 'frame-acoes') return false;
    var fUnit = safe(frame.dataset.unitName || frame.dataset.unidade || '');
    var fAc = safe(frame.dataset.actionCode || frame.dataset.idac || '').toUpperCase();
    if (fAc && fAc === idac && (!unidade || !fUnit || norm(fUnit) === norm(unidade))) return true;

    var doc = getDoc(frame);

    var codeText = readFieldValue(doc.querySelector('.parent-action-code')) || safe(frame.dataset.actionCode);

      var doc = getDoc(frame);

      if (!statusField) return;
      if (statusField.tagName === 'SELECT') setSelectByTextOrValue(statusField, status);
      else {
        statusField.value = status;
        try { statusField.dispatchEvent(new Event('input', { bubbles:true })); } catch(e) {}
        try { statusField.dispatchEvent(new Event('change', { bubbles:true })); } catch(e) {}

  }
  function getCronStatusContext(sel){
    var doc = sel.ownerDocument;

    if (!card) return null;
    var title = safe((card.querySelector('.action-title-text') || card.querySelector('.action-title') || {}).textContent);
    var idac = parseAC(title) || parseAC(sel.getAttribute('data-acaoid') || '');

<script id="v74-change-marker-script">
(function(){
  const STORAGE_KEY = 'resetChangeMarkersV74';
  const FIELD_SELECTOR = [
    'select.status-select',
    'select.action-status-select',
    'select.obs-status-select',
    'select.oper-priority-select',
    'select[data-priority]',
    'select',
    'input[type="date"]',
    'input[type="text"]',
    'textarea'
  ].join(',');

  function readStore(){
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}') || {}; } catch(e){ return {}; }
  }
  function writeStore(store){
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(store)); } catch(e){}
  }
  function normText(v){ return String(v || '').trim().replace(/\s+/g,' ').slice(0,120); }
  function fieldKey(doc, el){
    const frameId = doc.defaultView && doc.defaultView.frameElement ? doc.defaultView.frameElement.id || 'frame' : 'main';
    const id = el.id || el.name || el.getAttribute('data-key') || '';
    const tr = el.closest && el.closest('tr');
    const trInfo = tr ? Array.from(tr.children).slice(0,4).map(td=>normText(td.textContent)).join('|') : '';
    const label = (el.closest('label') && normText(el.closest('label').textContent)) || '';
    const cellIndex = el.closest('td') && el.closest('tr') ? Array.from(el.closest('tr').children).indexOf(el.closest('td')) : '';
    return [frameId, id, label, trInfo, cellIndex, el.tagName, el.type || ''].join('::');
  }
  function isEligible(el){
    if (!el || el.dataset.resetMarkerIgnore === '1') return false;
    if (el.type === 'hidden' || el.type === 'file' || el.type === 'checkbox' || el.type === 'radio') return false;
    if (el.closest('.acoes-lock-overlay')) return false;
    if (el.closest('.reset-main-tabs-wrap')) return false;
    if (el.closest('.reset-subtabs-wrap')) return false;
    if (el.offsetParent === null && !el.closest('iframe')) return false;
    return true;
  }
  function ensureWrapped(doc, el){
    if (!el.parentNode) return null;
    if (el.parentElement && el.parentElement.classList.contains('reset-change-host')) return el.parentElement;
    const tag = el.tagName;
    // Não envolver textareas grandes para evitar mexer no layout; coloca marcador depois.
    if (tag === 'TEXTAREA') return el.parentElement;
    const host = doc.createElement('span');
    host.className = 'reset-change-host';
    const width = el.style.width || '';
    if (width) host.style.width = width;
    el.parentNode.insertBefore(host, el);
    host.appendChild(el);
    return host;
  }
  function addMarker(doc, el){
    if (!isEligible(el) || el.dataset.resetMarkerReady === '1') return;
    el.dataset.resetMarkerReady = '1';
    const key = fieldKey(doc, el);
    el.dataset.resetMarkerKey = key;
    const store = readStore();
    const state = store[key];
    const host = ensureWrapped(doc, el) || el.parentElement;
    if (!host) return;
    let marker = host.querySelector(':scope > .reset-change-marker[data-for="'+CSS.escape(key)+'"]');
    if (!marker) {
      marker = doc.createElement('span');
      marker.className = 'reset-change-marker';
      marker.setAttribute('data-for', key);
      marker.title = 'Alterado: clique para marcar como visualizado; clique novamente para limpar.';
      marker.addEventListener('click', function(ev){
        ev.preventDefault(); ev.stopPropagation();
        const st = readStore();
        const current = marker.getAttribute('data-state') || st[key] || '';
        let next = '';
        if (current === 'changed') next = 'seen';
        else if (current === 'seen') next = '';
        else next = 'changed';
        if (next) st[key] = next; else delete st[key];
        writeStore(st);
        renderMarker(marker, next);
      });
      host.appendChild(marker);
    }
    renderMarker(marker, state || '');
    const setChanged = function(){
      const st = readStore();
      st[key] = 'changed';
      writeStore(st);
      renderMarker(marker, 'changed');
    };
    el.addEventListener('change', setChanged, true);
    if (el.tagName === 'TEXTAREA' || (el.tagName === 'INPUT' && el.type !== 'date')) {
      el.addEventListener('input', debounce(setChanged, 700), true);
    }
  }
  function renderMarker(marker, state){
    marker.setAttribute('data-state', state || '');
    marker.style.display = state ? 'inline-flex' : 'none';
  }
  function debounce(fn, wait){
    let t; return function(){ clearTimeout(t); t=setTimeout(fn, wait); };
  }
  function instrumentDoc(doc){
    if (!doc || !doc.body) return;
    if (!doc.getElementById('v74-change-marker-style-clone')) {
      const style = doc.createElement('style');
      style.id = 'v74-change-marker-style-clone';
      style.textContent = document.getElementById('v74-change-marker-style').textContent;
      doc.head && doc.head.appendChild(style);
    }
    doc.querySelectorAll(FIELD_SELECTOR).forEach(el => addMarker(doc, el));
    if (!doc.__resetMarkerObserverV74) {
      doc.__resetMarkerObserverV74 = new MutationObserver(debounce(()=>{
        doc.querySelectorAll(FIELD_SELECTOR).forEach(el => addMarker(doc, el));
      }, 120));
      doc.__resetMarkerObserverV74.observe(doc.body, {childList:true, subtree:true});
    }
  }
  function instrumentAll(){
    instrumentDoc(document);
    document.querySelectorAll('iframe').forEach(frame=>{
      try { if (frame.contentDocument) instrumentDoc(frame.contentDocument); } catch(e){}
    });
  }
  window.addEventListener('load', function(){
    setTimeout(instrumentAll, 250);
    setTimeout(instrumentAll, 1000);
    setTimeout(instrumentAll, 2500);
  });
  document.addEventListener('click', function(){ setTimeout(instrumentAll, 150); }, true);
  setInterval(instrumentAll, 2500);
})();
</script>
